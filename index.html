<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GymGear Compare Pro</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0f0f0f;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        header {
            margin-bottom: 30px;
            border-bottom: 2px solid #f59e0b;
            padding-bottom: 20px;
        }
        h1 {
            color: #f59e0b;
            font-size: 36px;
            margin-bottom: 5px;
        }
        .subtitle {
            color: #888;
            font-size: 14px;
        }
        .controls {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 20px;
            align-items: center;
        }
        button {
            padding: 12px 20px;
            background: #222;
            color: #fff;
            border: none;
            cursor: pointer;
            border-radius: 6px;
            font-size: 14px;
            font-weight: bold;
            transition: all 0.3s;
        }
        button:hover {
            background: #333;
            transform: translateY(-2px);
        }
        button.active {
            background: #f59e0b;
            color: #000;
        }
        button.compare-btn {
            background: #22c55e;
            margin-left: auto;
        }
        button.compare-btn:hover {
            background: #16a34a;
        }
        button.compare-btn:disabled {
            background: #666;
            cursor: not-allowed;
        }
        select {
            padding: 12px 15px;
            background: #222;
            color: #fff;
            border: 1px solid #f59e0b;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
        }
        select option {
            background: #222;
            color: #fff;
        }
        #error {
            display: none;
            background: #2a1a1a;
            color: #ef4444;
            padding: 15px;
            margin-bottom: 20px;
            border-left: 4px solid #ef4444;
            border-radius: 6px;
        }
        #loading {
            display: none;
            text-align: center;
            padding: 40px;
            color: #888;
            font-size: 18px;
        }
        .selection-info {
            background: #1a2a1a;
            border-left: 4px solid #22c55e;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 20px;
            display: none;
        }
        .selection-info.show {
            display: block;
        }
        .products {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .card {
            background: #1a1a1a;
            padding: 20px;
            border-radius: 8px;
            border: 2px solid #222;
            transition: all 0.3s;
            cursor: pointer;
            position: relative;
        }
        .card:hover {
            border-color: #f59e0b;
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(245, 158, 11, 0.2);
        }
        .card.selected {
            border-color: #22c55e;
            background: #1a2a1a;
            box-shadow: 0 0 20px rgba(34, 197, 94, 0.3);
        }
        .card-image {
            width: 100%;
            height: 180px;
            background: #333;
            border-radius: 4px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #888;
            font-size: 12px;
            overflow: hidden;
        }
        .card-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .card h3 {
            margin-bottom: 8px;
            font-size: 16px;
            color: #fff;
            line-height: 1.3;
        }
        .card p {
            color: #aaa;
            font-size: 13px;
            margin: 4px 0;
        }
        .price {
            font-size: 24px;
            font-weight: bold;
            color: #f59e0b;
            margin: 12px 0;
        }
        .rating {
            font-size: 13px;
            color: #aaa;
            margin: 8px 0;
        }
        .button-group {
            display: flex;
            gap: 8px;
            margin-top: 12px;
        }
        .details-btn, .view-btn {
            flex: 1;
            padding: 10px;
            background: #3b82f6;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-size: 13px;
        }
        .view-btn:hover, .details-btn:hover {
            background: #2563eb;
        }
        .comparison-section {
            background: #1a1a1a;
            padding: 30px;
            border-radius: 8px;
            border: 2px solid #f59e0b;
            margin-top: 40px;
            display: none;
        }
        .comparison-section.show {
            display: block;
        }
        .comparison-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-bottom: 30px;
        }
        .comparison-product {
            background: #222;
            padding: 25px;
            border-radius: 8px;
            border: 2px solid #333;
        }
        .comparison-product img {
            width: 100%;
            height: 250px;
            background: #333;
            border-radius: 6px;
            margin-bottom: 15px;
            object-fit: cover;
        }
        .comparison-product h2 {
            color: #f59e0b;
            margin-bottom: 15px;
            font-size: 20px;
        }
        .comparison-spec {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #333;
        }
        .comparison-spec label {
            color: #888;
        }
        .comparison-spec value {
            color: #fff;
            font-weight: bold;
        }
        .ai-summary {
            background: #1a2a1a;
            border-left: 4px solid #22c55e;
            padding: 20px;
            border-radius: 6px;
            margin-top: 20px;
        }
        .ai-summary h3 {
            color: #22c55e;
            margin-bottom: 10px;
        }
        .verdict {
            background: #2a1a1a;
            border-left: 4px solid #3b82f6;
            padding: 20px;
            border-radius: 6px;
            margin-top: 20px;
        }
        .verdict h3 {
            color: #3b82f6;
            margin-bottom: 10px;
        }
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            overflow: auto;
        }
        .modal-content {
            background: #1a1a1a;
            margin: 5% auto;
            padding: 30px;
            border: 2px solid #f59e0b;
            border-radius: 8px;
            width: 90%;
            max-width: 700px;
            max-height: 80vh;
            overflow-y: auto;
        }
        .close {
            color: #f59e0b;
            float: right;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
        }
        .close:hover {
            color: #fff;
        }
        .modal-image {
            width: 100%;
            height: 300px;
            background: #333;
            border-radius: 6px;
            margin-bottom: 20px;
            object-fit: cover;
        }
        .modal h2 {
            color: #f59e0b;
            margin-bottom: 15px;
        }
        .modal-spec {
            padding: 12px 0;
            border-bottom: 1px solid #333;
        }
        .modal-spec strong {
            color: #f59e0b;
        }
        .no-products {
            text-align: center;
            padding: 40px;
            color: #888;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>⚡ GymGear Compare Pro</h1>
            <p class="subtitle">🤖 AI-powered comparison • Real prices from top retailers</p>
        </header>

        <div class="controls">
            <button onclick="search('benches')" class="active">🏋️ Bench Racks</button>
            <button onclick="search('weights')">⚙️ Weight Plates</button>
            <button onclick="clearSelection()" class="compare-btn" style="margin-left: auto;">Clear Selection</button>
        </div>

        <div class="selection-info" id="selectionInfo">
            Selected: <strong id="selectedName"></strong> ✅
        </div>

        <div id="error"></div>
        <div id="loading">🔄 Loading products...</div>
        <div id="products" class="products"></div>
        <div id="noProducts" class="no-products" style="display: none;">No products found</div>

        <div id="comparisonSection" class="comparison-section">
            <h2 style="color: #f59e0b; margin-bottom: 20px;">⚖️ Comparison Results</h2>
            <div id="compareContainer"></div>
        </div>
    </div>

    <!-- Modal for product details -->
    <div id="detailsModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <div id="modalBody"></div>
        </div>
    </div>

    <script>
        const BACKEND = 'https://gymgear-backend5.onrender.com';
        const BACKEND_API_KEY = 'YOUR_BACKEND_SECRET_KEY_HERE';
        let allProducts = [];
        let firstProduct = null;
        let selectedProduct = null;

        async function search(category) {
            const loading = document.getElementById('loading');
            const error = document.getElementById('error');
            const products = document.getElementById('products');
            const noProducts = document.getElementById('noProducts');
            const comparisonSection = document.getElementById('comparisonSection');

            loading.style.display = 'block';
            error.style.display = 'none';
            products.innerHTML = '';
            noProducts.style.display = 'none';
            comparisonSection.classList.remove('show');
            clearSelection();

            try {
                const response = await fetch(`${BACKEND}/api/search-products`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'x-api-key': BACKEND_API_KEY
                    },
                    body: JSON.stringify({ category: category })
                });

                const data = await response.json();

                if (data.success && data.products) {
                    allProducts = data.products;
                    firstProduct = data.products[0];
                    let html = '';
                    data.products.forEach(product => {
                        const price = product.salePrice || product.regularPrice;
                        html += `
                            <div class="card" onclick="selectProduct('${product.id}', '${product.name}')">
                                <div class="card-image">
                                    <img src="${product.image}" alt="${product.name}" onerror="this.style.display='none'">
                                </div>
                                <h3>${product.name}</h3>
                                <p><strong>${product.brand}</strong> | ${product.retailer}</p>
                                <div class="price">$${price.toFixed(2)}</div>
                                ${product.salePrice && product.salePrice < product.regularPrice ? `
                                    <p style="color: #22c55e;">💰 ${product.discount} off</p>
                                ` : ''}
                                <p class="rating">Quality: ${product.quality}/10 | ⭐ ${product.rating}/5</p>
                                <div class="button-group">
                                    <button class="details-btn" onclick="event.stopPropagation(); showDetails('${product.id}')">📋 Details</button>
                                    <button class="view-btn" onclick="event.stopPropagation(); window.open('${product.url}', '_blank')">🛒 Buy</button>
                                </div>
                            </div>
                        `;
                    });
                    products.innerHTML = html;
                } else if (data.error) {
                    noProducts.style.display = 'block';
                    noProducts.textContent = data.error;
                }
            } catch (err) {
                error.style.display = 'block';
                error.innerHTML = `⚠️ Error: ${err.message}`;
            } finally {
                loading.style.display = 'none';
            }
        }

        function selectProduct(productId, productName) {
            selectedProduct = productId;
            
            document.querySelectorAll('.card').forEach(card => card.classList.remove('selected'));
            event.currentTarget.classList.add('selected');
            
            const selectionInfo = document.getElementById('selectionInfo');
            document.getElementById('selectedName').textContent = productName;
            selectionInfo.classList.add('show');

            // Show compare button hint
            if (firstProduct && firstProduct.id !== productId) {
                compareProducts();
            }
        }

        function clearSelection() {
            selectedProduct = null;
            firstProduct = null;
            document.querySelectorAll('.card').forEach(card => card.classList.remove('selected'));
            document.getElementById('selectionInfo').classList.remove('show');
            document.getElementById('comparisonSection').classList.remove('show');
        }

        async function compareProducts() {
            if (!selectedProduct || !firstProduct) {
                alert('Please select a product to compare');
                return;
            }

            const loading = document.getElementById('loading');
            const error = document.getElementById('error');
            const compareSection = document.getElementById('comparisonSection');
            const compareContainer = document.getElementById('compareContainer');

            loading.style.display = 'block';
            error.style.display = 'none';

            try {
                const response = await fetch(`${BACKEND}/api/compare-products`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'x-api-key': BACKEND_API_KEY
                    },
                    body: JSON.stringify({ productIds: [firstProduct.id, selectedProduct] })
                });

                const comparison = await response.json();

                if (comparison.products) {
                    const [p1, p2] = comparison.products;
                    let html = `
                        <div class="comparison-container">
                            <div class="comparison-product">
                                <img src="${p1.image}" alt="${p1.name}" onerror="this.style.display='none'">
                                <h2>${p1.name}</h2>
                                <p>${p1.brand} | ${p1.retailer}</p>
                                <div class="price">$${(p1.salePrice || p1.regularPrice).toFixed(2)}</div>
                                <div class="comparison-spec">
                                    <label>Quality:</label>
                                    <value>${p1.quality}/10</value>
                                </div>
                                <div class="comparison-spec">
                                    <label>Rating:</label>
                                    <value>${p1.rating}/5 ⭐</value>
                                </div>
                                <div class="comparison-spec">
                                    <label>In Stock:</label>
                                    <value>${p1.inStock ? '✅ Yes' : '❌ No'}</value>
                                </div>
                            </div>
                            <div class="comparison-product">
                                <img src="${p2.image}" alt="${p2.name}" onerror="this.style.display='none'">
                                <h2>${p2.name}</h2>
                                <p>${p2.brand} | ${p2.retailer}</p>
                                <div class="price">$${(p2.salePrice || p2.regularPrice).toFixed(2)}</div>
                                <div class="comparison-spec">
                                    <label>Quality:</label>
                                    <value>${p2.quality}/10</value>
                                </div>
                                <div class="comparison-spec">
                                    <label>Rating:</label>
                                    <value>${p2.rating}/5 ⭐</value>
                                </div>
                                <div class="comparison-spec">
                                    <label>In Stock:</label>
                                    <value>${p2.inStock ? '✅ Yes' : '❌ No'}</value>
                                </div>
                            </div>
                        </div>
                        ${comparison.aiSummary ? `
                            <div class="ai-summary">
                                <h3>🤖 AI Analysis</h3>
                                <p>${comparison.aiSummary}</p>
                            </div>
                        ` : ''}
                        <div class="verdict">
                            <h3>⚖️ Winner: ${comparison.verdict.winner}</h3>
                            <p>${comparison.verdict.reason}</p>
                            <p style="margin-top: 10px; color: #3b82f6;">Price Difference: ${comparison.priceDifference.percentage}</p>
                        </div>
                    `;
                    compareContainer.innerHTML = html;
                    compareSection.classList.add('show');
                    compareSection.scrollIntoView({ behavior: 'smooth' });
                }
            } catch (err) {
                error.style.display = 'block';
                error.innerHTML = `⚠️ Error: ${err.message}`;
            } finally {
                loading.style.display = 'none';
            }
        }

        function showDetails(productId) {
            const product = allProducts.find(p => p.id === productId);
            if (!product) return;

            const modal = document.getElementById('detailsModal');
            const modalBody = document.getElementById('modalBody');

            let specsHtml = '';
            for (let [key, value] of Object.entries(product.specs)) {
                specsHtml += `<div class="modal-spec"><strong>${key}:</strong> ${value}</div>`;
            }

            modalBody.innerHTML = `
                <img src="${product.image}" alt="${product.name}" class="modal-image" onerror="this.style.display='none'">
                <h2>${product.name}</h2>
                <p style="color: #aaa; margin-bottom: 15px;">${product.brand} | ${product.retailer}</p>
                <div class="price" style="margin-bottom: 20px;">$${(product.salePrice || product.regularPrice).toFixed(2)}</div>
                <p style="margin-bottom: 15px;">${product.description}</p>
                <h3 style="color: #f59e0b; margin-top: 20px; margin-bottom: 15px;">Specifications</h3>
                ${specsHtml}
                <h3 style="color: #f59e0b; margin-top: 20px; margin-bottom: 15px;">Key Aspects</h3>
                <p>${product.keyAspects.join(' • ')}</p>
                <button class="view-btn" onclick="window.open('${product.url}', '_blank'); closeModal();" style="margin-top: 30px; width: 100%;">Buy on ${product.retailer} →</button>
            `;

            modal.style.display = 'block';
        }

        function closeModal() {
            document.getElementById('detailsModal').style.display = 'none';
        }

        window.addEventListener('load', () => search('benches'));
        window.onclick = function(event) {
            const modal = document.getElementById('detailsModal');
            if (event.target == modal) {
                modal.style.display = 'none';
            }
        }
    </script>
</body>
</html>
