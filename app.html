<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Compare Products — GymGear Compare</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --white:#ffffff;--off:#f9f8f6;--light:#f2f0ec;
      --border:#e8e4de;--border-d:#cec8be;
      --text:#18160f;--text-2:#6e6a62;--text-3:#b0aa9e;
      --accent:#e8542a;--accent-l:#fff4f0;
      --navy:#0f1f3d;
      --green:#16a34a;--green-l:rgba(22,163,74,0.07);--green-b:rgba(22,163,74,0.28);
      --amber:#d97706;
      --shadow-sm:0 1px 2px rgba(0,0,0,0.06),0 2px 8px rgba(0,0,0,0.05);
      --shadow:0 2px 8px rgba(0,0,0,0.07),0 8px 24px rgba(0,0,0,0.07);
      --shadow-lg:0 8px 32px rgba(0,0,0,0.12);
      --ff:'Syne',sans-serif;--fb:'DM Sans',sans-serif;--ease:.18s ease;--r:4px;
    }
    html{scroll-behavior:smooth}
    body{background:var(--off);color:var(--text);font-family:var(--fb);overflow-x:hidden;-webkit-font-smoothing:antialiased;max-width:100vw}
    ::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:var(--off)}::-webkit-scrollbar-thumb{background:var(--border-d)}

    /* TOPBAR */
    .topbar{
      position:sticky;top:0;z-index:200;height:52px;
      background:rgba(255,255,255,0.97);backdrop-filter:blur(16px);
      border-bottom:1px solid var(--border);
      display:flex;align-items:center;gap:10px;padding:0 20px;
    }
    .logo{font-family:var(--ff);font-size:1rem;font-weight:700;color:var(--text);text-decoration:none;white-space:nowrap;flex-shrink:0}
    .logo strong{color:var(--accent)}
    .sw{flex:1;max-width:280px;position:relative}
    .sw input{
      width:100%;background:var(--light);border:1px solid var(--border);
      color:var(--text);font-family:var(--fb);font-size:0.82rem;
      padding:7px 10px 7px 30px;border-radius:6px;outline:none;transition:border-color var(--ease),background var(--ease);
    }
    .sw input:focus{border-color:var(--accent);background:var(--white)}
    .sw input::placeholder{color:var(--text-3)}
    .sw-i{position:absolute;left:9px;top:50%;transform:translateY(-50%);font-size:0.78rem;color:var(--text-3);pointer-events:none}
    .sort-s{background:var(--light);border:1px solid var(--border);color:var(--text-2);font-family:var(--fb);font-size:0.78rem;padding:7px 8px;border-radius:6px;cursor:pointer;outline:none;margin-left:auto;flex-shrink:0;transition:border-color var(--ease)}
    .sort-s:focus{border-color:var(--accent)}
    .home-l{color:var(--text-3);font-size:0.78rem;text-decoration:none;flex-shrink:0;transition:color var(--ease);white-space:nowrap}
    .home-l:hover{color:var(--text)}
    .flt-b{display:none;background:var(--light);border:1px solid var(--border);color:var(--text-2);font-family:var(--fb);font-size:0.78rem;padding:6px 12px;border-radius:6px;cursor:pointer;flex-shrink:0}

    /* DRILL-DOWN NAV */
    .drill-nav{background:var(--white);border-bottom:1px solid var(--border);position:sticky;top:52px;z-index:190}
    .drill-groups{display:flex;align-items:stretch}
    .drill-group{
      flex:1;position:relative;cursor:pointer;
      border-right:1px solid var(--border);
      transition:background var(--ease);
    }
    .drill-group:last-child{border-right:none}
    .drill-group:hover{background:var(--off)}
    .drill-group.open{background:var(--accent-l)}
    .drill-group-inner{
      display:flex;align-items:center;justify-content:center;gap:8px;
      padding:15px 20px;
    }
    .dg-label{
      font-family:var(--ff);font-size:0.88rem;font-weight:700;
      color:var(--text);letter-spacing:0.01em;transition:color var(--ease);
    }
    .drill-group:hover .dg-label{color:var(--accent)}
    .drill-group.open .dg-label{color:var(--accent)}
    .dg-arrow{
      font-size:0.8rem;color:var(--text-3);
      transition:transform .22s ease,color var(--ease);display:inline-block;
    }
    .drill-group.open .dg-arrow{transform:rotate(90deg);color:var(--accent)}
    /* Active indicator line at bottom of group */
    .drill-group::after{
      content:'';position:absolute;bottom:0;left:0;right:0;height:2px;
      background:var(--accent);transform:scaleX(0);transition:transform .22s ease;
    }
    .drill-group.open::after{transform:scaleX(1)}

    /* Subcategory dropdown */
    .drill-sub{
      display:none;position:absolute;top:100%;left:0;
      background:var(--white);border:1px solid var(--border);
      border-top:2px solid var(--accent);
      min-width:190px;z-index:200;
      box-shadow:0 12px 32px rgba(0,0,0,0.1),0 4px 8px rgba(0,0,0,0.05);
      padding:6px 0;border-radius:0 0 8px 8px;
    }
    .drill-group.open .drill-sub{display:block;animation:dsin .16s ease}
    @keyframes dsin{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:none}}
    .drill-sub button{
      display:flex;align-items:center;gap:8px;width:100%;text-align:left;
      background:none;border:none;
      font-family:var(--fb);font-size:0.85rem;font-weight:500;
      color:var(--text-2);padding:10px 18px;cursor:pointer;
      transition:all var(--ease);
    }
    .drill-sub button::before{content:'';width:4px;height:4px;border-radius:50%;background:var(--border-d);flex-shrink:0;transition:background var(--ease)}
    .drill-sub button:hover{background:var(--accent-l);color:var(--accent)}
    .drill-sub button:hover::before{background:var(--accent)}
    .drill-sub button.active{color:var(--accent);font-weight:700;background:var(--accent-l)}
    .drill-sub button.active::before{background:var(--accent)}

    /* Breadcrumb */
    .drill-crumb{
      background:var(--accent-l);border-top:1px solid rgba(232,84,42,0.12);
      padding:7px 16px;display:flex;align-items:center;justify-content:space-between;
      font-size:0.76rem;color:var(--text-2);
    }
    .drill-crumb span{font-weight:600;color:var(--accent)}
    .drill-crumb button{
      background:none;border:none;color:var(--text-3);
      font-size:0.72rem;cursor:pointer;transition:color var(--ease);
    }
    .drill-crumb button:hover{color:var(--accent)}

    /* LAYOUT */
    /* ── POLISH TOKENS ── */
    --glow-accent:0 0 0 3px rgba(232,84,42,0.15),0 4px 20px rgba(232,84,42,0.2);
    --glow-green:0 0 0 3px rgba(21,128,61,0.15),0 4px 20px rgba(21,128,61,0.15);
    --shadow-card:0 1px 3px rgba(0,0,0,0.06),0 4px 16px rgba(0,0,0,0.06);
    --shadow-hover:0 8px 32px rgba(0,0,0,0.12),0 2px 8px rgba(0,0,0,0.06);
    --trans:.22s cubic-bezier(.4,0,.2,1);

    /* LAYOUT */
    .layout{display:block}
    .sidebar{position:fixed;left:0;top:104px;width:210px;height:calc(100vh - 104px);background:var(--white);border-right:1px solid var(--border);overflow-y:auto;z-index:100;padding:16px 0}
    #sidebarInner{padding:0}
    .content{margin-left:210px;padding:16px 20px 140px;min-width:0}
    .sb-s{padding:0 14px;margin-bottom:20px}
    .sb-l{font-family:var(--ff);font-size:0.6rem;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:var(--text-3);margin-bottom:8px}
    .fchips{display:flex;flex-direction:column;gap:3px}
    .fchip{background:none;border:1.5px solid var(--border);color:var(--text-2);font-family:var(--fb);font-size:0.78rem;padding:7px 12px;cursor:pointer;text-align:left;border-radius:8px;transition:all var(--trans);font-weight:500}
    .fchip:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-l);transform:translateX(2px)}
    .fchip.on{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600;box-shadow:0 2px 10px rgba(232,84,42,0.25)}
    .p-is{display:flex;gap:6px;align-items:center}
    .p-i{width:72px;background:var(--off);border:1.5px solid var(--border);color:var(--text);font-family:var(--fb);font-size:0.78rem;padding:7px 8px;border-radius:8px;outline:none;transition:all var(--trans)}
    .p-i:focus{border-color:var(--accent);background:var(--white);box-shadow:var(--glow-accent)}
    .p-sep{color:var(--text-3);font-size:0.7rem}
    .ro{display:flex;flex-direction:column;gap:5px}
    .ro-item{display:flex;align-items:center;gap:7px;cursor:pointer;padding:3px 0}
    .ro-item input{accent-color:var(--accent);width:14px;height:14px}
    .ro-item span{font-size:0.78rem;color:var(--text-2)}
    .ro-stars{color:var(--amber);font-size:0.72rem}
    .sb-ad{margin:0 14px;background:var(--off);border:1px dashed var(--border-d);border-radius:8px;padding:12px;text-align:center}
    .ad-l{font-size:0.56rem;letter-spacing:0.14em;text-transform:uppercase;color:var(--text-3);margin-bottom:5px;font-weight:600}
    .ad-p{width:100%;background:var(--light);border-radius:4px;display:flex;align-items:center;justify-content:center;color:var(--text-3);font-size:0.68rem;height:120px}
    /* .content defined above in layout section */
    .top-ad{display:none} /* Hidden until real ad code is added */
    .meta{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;flex-wrap:wrap;gap:8px}
    .meta-c{font-size:0.82rem;color:var(--text-2)}
    .meta-c strong{color:var(--text);font-weight:600}
    .atags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px}
    .atag{display:flex;align-items:center;gap:4px;background:var(--accent-l);border:1px solid rgba(232,84,42,0.25);color:var(--accent);font-size:0.68rem;padding:3px 10px;border-radius:100px;font-weight:500}
    .atag button{background:none;border:none;color:inherit;cursor:pointer;font-size:.8rem;line-height:1;padding:0}
    .loading-s{grid-column:1/-1;text-align:center;padding:60px 20px}
    .spinner{display:inline-block;width:32px;height:32px;border:2.5px solid var(--border-d);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;margin-bottom:14px}
    @keyframes spin{to{transform:rotate(360deg)}}
    .load-t{font-size:.84rem;color:var(--text-2);line-height:1.6}
    .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
    @media(max-width:1300px){.grid{grid-template-columns:repeat(3,1fr)}}
    @media(max-width:1050px){.grid{grid-template-columns:repeat(2,1fr)}}

    /* CARD */
    .card{background:var(--white);border:1.5px solid var(--border);border-radius:14px;overflow:hidden;cursor:pointer;position:relative;display:flex;flex-direction:column;transition:all var(--trans);box-shadow:var(--shadow-card);animation:cin .24s ease both}
    .card:hover{border-color:var(--accent);box-shadow:0 12px 36px rgba(0,0,0,0.11),0 2px 8px rgba(0,0,0,0.06);transform:translateY(-5px)}
    .card.sel{border-color:var(--green);box-shadow:var(--glow-green);transform:translateY(-3px)}
    @keyframes cin{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
    /* Selected badge — z-index 10 so it always shows over best-badge */
    .sel-b{position:absolute;top:8px;right:8px;z-index:10;background:linear-gradient(135deg,#16a34a,#15803d);color:#fff;font-family:var(--ff);font-size:0.58rem;font-weight:700;padding:4px 10px;border-radius:100px;letter-spacing:.05em;opacity:0;transform:scale(.8) translateY(-4px);transition:all var(--trans);box-shadow:0 2px 10px rgba(21,128,61,0.4)}
    .card.sel .sel-b{opacity:1;transform:scale(1) translateY(0)}
    .c-img{height:155px;overflow:hidden;position:relative;flex-shrink:0;display:flex;align-items:center;justify-content:center}
    /* Category-specific emoji backgrounds */
    .c-emoji{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:4rem;transition:transform var(--trans)}
    .c-photo{max-width:calc(100% - 24px);max-height:calc(100% - 24px);width:auto;height:auto;object-fit:contain;display:block;background:transparent;transition:transform var(--trans)}
    .c-img.has-photo{background:#fff}
    .card:hover .c-photo{transform:scale(1.05)}
    .c-emoji.bg-equip{background:linear-gradient(145deg,#f0f4ff 0%,#e0e8ff 100%)}
    .c-emoji.bg-clothing{background:linear-gradient(145deg,#fff0f5 0%,#ffe0ec 100%)}
    .c-emoji.bg-supp{background:linear-gradient(145deg,#f0fff4 0%,#dcfce7 100%)}
    .c-emoji.bg-gear{background:linear-gradient(145deg,#fff8f0 0%,#ffecd8 100%)}
    .c-emoji.bg-default{background:linear-gradient(145deg,#faf8f5 0%,#f0ede8 100%)}
    .card:hover .c-emoji{transform:scale(1.08)}
    .best-badge{position:absolute;top:0;left:0;right:0;z-index:2;background:linear-gradient(90deg,#15803d,#16a34a);color:#fff;font-family:var(--ff);font-size:0.62rem;font-weight:700;padding:5px 10px;letter-spacing:.1em;text-transform:uppercase;text-align:center;display:flex;align-items:center;justify-content:center;gap:5px}
    .best-badge::before{content:'★';font-size:.65rem}
    .disc-badge{position:absolute;bottom:0;left:0;z-index:2;background:linear-gradient(90deg,#dc2626,#b91c1c);color:#fff;font-family:var(--ff);font-size:0.72rem;font-weight:700;padding:4px 12px 4px 10px;clip-path:polygon(0 0,100% 0,90% 100%,0 100%);letter-spacing:.05em;animation:pulse-d 2.5s ease-in-out infinite}
    @keyframes pulse-d{0%,100%{opacity:1}50%{opacity:.85}}
    .spon-b{position:absolute;top:8px;left:8px;z-index:2;background:rgba(255,255,255,0.9);backdrop-filter:blur(6px);font-size:.56rem;font-weight:700;padding:2px 7px;border-radius:4px;color:var(--text-2);letter-spacing:.06em;text-transform:uppercase}
    .c-body{padding:14px 16px;display:flex;flex-direction:column;flex:1;gap:4px}
    .c-brand{font-family:var(--ff);font-size:.6rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--text-3)}
    .c-name{font-family:var(--ff);font-weight:700;font-size:.95rem;color:var(--text);line-height:1.25}
    .c-price{font-family:var(--ff);font-size:1.5rem;font-weight:700;color:var(--text);line-height:1}
    .c-price-wrap{display:flex;align-items:baseline;gap:8px}
    .c-price-sale{font-family:var(--ff);font-size:1.5rem;font-weight:700;color:#dc2626;line-height:1}
    .c-price-orig{font-size:.85rem;color:var(--text-3);text-decoration:line-through}
    .c-ret{font-size:.68rem;color:var(--text-3)}
    .q-row{display:flex;align-items:center;gap:7px}
    .q-bar{flex:1;height:3px;background:var(--light);border-radius:2px;overflow:hidden}
    .q-fill{height:100%;background:linear-gradient(90deg,var(--accent),#f07340);border-radius:2px;transition:width .6s ease}
    .q-n{font-size:.68rem;color:var(--text-2);white-space:nowrap;font-weight:600}
    .s-row{display:flex;align-items:center;gap:5px}
    .stars{color:var(--amber);font-size:.74rem}
    .r-n{font-size:.74rem;font-weight:700}
    .r-c{font-size:.66rem;color:var(--text-3)}
    .verdict{font-size:.73rem;color:var(--text-2);border-left:2px solid var(--accent);padding-left:8px;line-height:1.55;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;font-style:italic}
    .c-tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:auto;padding-top:6px}
    .ctag-p{font-size:.6rem;padding:3px 8px;border:1px solid var(--border);border-radius:100px;color:var(--text-3);font-weight:500;transition:all var(--trans)}
    .c-acts{display:flex;gap:7px;padding-top:8px}
    .btn-d{flex:1;background:var(--off);border:1.5px solid var(--border);color:var(--text-2);font-family:var(--ff);font-size:.72rem;font-weight:700;padding:9px;border-radius:8px;cursor:pointer;transition:all var(--trans);letter-spacing:.02em}
    .btn-d:hover{border-color:var(--border-d);color:var(--text);background:var(--light)}
    .btn-b{flex:1;background:var(--accent);border:none;color:#fff;font-family:var(--ff);font-weight:700;font-size:.72rem;padding:9px;border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all var(--trans);letter-spacing:.02em}
    .btn-b:hover{background:#d4421a;box-shadow:0 4px 14px rgba(232,84,42,.35);transform:translateY(-1px)}
    .grid-ad{background:var(--white);border:1px dashed var(--border-d);border-radius:12px;padding:16px;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:200px}
    .grid-ad .ad-p{width:100%;height:100px;border-radius:4px}
    .empty{grid-column:1/-1;text-align:center;padding:60px 20px}
    .empty-i{font-size:2.5rem;margin-bottom:12px;display:block}
    .empty p{font-size:.88rem;color:var(--text-2);line-height:1.7}

    /* COMPARE BAR */
    .cbar{position:fixed;bottom:0;left:0;right:0;z-index:150;background:linear-gradient(135deg,#0d1b35,#162840);border-top:1px solid rgba(255,255,255,.08);display:flex;align-items:center;gap:12px;padding:12px 20px;transform:translateY(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);box-shadow:0 -8px 32px rgba(0,0,0,.25)}
    .cbar.vis{transform:none}
    .cslots{display:flex;gap:8px;flex:1;flex-wrap:wrap}
    .cslot{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:8px 12px;font-size:.76rem;color:rgba(255,255,255,.4);min-width:120px;flex:1;display:flex;align-items:center;justify-content:space-between;gap:8px;transition:all var(--trans)}
    .cslot.fill{background:rgba(255,255,255,.1);border-color:rgba(255,255,255,.2);color:#fff}
    .sname{font-size:.78rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:90px}
    .sx{background:none;border:none;color:rgba(255,255,255,.3);cursor:pointer;font-size:.85rem;line-height:1;transition:color var(--trans);flex-shrink:0}
    .sx:hover{color:#fff}
    .cbar-btns{display:flex;gap:8px;flex-shrink:0}
    .cbar-hint{font-size:.68rem;color:rgba(255,255,255,.3);white-space:nowrap;flex-shrink:0}
    .bclear{background:transparent;border:1px solid rgba(255,255,255,.15);color:rgba(255,255,255,.5);font-family:var(--ff);font-size:.78rem;font-weight:600;padding:10px 14px;border-radius:8px;cursor:pointer;transition:all var(--trans);white-space:nowrap}
    .bclear:hover{border-color:rgba(255,255,255,.4);color:#fff}
    .bcomp{background:linear-gradient(135deg,#e8542a,#d4421a);color:#fff;border:none;font-family:var(--ff);font-weight:700;font-size:.84rem;padding:10px 22px;border-radius:8px;cursor:pointer;letter-spacing:.04em;transition:all var(--trans);white-space:nowrap}
    .bcomp:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(232,84,42,.4)}
    .bcomp:disabled{background:rgba(255,255,255,.1);color:rgba(255,255,255,.25);cursor:not-allowed;transform:none;box-shadow:none}

    /* COMPARISON PANEL */
    .cpanel{display:none;background:var(--white);border:1.5px solid var(--border);border-radius:14px;margin-bottom:14px;box-shadow:0 8px 40px rgba(0,0,0,0.1),0 2px 8px rgba(0,0,0,0.06);animation:sdn .24s ease;overflow:hidden}
    .cpanel.vis{display:block}
    @keyframes sdn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:none}}
    .cp-hd{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border);background:var(--white)}
    .cp-title{font-family:var(--ff);font-size:1rem;font-weight:700;display:flex;align-items:center;gap:8px}
    .cp-title::before{content:'⚡';font-size:.85rem}
    .cp-cl{background:var(--off);border:1.5px solid var(--border);color:var(--text-2);width:30px;height:30px;border-radius:8px;cursor:pointer;font-size:.88rem;transition:all var(--trans)}
    .cp-cl:hover{border-color:#dc2626;color:#dc2626;background:#fef2f2}
    .cp-matrix{overflow-x:auto}
    .cp-matrix-head{display:grid;grid-template-columns:140px repeat(var(--cols,2),1fr);border-bottom:2px solid var(--border);background:var(--off)}
    .cm-spec-col{padding:14px 16px;display:flex;align-items:flex-end}
    .cm-prod-col{padding:16px;border-left:1px solid var(--border);text-align:center}
    .cm-prod-col.cm-winner{background:linear-gradient(160deg,rgba(21,128,61,.06) 0%,transparent 60%);border-top:3px solid var(--green)}
    .win-b{display:inline-flex;align-items:center;gap:4px;background:linear-gradient(135deg,#15803d,#16a34a);color:#fff;font-family:var(--ff);font-size:.6rem;font-weight:700;padding:4px 10px;border-radius:100px;letter-spacing:.08em;text-transform:uppercase;margin-bottom:8px;box-shadow:0 3px 10px rgba(21,128,61,.3)}
    .win-b::before{content:'🏆';font-size:.65rem}
    .cm-brand{font-size:.6rem;letter-spacing:.12em;text-transform:uppercase;color:var(--text-3);font-weight:700;margin-bottom:3px}
    .cm-name{font-family:var(--ff);font-size:.9rem;font-weight:700;margin-bottom:12px;line-height:1.3}
    .cm-buy{background:linear-gradient(135deg,#e8542a,#d4421a);color:#fff;border:none;font-family:var(--ff);font-weight:700;font-size:.72rem;padding:9px 18px;border-radius:7px;cursor:pointer;letter-spacing:.03em;transition:all var(--trans)}
    .cm-buy:hover{transform:translateY(-2px);box-shadow:0 6px 16px rgba(232,84,42,.35)}
    /* Symmetric spec table */
    .spec-matrix{width:100%;border-collapse:collapse;font-size:.82rem;table-layout:fixed}
    .spec-matrix tr{border-bottom:1px solid var(--off);transition:background var(--trans)}
    .spec-matrix tr:hover{background:rgba(232,84,42,0.02)}
    .spec-matrix tr:nth-child(even){background:rgba(248,247,245,.6)}
    .spec-matrix tr:nth-child(even):hover{background:rgba(232,84,42,0.03)}
    .sm-k{padding:11px 16px;color:var(--text-2);font-weight:600;font-size:.78rem;border-right:1px solid var(--border);width:140px;word-break:break-word}
    .sm-v{padding:11px 16px;border-left:1px solid var(--border);text-align:center;vertical-align:middle;word-break:break-word}
    .sm-v.win{color:var(--green);font-weight:700;background:rgba(21,128,61,0.04)}
    .sm-v.same{color:var(--text-3)}
    .sm-v.none{color:var(--text-3);font-style:italic;font-size:.75rem}
    /* AI Verdict section */
    .cp-ai{padding:20px;border-top:2px solid var(--border);background:linear-gradient(135deg,var(--off),var(--white));border-radius:0 0 12px 12px}
    .cp-ai-header{display:flex;align-items:center;gap:10px;margin-bottom:14px}
    .cp-ai-badge{display:inline-flex;align-items:center;gap:5px;background:var(--navy);color:#fff;font-family:var(--ff);font-size:.6rem;font-weight:700;padding:4px 12px;border-radius:100px;letter-spacing:.1em;text-transform:uppercase}
    .cp-ai-badge::before{content:'AI';font-size:.55rem;background:var(--accent);padding:1px 4px;border-radius:3px;margin-right:2px}
    .cp-ai-t{font-size:.88rem;line-height:1.75;color:var(--text-2)}
    .cp-ai-t strong{color:var(--text);font-weight:600}

    /* MODAL */
    .moverlay{position:fixed;inset:0;background:rgba(24,22,15,.7);z-index:500;display:none;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(4px)}
    .moverlay.open{display:flex}
    .modal{background:var(--white);border-radius:14px;width:100%;max-width:500px;max-height:90vh;overflow-y:auto;box-shadow:0 24px 64px rgba(0,0,0,.2);animation:min .22s ease}
    @keyframes min{from{opacity:0;transform:scale(.96) translateY(12px)}to{opacity:1;transform:none}}
    .m-img{height:220px;overflow:hidden;background:linear-gradient(145deg,#faf8f5,#f0ede8);border-radius:14px 14px 0 0;display:flex;align-items:center;justify-content:center;font-size:6rem}

    .m-name{font-family:var(--ff);font-size:1.3rem;font-weight:700;letter-spacing:-0.01em}
    .m-brand{font-family:var(--ff);font-size:.62rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--text-3);margin-top:2px}
    .mc{background:var(--off);border:1.5px solid var(--border);color:var(--text-2);width:30px;height:30px;border-radius:8px;cursor:pointer;flex-shrink:0;margin-left:10px;font-size:.84rem;transition:all var(--trans)}
    .mc:hover{border-color:#dc2626;color:#dc2626;background:#fef2f2}
    .mb{padding:18px}
    .m-price{font-family:var(--ff);font-size:2.2rem;font-weight:700;line-height:1;margin-bottom:3px}
    .m-ret{font-size:.72rem;color:var(--text-3);margin-bottom:10px}
    .m-rrow{display:flex;align-items:center;gap:8px;margin-bottom:14px}
    .m-stars{color:var(--amber);font-size:.9rem}
    .m-rnum{font-family:var(--ff);font-size:1.2rem;font-weight:700}
    .m-rsrc{font-size:.66rem;color:var(--text-3)}
    .m-slbl{font-family:var(--ff);font-size:.6rem;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--text-3);margin-bottom:7px;margin-top:14px}
    .m-spec{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--off);font-size:.82rem}
    .m-sk{color:var(--text-2)}.m-sv{font-weight:600;text-align:right}
    .m-aspects{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:2px}
    .m-asp{font-size:.66rem;padding:3px 10px;border:1.5px solid var(--border);border-radius:100px;color:var(--text-2)}
    .rev-item{padding:10px 0;border-bottom:1px solid var(--off)}
    .rev-item:last-child{border-bottom:none}
    .rev-auth{font-family:var(--ff);font-size:.7rem;font-weight:700;color:var(--text);margin-bottom:3px}
    .rev-text{font-size:.8rem;color:var(--text-2);line-height:1.6;font-style:italic}
    .m-buy{display:block;text-align:center;background:linear-gradient(135deg,#e8542a,#d4421a);color:#fff;font-family:var(--ff);font-weight:700;font-size:.92rem;padding:14px;border:none;cursor:pointer;width:100%;border-radius:10px;margin-top:16px;letter-spacing:.03em;transition:all var(--trans)}
    .m-buy:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(232,84,42,.35)}

    /* DRAWER */
    .drw-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:290;backdrop-filter:blur(2px)}
    .drw-bg.open{display:block}
    .drw{position:fixed;top:0;left:0;bottom:0;width:260px;z-index:300;background:var(--white);border-right:1px solid var(--border);transform:translateX(-100%);transition:transform .28s ease;overflow-y:auto;padding:16px 0}
    .drw.open{transform:none}
    .drw-hd{padding:0 14px 14px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border);margin-bottom:14px}
    .drw-hd span{font-family:var(--ff);font-size:.92rem;font-weight:700}
    .drw-hd button{background:var(--accent);border:none;color:#fff;padding:6px 16px;border-radius:7px;cursor:pointer;font-size:.78rem;font-family:var(--fb);font-weight:600}

    /* MOBILE */
    @media(max-width:860px){
      .sidebar{display:none}
      .content{margin-left:0}
      .topbar{padding:0 14px;gap:8px}
      .content{padding:12px 14px 140px}
      .sort-s{display:none}
      .flt-b{display:flex;align-items:center;gap:6px}
    }
    @media(max-width:600px){
      .grid{grid-template-columns:1fr 1fr!important}
      .c-emoji{font-size:3rem}
      .c-img{height:120px}
      .cbar{padding:10px 12px;flex-wrap:wrap}
      .cslots{flex-direction:row;gap:6px}
      .cslot{min-width:0;flex:1;padding:7px 8px}
      .sname{max-width:70px;font-size:.72rem}
      .bcomp{padding:9px 14px;font-size:.78rem}
      .bclear{padding:9px 10px}
      .cbar-hint{display:none}
      .cp-matrix-head{grid-template-columns:80px repeat(var(--cols,2),1fr)}
      .sm-k{padding:8px 10px;font-size:.72rem;width:80px}
      .sm-v{padding:8px 8px;font-size:.76rem}
      .drill-group-inner{padding:10px 12px}
      .dg-label{font-size:.82rem}
    }
    @media(max-width:400px){
      .grid{grid-template-columns:1fr!important}
      .c-emoji{font-size:3.5rem}
      .c-img{height:140px}
    }

</head>

let grp='equipment',cat=null,cache={},selIds=[],filters={brand:'all',minP:'',maxP:'',minR:0,onSale:false,clearance:false},sort='',q='',retryT={};
const revCache={};

// ── DRILL-DOWN NAV ────────────────────────────────────────────
let openDrill=null;

function toggleDrill(group){
  if(openDrill===group){closeDrill();return;}
  if(openDrill) closeDrill();
  openDrill=group;
  document.getElementById('dg-'+group).classList.add('open');
  // Close on outside click
  setTimeout(()=>document.addEventListener('click',closeDrillOutside),10);
}

function closeDrill(){
  if(openDrill){
    document.getElementById('dg-'+openDrill).classList.remove('open');
    openDrill=null;
  }
  document.removeEventListener('click',closeDrillOutside);
}

function closeDrillOutside(e){
  if(!e.target.closest('.drill-group')) closeDrill();
}

function drillSelect(catKey, e){
  e.stopPropagation();
  closeDrill();
  // Highlight active button
  document.querySelectorAll('.drill-sub button').forEach(b=>b.classList.remove('active'));
  e.target.classList.add('active');
  // Show breadcrumb
  const crumb=document.getElementById('drillCrumb');
  crumb.style.display='flex';
  document.getElementById('crumbText').textContent=CAT_LABELS[catKey];
  // Scroll to top so products are visible
  window.scrollTo(0,0);
  // Load category
  selectCat(catKey);
}

function clearDrill(){
  document.querySelectorAll('.drill-sub button').forEach(b=>b.classList.remove('active'));
  document.getElementById('drillCrumb').style.display='none';
  cat=null;
  document.getElementById('grid').innerHTML='<div class="empty"><span class="empty-i">—</span><p>Select a category above to start comparing.</p></div>';
  document.getElementById('metaC').textContent='';
  clearAll();
}

function stars(r){const f=Math.floor(r||0),h=(r||0)%1>=.5?1:0,e=5-f-h;return'★'.repeat(f)+(h?'½':'')+'☆'.repeat(e)}
function getP(id){return(cache[cat]?.products||[]).find(p=>p.id===id)}
function getBrands(){return[...new Set((cache[cat]?.products||[]).map(p=>p.brand))].sort()}

// FETCH
async function loadCat(c){
  if(retryT[c]){clearTimeout(retryT[c]);delete retryT[c]}
  if(cache[c]){cat=c;applyFilters();renderSidebar();return}
  cat=c;
  document.getElementById('grid').innerHTML=`<div class="loading-s"><div class="spinner"></div><div class="load-t">Loading ${CAT_LABELS[c]}…</div></div>`;
  document.getElementById('metaC').textContent='Loading…';
  try{
    const res=await apiFetch(`/api/products/${c}`);
    if(!res.ok){const e=await res.json().catch(()=>({}));if(e.loading){showRetry(c);return}throw new Error(e.error||`HTTP ${res.status}`)}
    const data=await res.json();
    cache[c]=data;
    if(cat===c){applyFilters();renderSidebar();if(data.refreshedAt)document.getElementById('metaR').textContent=`Updated ${new Date(data.refreshedAt).toLocaleDateString()}`}
  }catch(err){
    if(cat!==c)return;
    document.getElementById('grid').innerHTML=`<div class="empty"><span class="empty-i">—</span><p>${err.message}<br><br><button onclick="loadCat('${c}')" style="background:var(--accent);color:#fff;border:none;padding:8px 20px;border-radius:4px;cursor:pointer;font-family:var(--ff);font-weight:700;font-size:0.8rem">Retry</button></p></div>`;
  }
}
function showRetry(c){
  let r=15;
  document.getElementById('grid').innerHTML=`<div class="loading-s"><div class="spinner"></div><div class="load-t">Loading products for the first time…<br><span id="cd-${c}">Checking in ${r}s</span></div></div>`;
  const tick=setInterval(()=>{r--;const el=document.getElementById(`cd-${c}`);if(el)el.textContent=r>0?`Checking in ${r}s…`:'Checking…';if(r<=0)clearInterval(tick)},1000);
  retryT[c]=setTimeout(()=>{clearInterval(tick);delete retryT[c];if(cat===c)loadCat(c)},15000);
}

// GROUP / CAT
function switchGroup(g,el){
  grp=g;selIds=[];updateCbar();closeComp();
  document.querySelectorAll('.gnav-btn').forEach(b=>b.classList.remove('on'));
  el.classList.add('on');
  renderCatStrip();
  selectCat(GROUPS[g].cats[0]);
}
function renderCatStrip(){
  document.getElementById('catStrip').innerHTML=GROUPS[grp].cats.map(c=>`<button class="ctab ${c===cat?'on':''}" onclick="selectCat('${c}',this)">${CAT_LABELS[c]}</button>`).join('');
}
function selectCat(c,el){
  selIds=[];filters={brand:'all',minP:'',maxP:'',minR:0};q='';sort='';
  document.getElementById('searchInput').value='';
  document.getElementById('sortSel').value='';
  closeComp();updateCbar();
  document.querySelectorAll('.ctab').forEach(t=>t.classList.remove('on'));
  if(el)el.classList.add('on');
  else document.querySelectorAll('.ctab').forEach(t=>{if(t.textContent===CAT_LABELS[c])t.classList.add('on')});
  loadCat(c);
}

// FILTERS
function getFiltered(){
  const list=cache[cat]?.products||[];
  const qq=q.toLowerCase();
  let out=list.filter(p=>{
    if(qq&&!p.name.toLowerCase().includes(qq)&&!p.brand.toLowerCase().includes(qq)&&!(p.aspects||[]).some(a=>a.toLowerCase().includes(qq)))return false;
    if(filters.brand!=='all'&&p.brand!==filters.brand)return false;
    if(filters.minP&&p.price<Number(filters.minP))return false;
    if(filters.maxP&&p.price>Number(filters.maxP))return false;
    if(filters.minR>0&&p.rating<filters.minR)return false;
    if(filters.onSale&&!p.salePrice)return false;
    if(filters.clearance&&(!p.salePrice||p.discount<20))return false;
    return true;
  });
  if(sort==='price-asc')out.sort((a,b)=>(a.salePrice||a.price)-(b.salePrice||b.price));
  else if(sort==='price-desc')out.sort((a,b)=>(b.salePrice||b.price)-(a.salePrice||a.price));
  else if(sort==='rating')out.sort((a,b)=>b.rating-a.rating);
  else if(sort==='quality')out.sort((a,b)=>b.quality-a.quality);
  return out;
}
function applyFilters(){q=document.getElementById('searchInput').value;sort=document.getElementById('sortSel').value;renderGrid();renderTags()}

function renderSidebar(){const h=sbHTML();document.getElementById('sidebarInner').innerHTML=h;document.getElementById('drwContent').innerHTML=h}
function setBrand(b){filters.brand=b;renderSidebar();renderGrid();renderTags()}

function toggleSale(){filters.onSale=!filters.onSale;filters.clearance=false;renderSidebar();renderGrid();renderTags()}
function toggleClearance(){filters.clearance=!filters.clearance;filters.onSale=false;renderSidebar();renderGrid();renderTags()}

function setR(r){filters.minR=r;renderGrid();renderTags()}

function renderTags(){
  const tags=[];
  if(filters.brand!=='all')tags.push({l:filters.brand,c:()=>setBrand('all')});
  if(filters.onSale)tags.push({l:'On Sale',c:()=>{filters.onSale=false;renderSidebar();renderGrid();renderTags()}});
  if(filters.clearance)tags.push({l:'Clearance',c:()=>{filters.clearance=false;renderSidebar();renderGrid();renderTags()}});
  if(filters.minP)tags.push({l:`$${filters.minP}+`,c:()=>{filters.minP='';renderSidebar();renderGrid();renderTags()}});
  if(filters.maxP)tags.push({l:`Up to $${filters.maxP}`,c:()=>{filters.maxP='';renderSidebar();renderGrid();renderTags()}});
  if(filters.minR>0)tags.push({l:`${filters.minR}★+`,c:()=>{filters.minR=0;renderSidebar();renderGrid();renderTags()}});
  if(q)tags.push({l:`"${q}"`,c:()=>{q='';document.getElementById('searchInput').value='';renderGrid();renderTags()}});
  window._tc=tags.map(t=>t.c);
  document.getElementById('atags').innerHTML=tags.map((t,i)=>`<div class="atag">${t.l}<button onclick="window._tc[${i}]()">✕</button></div>`).join('');
}

// SELECTION
const MAX_COMPARE=4;

function toggleSel(id){
  if(selIds.includes(id)){selIds=selIds.filter(x=>x!==id)}
  else{if(selIds.length>=MAX_COMPARE){const old=selIds.shift();document.getElementById('card-'+old)?.classList.remove('sel')}selIds.push(id)}
  document.querySelectorAll('.card').forEach(c=>c.classList.remove('sel'));
  selIds.forEach(id=>document.getElementById('card-'+id)?.classList.add('sel'));
  updateCbar();
}
function clearAll(){selIds=[];document.querySelectorAll('.card').forEach(c=>c.classList.remove('sel'));updateCbar();closeComp()}

// COMPARE BAR
function updateCbar(){
  const bar=document.getElementById('cbar'),btn=document.getElementById('bcomp');
  const slotsEl=document.getElementById('cslots'),hint=document.getElementById('cbarHint');
  if(!selIds.length){bar.classList.remove('vis');btn.disabled=true;return}
  bar.classList.add('vis');
  let html=selIds.map((id,i)=>{
    const p=getP(id);
    return`<div class="cslot fill"><span class="sname">${p?.name||'…'}</span><button class="sx" onclick="rmSlot(${i})">✕</button></div>`;
  }).join('');
  if(selIds.length<MAX_COMPARE)html+=`<div class="cslot"><span class="sname">${selIds.length===1?'Add another…':'Add more…'}</span></div>`;
  if(slotsEl)slotsEl.innerHTML=html;
  if(hint)hint.textContent=selIds.length>=2?`${selIds.length} selected`:`Select ${2-selIds.length} more`;
  btn.disabled=selIds.length<2;
  btn.textContent=selIds.length>=2?`Compare ${selIds.length}`:'Compare';
}
function rmSlot(i){const id=selIds[i];selIds.splice(i,1);document.getElementById('card-'+id)?.classList.remove('sel');updateCbar();closeComp()}

// COMPARISON
async function showComparison(){
  if(selIds.length<2)return;
  const prods=selIds.map(id=>getP(id)).filter(Boolean);
  const n=prods.length;
  const allKeys=[...new Set(prods.flatMap(p=>Object.keys(p.specs||{})))];
  const winner=prods.reduce((a,b)=>a.quality>=b.quality?a:b);
  const headCols=prods.map(p=>{
    const isWin=p.id===winner.id;
    const price=p.salePrice?`<span style="color:#dc2626;font-weight:700">$${p.salePrice}</span> <s style="color:var(--text-3);font-size:.78em">$${p.price}</s>`:'$'+Number(p.price).toLocaleString();
    return`<div class="cm-prod-col ${isWin?'cm-winner':''}">
      ${isWin?'<div class="win-b">Best Pick</div>':''}
      <div class="cm-brand">${p.brand}</div>
      <div class="cm-name">${p.name}</div>
      <div style="font-family:var(--ff);font-size:1.2rem;font-weight:700;margin:6px 0">${price}</div>
      <div style="font-size:.72rem;color:var(--text-3);margin-bottom:10px">via ${p.retailer}</div>
      <button onclick="window.open('${(p.affiliateUrl||p.url||'').replace(/'/g,"\'")}','_blank')" class="cm-buy">Buy →</button>
    </div>`;
  }).join('');
  const maxQ=Math.max(...prods.map(p=>p.quality));
  const maxR=Math.max(...prods.map(p=>p.rating));
  const fixedRows=[
    `<tr><td class="sm-k">Quality Score</td>${prods.map(p=>`<td class="sm-v ${p.quality===maxQ?'win':''}">${p.quality}/10</td>`).join('')}</tr>`,
    `<tr><td class="sm-k">Rating</td>${prods.map(p=>`<td class="sm-v ${p.rating===maxR?'win':''}">${p.rating}★ (${(p.reviewCount||0).toLocaleString()})</td>`).join('')}</tr>`,
  ].join('');
  const specRows=allKeys.map(k=>`<tr><td class="sm-k">${k}</td>${prods.map(p=>{const v=p.specs?.[k]??'—';return`<td class="sm-v ${v==='—'?'none':''}">${v}</td>`}).join('')}</tr>`).join('');
  document.getElementById('cpBody').innerHTML=`
    <div class="cp-matrix">
      <div class="cp-matrix-head" style="--cols:${n}">
        <div class="cm-spec-col"><span style="font-size:.68rem;color:var(--text-3);text-transform:uppercase;letter-spacing:.1em;font-weight:600">Spec</span></div>
        ${headCols}
      </div>
      <table class="spec-matrix">
        <colgroup><col style="width:140px">${prods.map(()=>'<col>').join('')}</colgroup>
        ${fixedRows}${specRows}
      </table>
    </div>
    <div class="cp-ai">
      <div class="cp-ai-header"><div class="cp-ai-badge">Verdict</div></div>
      <div class="cp-ai-t" id="aiVerdictText"><span style="color:var(--text-3);font-style:italic">Analyzing products…</span></div>
    </div>`;
  const panel=document.getElementById('cpanel');panel.classList.add('vis');panel.scrollIntoView({behavior:'smooth',block:'start'});
  try{
    const r=await apiFetch('/api/compare',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({p1:prods[0],p2:prods[n-1]})});
    if(r.ok){const d=await r.json();if(d.summary)document.getElementById('aiVerdictText').innerHTML=d.summary;}
  }catch{document.getElementById('aiVerdictText').innerHTML=localSum(prods[0],prods[n-1]);}
}
function localSum(p1,p2){
  const d=Math.abs(p1.price-p2.price),qw=p1.quality>=p2.quality?p1:p2,cheap=p1.price<=p2.price?p1:p2,pricey=cheap.id===p1.id?p2:p1,vw=(p1.quality/p1.price)>=(p2.quality/p2.price)?p1:p2;
  if(d===0)return`Same price. <strong>${qw.name}</strong> wins on quality (${qw.quality}/10).`;
  if(d<40)return`Only $${d} apart — go with <strong>${qw.name}</strong> (${qw.quality}/10 vs ${(qw.id===p1.id?p2:p1).quality}/10).`;
  if(vw.id===cheap.id)return`<strong>${cheap.name}</strong> is $${d} cheaper and better value per dollar. Save the money.`;
  return`<strong>${pricey.name}</strong> costs $${d} more but earns it — ${pricey.quality}/10 vs ${cheap.quality}/10. Worth the upgrade if budget allows.`;
}

      <div class="m-slbl" style="margin-top:12px">Reviews</div>
      <div id="rev-area" style="color:var(--text-3);font-size:0.8rem;padding:8px 0">Loading…</div>
      <button onclick="window.open('${(p.affiliateUrl||p.url||'').replace(/'/g,"\\'")}','_blank','noopener,noreferrer')" class="m-buy">Shop at ${p.retailer} →</button>
    </div>`;
  document.getElementById('moverlay').classList.add('open');
  document.body.style.overflow='hidden';
  const el=document.getElementById('rev-area');
  if(revCache[id]){renderRevs(el,revCache[id]);return}
  try{const r=await apiFetch(`/api/reviews`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({productName:p.name,brand:p.brand,url:p.url})});const d=await r.json();revCache[id]=d.reviews||[];renderRevs(el,revCache[id])}catch{el.textContent='Reviews unavailable.'}
}
function renderRevs(el,revs){if(!revs||!revs.length){el.textContent='No reviews found.';return}el.innerHTML=revs.map(r=>`<div class="rev-item"><div class="rev-auth">${r.author}</div><div class="rev-text">"${r.text}"</div></div>`).join('')}
function closeModal(e){if(!e||e.target===document.getElementById('moverlay')){document.getElementById('moverlay').classList.remove('open');document.body.style.overflow=''}}

// DRAWER
function openDrawer(){document.getElementById('drw').classList.add('open');document.getElementById('drwBg').classList.add('open')}
function closeDrawer(){document.getElementById('drw').classList.remove('open');document.getElementById('drwBg').classList.remove('open')}

// URL PARAMS — if ?cat=barbells, auto-open that category
(function(){
  const p=new URLSearchParams(window.location.search),c=p.get('cat');
  if(c&&CAT_LABELS[c]){
    selectCat(c);
    // Show breadcrumb
    const crumb=document.getElementById('drillCrumb');
    crumb.style.display='flex';
    document.getElementById('crumbText').textContent=CAT_LABELS[c];
  }
})();
</script>
</body>
</html>
