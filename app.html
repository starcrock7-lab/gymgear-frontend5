<html lang="en">
<head>

  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --surface: #111111;
      --card: #161616;
      --card-hover: #1c1c1c;
      --border: #222222;
      --accent: #e8ff47;
      --accent2: #ff6b2b;
      --green: #4ade80;
      --green-bg: rgba(74,222,128,0.08);
      --green-border: rgba(74,222,128,0.4);
      --text: #f0f0f0;
      --muted: #666;
      --font-display: 'Bebas Neue', sans-serif;
      --font-body: 'DM Sans', sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      min-height: 100vh;
    }

    /* TOP BAR */
    .topbar {
      position: sticky; top: 0; z-index: 50;
      background: rgba(10,10,10,0.9);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 32px;
      gap: 16px;
    }
    .topbar-logo {
      font-family: var(--font-display);
      font-size: 1.5rem;
      color: var(--accent);
      text-decoration: none;
      letter-spacing: 0.05em;
      white-space: nowrap;
    }
    .topbar-logo span { color: var(--text); }

    /* CATEGORY DROPDOWN */
    .category-wrapper {
      position: relative;
    }
    .category-btn {
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--font-body);
      font-size: 0.9rem;
      padding: 10px 18px;
      cursor: pointer;
      display: flex; align-items: center; gap: 10px;
      transition: border-color 0.2s;
      white-space: nowrap;
    }
    .category-btn:hover { border-color: var(--accent); }
    .category-btn .arrow { transition: transform 0.2s; font-size: 0.7rem; }
    .category-btn.open .arrow { transform: rotate(180deg); }
    .category-dropdown {
      position: absolute; top: calc(100% + 4px); left: 0;
      background: var(--surface);
      border: 1px solid var(--border);
      min-width: 200px;
      z-index: 100;
      display: none;
    }
    .category-dropdown.open { display: block; }
    .cat-option {
      padding: 12px 20px;
      cursor: pointer;
      font-size: 0.9rem;
      display: flex; align-items: center; gap: 10px;
      transition: background 0.15s;
      border-bottom: 1px solid var(--border);
    }
    .cat-option:last-child { border-bottom: none; }
    .cat-option:hover { background: var(--card); }
    .cat-option.active { color: var(--accent); }

    /* COMPARE BUTTON */
    .compare-btn {
      background: var(--green);
      color: #000;
      font-family: var(--font-body);
      font-weight: 700;
      font-size: 0.9rem;
      padding: 10px 24px;
      border: none;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      transition: all 0.2s;
      display: none;
      white-space: nowrap;
    }
    .compare-btn.visible { display: block; }
    .compare-btn:hover { background: #fff; transform: translateY(-1px); }

    .home-link {
      color: var(--muted);
      font-size: 0.85rem;
      text-decoration: none;
      border-bottom: 1px solid transparent;
      transition: color 0.2s, border-color 0.2s;
      white-space: nowrap;
    }
    .home-link:hover { color: var(--text); border-color: var(--border); }

    /* MAIN LAYOUT */
    main { padding: 32px; max-width: 1400px; margin: 0 auto; }

    .page-header { margin-bottom: 28px; }
    .page-title {
      font-family: var(--font-display);
      font-size: 2.8rem;
      letter-spacing: 0.03em;
      line-height: 1;
    }
    .page-subtitle { color: var(--muted); font-size: 0.9rem; margin-top: 6px; }
    .selected-info {
      font-size: 0.85rem;
      color: var(--green);
      margin-top: 8px;
      min-height: 20px;
    }

    /* PRODUCTS GRID */
    .products-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 12px;
      margin-bottom: 40px;
    }

    .product-card {
      background: var(--card);
      border: 1px solid var(--border);
      padding: 24px;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s, transform 0.15s;
      position: relative;
      user-select: none;
    }
    .product-card:hover { border-color: #333; background: var(--card-hover); transform: translateY(-2px); }
    .product-card.selected {
      border-color: var(--green-border);
      background: var(--green-bg);
    }
    .selected-badge {
      position: absolute; top: 12px; right: 12px;
      background: var(--green);
      color: #000;
      font-size: 0.65rem;
      font-weight: 700;
      padding: 3px 8px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .product-card.selected .selected-badge { opacity: 1; }

    .product-emoji { font-size: 2.5rem; margin-bottom: 14px; display: block; }
    .product-brand {
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 6px;
    }
    .product-name {
      font-family: var(--font-display);
      font-size: 1.3rem;
      letter-spacing: 0.02em;
      line-height: 1.1;
      margin-bottom: 14px;
    }
    .product-price {
      font-family: var(--font-display);
      font-size: 2rem;
      color: var(--accent);
      margin-bottom: 6px;
    }
    .product-retailer { font-size: 0.8rem; color: var(--muted); margin-bottom: 16px; }
    .product-quality-bar {
      height: 3px;
      background: var(--border);
      margin-bottom: 4px;
      border-radius: 2px;
      overflow: hidden;
    }
    .product-quality-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 2px;
    }
    .product-quality-label { font-size: 0.75rem; color: var(--muted); margin-bottom: 14px; }
    .card-actions {
      display: flex; gap: 8px;
    }
    .btn-details {
      flex: 1;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--font-body);
      font-size: 0.8rem;
      padding: 8px;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }
    .btn-details:hover { border-color: var(--text); }
    .btn-buy {
      flex: 1;
      background: var(--accent);
      border: none;
      color: #000;
      font-family: var(--font-body);
      font-weight: 600;
      font-size: 0.8rem;
      padding: 8px;
      cursor: pointer;
      text-decoration: none;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s;
    }
    .btn-buy:hover { background: #fff; }

    /* COMPARISON PANEL */
    .comparison-panel {
      display: none;
      background: var(--surface);
      border: 1px solid var(--border);
      margin-bottom: 40px;
      animation: slideDown 0.3s ease;
    }
    .comparison-panel.visible { display: block; }

    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .comp-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 20px 28px;
      border-bottom: 1px solid var(--border);
    }
    .comp-title {
      font-family: var(--font-display);
      font-size: 1.5rem;
      letter-spacing: 0.05em;
    }
    .comp-close {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      width: 32px; height: 32px;
      cursor: pointer;
      font-size: 1rem;
      transition: border-color 0.2s, color 0.2s;
    }
    .comp-close:hover { border-color: var(--text); color: var(--text); }

    .comp-grid {
      display: grid;
      grid-template-columns: 1fr 80px 1fr;
      gap: 0;
    }
    .comp-col {
      padding: 28px;
    }
    .comp-vs {
      display: flex; align-items: center; justify-content: center;
      border-left: 1px solid var(--border);
      border-right: 1px solid var(--border);
    }
    .comp-vs-text {
      font-family: var(--font-display);
      font-size: 2rem;
      color: var(--border);
      letter-spacing: 0.1em;
    }
    .comp-product-name {
      font-family: var(--font-display);
      font-size: 1.4rem;
      letter-spacing: 0.02em;
      margin-bottom: 6px;
    }
    .comp-product-brand { font-size: 0.75rem; color: var(--accent); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 16px; }
    .comp-price {
      font-family: var(--font-display);
      font-size: 2.5rem;
      color: var(--accent);
      margin-bottom: 20px;
    }

    .comp-specs { border-top: 1px solid var(--border); padding-top: 20px; }
    .comp-spec-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.04); font-size: 0.85rem; }
    .comp-spec-key { color: var(--muted); }
    .comp-spec-val { font-weight: 500; }

    .comp-buy {
      margin-top: 20px;
      display: inline-block;
      background: var(--accent);
      color: #000;
      font-family: var(--font-body);
      font-weight: 700;
      font-size: 0.85rem;
      padding: 12px 28px;
      text-decoration: none;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      transition: background 0.2s;
    }
    .comp-buy:hover { background: #fff; }

    /* AI SUMMARY */
    .ai-summary {
      grid-column: 1 / -1;
      padding: 24px 28px;
      border-top: 1px solid var(--border);
      background: rgba(232,255,71,0.03);
    }
    .ai-summary-label {
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 10px;
    }
    .ai-summary-text { font-size: 0.95rem; line-height: 1.7; color: var(--text); }

    /* MODAL */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.8);
      z-index: 200;
      display: none;
      align-items: center; justify-content: center;
      padding: 24px;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      max-width: 520px; width: 100%;
      max-height: 90vh;
      overflow-y: auto;
      animation: fadeUp 0.25s ease;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .modal-header {
      display: flex; align-items: flex-start; justify-content: space-between;
      padding: 24px 24px 16px;
      border-bottom: 1px solid var(--border);
    }
    .modal-name { font-family: var(--font-display); font-size: 1.6rem; letter-spacing: 0.02em; }
    .modal-brand { font-size: 0.75rem; color: var(--accent); letter-spacing: 0.1em; text-transform: uppercase; margin-top: 4px; }
    .modal-close {
      background: none; border: 1px solid var(--border);
      color: var(--muted); width: 32px; height: 32px;
      cursor: pointer; font-size: 1rem; flex-shrink: 0;
      margin-left: 12px;
      transition: border-color 0.2s;
    }
    .modal-close:hover { border-color: var(--text); color: var(--text); }
    .modal-body { padding: 24px; }
    .modal-price { font-family: var(--font-display); font-size: 3rem; color: var(--accent); margin-bottom: 6px; }
    .modal-retailer { color: var(--muted); font-size: 0.85rem; margin-bottom: 20px; }
    .modal-specs { margin-bottom: 24px; }
    .modal-spec-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 0.9rem; }
    .modal-spec-key { color: var(--muted); }
    .modal-spec-val { font-weight: 500; text-align: right; max-width: 60%; }
    .modal-aspects { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 24px; }
    .aspect-tag {
      font-size: 0.75rem;
      padding: 4px 12px;
      border: 1px solid var(--border);
      color: var(--muted);
    }
    .modal-buy {
      display: block; text-align: center;
      background: var(--accent);
      color: #000;
      font-family: var(--font-body);
      font-weight: 700;
      font-size: 0.95rem;
      padding: 14px;
      text-decoration: none;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      transition: background 0.2s;
    }
    .modal-buy:hover { background: #fff; }

    @media (max-width: 768px) {
      .topbar { padding: 12px 16px; }
      main { padding: 20px 16px; }
      .comp-grid { grid-template-columns: 1fr; }
      .comp-vs { display: none; }
      .comp-col { border-bottom: 1px solid var(--border); }
    }
  </style>
</head>

    document.getElementById('catBtn').classList.remove('open');
    document.getElementById('catDropdown').classList.remove('open');

    const labels = { benches: 'Bench Racks', weights: 'Weight Plates' };
    const icons = { benches: '🏋️', weights: '⚙️' };
    document.getElementById('catBtnLabel').textContent = labels[cat];
    document.getElementById('catBtnIcon').textContent = icons[cat];

    document.querySelectorAll('.cat-option').forEach(o => o.classList.remove('active'));
    document.getElementById('opt-' + cat).classList.add('active');

    closeComparison();
    renderProducts();
    updateUI();
  }

  // ── RENDER PRODUCTS ────────────────────────────────────
  function renderProducts() {
    const grid = document.getElementById('productsGrid');
    if (!currentCategory) return;

    const list = products[currentCategory];
    grid.innerHTML = list.map(p => {
      const isSelected = selectedIds.includes(p.id);
      return `
        <div class="product-card ${isSelected ? 'selected' : ''}" id="card-${p.id}" onclick="toggleSelect('${p.id}')">
          <div class="selected-badge">✓ Selected</div>
          <span class="product-emoji">${p.emoji}</span>
          <div class="product-brand">${p.brand}</div>
          <div class="product-name">${p.name}</div>
          <div class="product-price">$${p.price.toLocaleString()}</div>
          <div class="product-retailer">via ${p.retailer}</div>
          <div class="product-quality-bar">
            <div class="product-quality-fill" style="width:${p.quality * 10}%"></div>
          </div>
          <div class="product-quality-label">Quality: ${p.quality}/10</div>
          <div class="card-actions">
            <button class="btn-details" onclick="event.stopPropagation(); openModal('${p.id}')">Details</button>
            <a class="btn-buy" href="${p.url}" target="_blank" rel="noopener" onclick="event.stopPropagation()">Buy →</a>
          </div>
        </div>
      `;
    }).join('');
  }

  // ── SELECTION LOGIC ────────────────────────────────────
  function toggleSelect(id) {
    if (selectedIds.includes(id)) {
      selectedIds = selectedIds.filter(x => x !== id);
    } else {
      if (selectedIds.length >= 2) {
        selectedIds.shift(); // remove oldest
      }
      selectedIds.push(id);
    }
    updateCards();
    updateUI();
  }

  function updateCards() {
    const list = products[currentCategory] || [];
    list.forEach(p => {
      const card = document.getElementById('card-' + p.id);
      if (!card) return;
      if (selectedIds.includes(p.id)) {
        card.classList.add('selected');
      } else {
        card.classList.remove('selected');
      }
    });
  }

  function updateUI() {
    const info = document.getElementById('selectedInfo');
    const btn = document.getElementById('compareBtn');

    if (!currentCategory) {
      info.textContent = 'Select a category to get started ↑';
      btn.classList.remove('visible');
      return;
    }

    if (selectedIds.length === 0) {
      info.textContent = 'Click any product to select it for comparison.';
      btn.classList.remove('visible');
    } else if (selectedIds.length === 1) {
      const p = getProductById(selectedIds[0]);
      info.textContent = `✓ "${p.name}" selected — pick one more to compare.`;
      btn.classList.remove('visible');
    } else {
      const p1 = getProductById(selectedIds[0]);
      const p2 = getProductById(selectedIds[1]);
      info.textContent = `✓ "${p1.name}" vs "${p2.name}" — ready to compare!`;
      btn.classList.add('visible');
    }
  }

  function getProductById(id) {
    return products[currentCategory].find(p => p.id === id);
  }

  // ── COMPARISON ─────────────────────────────────────────
  function showComparison() {
    if (selectedIds.length < 2) return;
    const p1 = getProductById(selectedIds[0]);
    const p2 = getProductById(selectedIds[1]);

    const aiSummary = generateAISummary(p1, p2);

    document.getElementById('compGrid').innerHTML = `
      <div class="comp-col">
        <div class="comp-product-brand">${p1.brand}</div>
        <div class="comp-product-name">${p1.name}</div>
        <div class="comp-price">$${p1.price.toLocaleString()}</div>
        <div class="comp-specs">
          ${Object.entries(p1.specs).map(([k, v]) => `
            <div class="comp-spec-row">
              <span class="comp-spec-key">${k}</span>
              <span class="comp-spec-val">${v}</span>
            </div>
          `).join('')}
          <div class="comp-spec-row">
            <span class="comp-spec-key">Quality Score</span>
            <span class="comp-spec-val">${p1.quality}/10</span>
          </div>
        </div>
        <a href="${p1.url}" target="_blank" rel="noopener" class="comp-buy">Buy from ${p1.retailer} →</a>
      </div>
      <div class="comp-vs">
        <div class="comp-vs-text">VS</div>
      </div>
      <div class="comp-col">
        <div class="comp-product-brand">${p2.brand}</div>
        <div class="comp-product-name">${p2.name}</div>
        <div class="comp-price">$${p2.price.toLocaleString()}</div>
        <div class="comp-specs">
          ${Object.entries(p2.specs).map(([k, v]) => `
            <div class="comp-spec-row">
              <span class="comp-spec-key">${k}</span>
              <span class="comp-spec-val">${v}</span>
            </div>
          `).join('')}
          <div class="comp-spec-row">
            <span class="comp-spec-key">Quality Score</span>
            <span class="comp-spec-val">${p2.quality}/10</span>
          </div>
        </div>
        <a href="${p2.url}" target="_blank" rel="noopener" class="comp-buy">Buy from ${p2.retailer} →</a>
      </div>
      <div class="ai-summary">
        <div class="ai-summary-label">🤖 AI Analysis</div>
        <div class="ai-summary-text">${aiSummary}</div>
      </div>
    `;

    const panel = document.getElementById('compPanel');
    panel.classList.add('visible');
    panel.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  function generateAISummary(p1, p2) {
    const priceDiff = Math.abs(p1.price - p2.price);
    const cheaper = p1.price < p2.price ? p1 : p2;
    const pricier = p1.price < p2.price ? p2 : p1;
    const qualityWinner = p1.quality > p2.quality ? p1 : p2;
    const valueRatio1 = p1.quality / p1.price;
    const valueRatio2 = p2.quality / p2.price;
    const valueWinner = valueRatio1 > valueRatio2 ? p1 : p2;

    let verdict = '';

    if (p1.quality === p2.quality) {
      verdict = `Both products score equally on quality at ${p1.quality}/10. In that case, go with the <strong>${cheaper.name}</strong> — it saves you $${priceDiff} with no quality trade-off.`;
    } else if (priceDiff < 50) {
      verdict = `At only $${priceDiff} apart, the <strong>${qualityWinner.name}</strong> is the clear winner — a higher quality score of ${qualityWinner.quality}/10 for nearly the same price.`;
    } else {
      const savings = priceDiff;
      verdict = `The <strong>${pricier.name}</strong> wins on quality (${pricier.quality}/10 vs ${cheaper.quality}/10), but costs $${savings} more. `;
      if (valueWinner.id === cheaper.id) {
        verdict += `For value-conscious buyers, the <strong>${cheaper.name}</strong> delivers a better quality-per-dollar ratio and is the smarter pick unless you need the premium build.`;
      } else {
        verdict += `Despite the higher price, the <strong>${pricier.name}</strong> still offers better value per dollar given its superior quality score — worth the investment if budget allows.`;
      }
    }

    return verdict;
  }

  function closeComparison() {
    document.getElementById('compPanel').classList.remove('visible');
  }

  // ── MODAL ──────────────────────────────────────────────
  function openModal(id) {
    const p = getProductById(id);
    if (!p) return;

    document.getElementById('modal').innerHTML = `
      <div class="modal-header">
        <div>
          <div class="modal-name">${p.name}</div>
          <div class="modal-brand">${p.brand}</div>
        </div>
        <button class="modal-close" onclick="closeModal()">✕</button>
      </div>
      <div class="modal-body">
        <div style="font-size:3rem;margin-bottom:12px">${p.emoji}</div>
        <div class="modal-price">$${p.price.toLocaleString()}</div>
        <div class="modal-retailer">Available at ${p.retailer}</div>
        <div class="modal-specs">
          ${Object.entries(p.specs).map(([k, v]) => `
            <div class="modal-spec-row">
              <span class="modal-spec-key">${k}</span>
              <span class="modal-spec-val">${v}</span>
            </div>
          `).join('')}
          <div class="modal-spec-row">
            <span class="modal-spec-key">Quality Score</span>
            <span class="modal-spec-val">${p.quality}/10</span>
          </div>
        </div>
        <div class="modal-aspects">
          ${p.aspects.map(a => `<span class="aspect-tag">${a}</span>`).join('')}
        </div>
        <a href="${p.url}" target="_blank" rel="noopener" class="modal-buy">Shop at ${p.retailer} →</a>
      </div>
    `;

    document.getElementById('modalOverlay').classList.add('open');
  }

  function closeModal(e) {
    if (!e || e.target === document.getElementById('modalOverlay')) {
      document.getElementById('modalOverlay').classList.remove('open');
    }
  }
</script>
</body>
</html>
