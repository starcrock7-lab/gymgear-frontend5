<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Compare Products — GymGear Compare</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --white:#ffffff;--off:#f9f8f6;--light:#f2f0ec;
      --border:#e8e4de;--border-d:#cec8be;
      --text:#18160f;--text-2:#6e6a62;--text-3:#b0aa9e;
      --accent:#e8542a;--accent-l:#fff4f0;
      --navy:#0f1f3d;
      --green:#16a34a;--green-l:rgba(22,163,74,0.07);--green-b:rgba(22,163,74,0.28);
      --amber:#d97706;
      --shadow-sm:0 1px 2px rgba(0,0,0,0.06),0 2px 8px rgba(0,0,0,0.05);
      --shadow:0 2px 8px rgba(0,0,0,0.07),0 8px 24px rgba(0,0,0,0.07);
      --shadow-lg:0 8px 32px rgba(0,0,0,0.12);
      --ff:'Syne',sans-serif;--fb:'DM Sans',sans-serif;--ease:.18s ease;--r:4px;
    }
    html{scroll-behavior:smooth}
    body{background:var(--off);color:var(--text);font-family:var(--fb);overflow-x:hidden;-webkit-font-smoothing:antialiased}
    ::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:var(--off)}::-webkit-scrollbar-thumb{background:var(--border-d)}

    /* TOPBAR */
    .topbar{
      position:sticky;top:0;z-index:200;height:52px;
      background:rgba(255,255,255,0.97);backdrop-filter:blur(16px);
      border-bottom:1px solid var(--border);
      display:flex;align-items:center;gap:10px;padding:0 20px;
    }
    .logo{font-family:var(--ff);font-size:1rem;font-weight:700;color:var(--text);text-decoration:none;white-space:nowrap;flex-shrink:0}
    .logo strong{color:var(--accent)}
    .sw{flex:1;max-width:280px;position:relative}
    .sw input{
      width:100%;background:var(--light);border:1px solid var(--border);
      color:var(--text);font-family:var(--fb);font-size:0.82rem;
      padding:7px 10px 7px 30px;border-radius:6px;outline:none;transition:border-color var(--ease),background var(--ease);
    }
    .sw input:focus{border-color:var(--accent);background:var(--white)}
    .sw input::placeholder{color:var(--text-3)}
    .sw-i{position:absolute;left:9px;top:50%;transform:translateY(-50%);font-size:0.78rem;color:var(--text-3);pointer-events:none}
    .sort-s{background:var(--light);border:1px solid var(--border);color:var(--text-2);font-family:var(--fb);font-size:0.78rem;padding:7px 8px;border-radius:6px;cursor:pointer;outline:none;margin-left:auto;flex-shrink:0;transition:border-color var(--ease)}
    .sort-s:focus{border-color:var(--accent)}
    .home-l{color:var(--text-3);font-size:0.78rem;text-decoration:none;flex-shrink:0;transition:color var(--ease);white-space:nowrap}
    .home-l:hover{color:var(--text)}
    .flt-b{display:none;background:var(--light);border:1px solid var(--border);color:var(--text-2);font-family:var(--fb);font-size:0.78rem;padding:6px 12px;border-radius:6px;cursor:pointer;flex-shrink:0}

    /* DRILL-DOWN NAV */
    .drill-nav{background:var(--white);border-bottom:1px solid var(--border);position:sticky;top:52px;z-index:190}
    .drill-groups{display:flex;align-items:stretch}
    .drill-group{
      flex:1;position:relative;cursor:pointer;
      border-right:1px solid var(--border);
      transition:background var(--ease);
    }
    .drill-group:last-child{border-right:none}
    .drill-group:hover,.drill-group.open{background:var(--off)}
    .drill-group-inner{
      display:flex;align-items:center;justify-content:center;gap:8px;
      padding:14px 20px;
    }
    .dg-label{
      font-family:var(--ff);font-size:0.9rem;font-weight:700;
      color:var(--text);letter-spacing:0.01em;
    }
    .drill-group.open .dg-label{color:var(--accent)}
    .dg-arrow{
      font-size:1.1rem;color:var(--text-3);
      transition:transform .2s ease;display:inline-block;
    }
    .drill-group.open .dg-arrow{transform:rotate(90deg);color:var(--accent)}

    /* Subcategory dropdown */
    .drill-sub{
      display:none;position:absolute;top:100%;left:0;
      background:var(--white);border:1px solid var(--border);
      border-top:2px solid var(--accent);
      min-width:180px;z-index:200;
      box-shadow:0 8px 24px rgba(0,0,0,0.1);
      padding:8px 0;
    }
    .drill-group.open .drill-sub{display:block}
    .drill-sub button{
      display:block;width:100%;text-align:left;
      background:none;border:none;
      font-family:var(--fb);font-size:0.86rem;font-weight:500;
      color:var(--text-2);padding:10px 20px;cursor:pointer;
      transition:all var(--ease);
    }
    .drill-sub button:hover{background:var(--off);color:var(--accent);padding-left:26px}
    .drill-sub button.active{color:var(--accent);font-weight:700;background:var(--accent-l)}

    /* Breadcrumb */
    .drill-crumb{
      background:var(--off);border-top:1px solid var(--border);
      padding:8px 16px;display:flex;align-items:center;justify-content:space-between;
      font-size:0.78rem;color:var(--text-2);
    }
    .drill-crumb span{font-weight:600;color:var(--text)}
    .drill-crumb button{
      background:none;border:none;color:var(--text-3);
      font-size:0.75rem;cursor:pointer;transition:color var(--ease);
    }
    .drill-crumb button:hover{color:var(--accent)}

    /* LAYOUT */
    .layout{display:flex;min-height:calc(100vh - 104px)}

    /* SIDEBAR */
    .sidebar{width:200px;flex-shrink:0;background:var(--white);border-right:1px solid var(--border);position:sticky;top:104px;height:calc(100vh - 104px);overflow-y:auto;padding:14px 0}
    .sb-s{padding:0 12px;margin-bottom:18px}
    .sb-l{font-family:var(--ff);font-size:0.6rem;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:var(--text-3);margin-bottom:7px}
    .fchips{display:flex;flex-direction:column;gap:2px}
    .fchip{background:none;border:1px solid var(--border);color:var(--text-2);font-family:var(--fb);font-size:0.76rem;padding:5px 10px;cursor:pointer;text-align:left;border-radius:5px;transition:all var(--ease)}
    .fchip:hover{border-color:var(--border-d);color:var(--text)}
    .fchip.on{background:var(--accent-l);border-color:var(--accent);color:var(--accent);font-weight:600}
    .p-is{display:flex;gap:5px;align-items:center}
    .p-i{width:70px;background:var(--off);border:1px solid var(--border);color:var(--text);font-family:var(--fb);font-size:0.76rem;padding:5px 7px;border-radius:5px;outline:none;transition:border-color var(--ease)}
    .p-i:focus{border-color:var(--accent)}
    .p-sep{color:var(--text-3);font-size:0.7rem}
    .ro{display:flex;flex-direction:column;gap:4px}
    .ro-item{display:flex;align-items:center;gap:6px;cursor:pointer;padding:2px 0}
    .ro-item input{accent-color:var(--accent)}
    .ro-item span{font-size:0.76rem;color:var(--text-2)}
    .ro-stars{color:var(--amber);font-size:0.7rem}
    .sb-ad{margin:0 12px;background:var(--off);border:1px dashed var(--border-d);border-radius:5px;padding:10px;text-align:center}
    .ad-l{font-size:0.56rem;letter-spacing:0.14em;text-transform:uppercase;color:var(--text-3);margin-bottom:5px;font-weight:600}
    .ad-p{width:100%;background:var(--light);border-radius:3px;display:flex;align-items:center;justify-content:center;color:var(--text-3);font-size:0.68rem;height:120px}

    /* CONTENT */
    .content{flex:1;padding:14px 18px 120px;min-width:0}

    /* top ad */
    .top-ad{background:var(--white);border:1px dashed var(--border-d);border-radius:5px;display:flex;align-items:center;gap:12px;padding:10px 14px;margin-bottom:12px}
    .top-ad .ad-p{flex:1;height:48px;border-radius:3px}

    /* meta */
    .meta{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;flex-wrap:wrap;gap:8px}
    .meta-c{font-size:0.8rem;color:var(--text-2)}
    .meta-c strong{color:var(--text);font-weight:600}
    .atags{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:10px}
    .atag{display:flex;align-items:center;gap:4px;background:var(--accent-l);border:1px solid rgba(232,84,42,0.3);color:var(--accent);font-size:0.66rem;padding:2px 8px;border-radius:100px}
    .atag button{background:none;border:none;color:inherit;cursor:pointer;font-size:.78rem;line-height:1;padding:0}

    /* loading */
    .loading-s{grid-column:1/-1;text-align:center;padding:60px 20px}
    .spinner{display:inline-block;width:28px;height:28px;border:2px solid var(--border-d);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;margin-bottom:12px}
    @keyframes spin{to{transform:rotate(360deg)}}
    .load-t{font-size:.82rem;color:var(--text-2);line-height:1.6}

    /* GRID */
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:12px}

    /* CARD */
    .card{
      background:var(--white);border:1px solid var(--border);border-radius:8px;
      overflow:hidden;cursor:pointer;position:relative;
      display:flex;flex-direction:column;
      transition:border-color var(--ease),box-shadow var(--ease),transform var(--ease);
      box-shadow:var(--shadow-sm);animation:cin .24s ease both;
    }
    .card:hover{border-color:var(--border-d);box-shadow:var(--shadow);transform:translateY(-3px)}
    .card.sel{border-color:var(--green-b);box-shadow:0 0 0 2px var(--green-l),0 4px 16px rgba(0,0,0,0.08)}
    @keyframes cin{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

    .sel-b{
      position:absolute;top:10px;left:10px;z-index:2;
      background:var(--green);color:#fff;
      font-family:var(--ff);font-size:0.58rem;font-weight:700;padding:3px 8px;border-radius:100px;
      opacity:0;transform:scale(.85);transition:all var(--ease);
    }
    .card.sel .sel-b{opacity:1;transform:scale(1)}

    /* card image — emoji style */
    .c-img{height:140px;overflow:hidden;position:relative;flex-shrink:0}
    .c-emoji{
      width:100%;height:100%;display:flex;align-items:center;justify-content:center;
      font-size:3.8rem;position:relative;
      background:linear-gradient(135deg,var(--light) 0%,var(--border) 100%);
    }
    .c-emoji::after{
      content:'';position:absolute;inset:0;
      background:linear-gradient(to bottom,transparent 60%,rgba(0,0,0,0.04));
    }
    .spon-b{position:absolute;top:8px;right:8px;background:rgba(255,255,255,0.9);backdrop-filter:blur(6px);font-size:0.56rem;font-weight:700;padding:2px 6px;border-radius:3px;color:var(--text-2);letter-spacing:0.06em;text-transform:uppercase}

    .c-body{padding:14px;display:flex;flex-direction:column;flex:1}
    .c-brand{font-family:var(--ff);font-size:0.6rem;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--text-3);margin-bottom:3px}
    .c-name{font-family:var(--ff);font-weight:700;font-size:0.95rem;color:var(--text);line-height:1.25;margin-bottom:8px}
    .c-price{font-family:var(--ff);font-size:1.55rem;font-weight:700;color:var(--text);line-height:1;margin-bottom:3px}
    .c-price-wrap{display:flex;align-items:baseline;gap:8px;margin-bottom:3px}
    .c-price-sale{font-family:var(--ff);font-size:1.55rem;font-weight:700;color:#dc2626;line-height:1}
    .c-price-orig{font-size:0.88rem;color:var(--text-3);text-decoration:line-through;font-weight:400}
    .c-ret{font-size:0.68rem;color:var(--text-3);margin-bottom:10px}
    .best-badge{
      position:absolute;top:0;left:0;right:0;
      background:linear-gradient(135deg,#15803d,#16a34a);color:#fff;
      font-family:var(--ff);font-size:0.65rem;font-weight:700;
      padding:6px 10px;letter-spacing:0.1em;text-transform:uppercase;
      text-align:center;z-index:2;
      display:flex;align-items:center;justify-content:center;gap:6px;
    }
    .best-badge::before{content:'★';font-size:0.7rem}
    .disc-badge{
      position:absolute;bottom:0;left:0;
      background:linear-gradient(135deg,#dc2626,#b91c1c);color:#fff;
      font-family:var(--ff);font-size:0.78rem;font-weight:700;
      padding:5px 12px 5px 10px;
      clip-path:polygon(0 0,100% 0,88% 100%,0 100%);
      letter-spacing:0.06em;z-index:2;
      animation:pulse-disc 2s ease-in-out infinite;
    }
    @keyframes pulse-disc{0%,100%{opacity:1}50%{opacity:0.85}}

    .q-row{display:flex;align-items:center;gap:6px;margin-bottom:5px}
    .q-bar{flex:1;height:2px;background:var(--light);border-radius:1px;overflow:hidden}
    .q-fill{height:100%;background:var(--text);border-radius:1px;transition:width .5s}
    .q-n{font-size:0.66rem;color:var(--text-2);white-space:nowrap}
    .s-row{display:flex;align-items:center;gap:5px;margin-bottom:8px}
    .stars{color:var(--amber);font-size:0.74rem}
    .r-n{font-size:0.74rem;font-weight:600}
    .r-c{font-size:0.66rem;color:var(--text-3)}

    .verdict{font-size:0.74rem;color:var(--text-2);border-left:2px solid var(--border-d);padding-left:8px;line-height:1.5;margin-bottom:10px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;font-style:italic}
    .c-tags{display:flex;flex-wrap:wrap;gap:3px;margin-bottom:10px;margin-top:auto}
    .ctag-p{font-size:0.6rem;padding:2px 7px;border:1px solid var(--border);border-radius:100px;color:var(--text-3)}

    .c-acts{display:flex;gap:6px}
    .btn-d{flex:1;background:var(--off);border:1px solid var(--border);color:var(--text-2);font-family:var(--ff);font-size:0.72rem;font-weight:600;padding:8px;border-radius:var(--r);cursor:pointer;transition:all var(--ease);letter-spacing:0.02em}
    .btn-d:hover{border-color:var(--border-d);color:var(--text)}
    .btn-b{flex:1;background:var(--accent);border:none;color:#fff;font-family:var(--ff);font-weight:700;font-size:0.72rem;padding:8px;border-radius:var(--r);cursor:pointer;text-decoration:none;display:flex;align-items:center;justify-content:center;transition:all var(--ease);letter-spacing:0.02em}
    .btn-b:hover{background:#d4421a}

    /* grid ad */
    .grid-ad{background:var(--white);border:1px dashed var(--border-d);border-radius:8px;padding:14px;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:170px}
    .grid-ad .ad-p{width:100%;height:90px;border-radius:3px}

    /* empty */
    .empty{grid-column:1/-1;text-align:center;padding:60px 20px}
    .empty-i{font-size:2.2rem;margin-bottom:10px;display:block}
    .empty p{font-size:.85rem;color:var(--text-2);line-height:1.6}

    /* COMPARE BAR */
    .cbar{
      position:fixed;bottom:0;left:0;right:0;z-index:150;
      background:var(--navy);border-top:1px solid rgba(255,255,255,0.08);
      display:flex;align-items:center;gap:12px;padding:12px 20px;
      transform:translateY(100%);transition:transform .28s cubic-bezier(.4,0,.2,1);
      box-shadow:0 -8px 32px rgba(0,0,0,0.2);
    }
    .cbar.vis{transform:none}
    .cslots{display:flex;gap:8px;flex:1}
    .cslot{background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.1);border-radius:6px;padding:8px 12px;font-size:0.76rem;color:rgba(255,255,255,0.4);min-width:140px;display:flex;align-items:center;justify-content:space-between;gap:8px;transition:all var(--ease)}
    .cslot.fill{background:rgba(255,255,255,0.1);border-color:rgba(255,255,255,0.2);color:#fff}
    .sname{font-size:0.78rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:110px}
    .sx{background:none;border:none;color:rgba(255,255,255,0.3);cursor:pointer;font-size:.84rem;line-height:1;transition:color var(--ease)}
    .sx:hover{color:#fff}
    .cbar-btns{display:flex;gap:8px;flex-shrink:0}
    .bclear{background:transparent;border:1px solid rgba(255,255,255,0.15);color:rgba(255,255,255,0.5);font-family:var(--ff);font-size:0.76rem;font-weight:600;padding:9px 14px;border-radius:var(--r);cursor:pointer;transition:all var(--ease);white-space:nowrap}
    .bclear:hover{border-color:rgba(255,255,255,0.35);color:#fff}
    .bcomp{background:var(--accent);color:#fff;border:none;font-family:var(--ff);font-weight:700;font-size:0.82rem;padding:9px 22px;border-radius:var(--r);cursor:pointer;letter-spacing:0.04em;transition:all var(--ease);white-space:nowrap}
    .bcomp:hover{background:#d4421a;transform:translateY(-1px)}
    .bcomp:disabled{background:rgba(255,255,255,0.1);color:rgba(255,255,255,0.25);cursor:not-allowed;transform:none}

    /* COMPARISON PANEL */
    .cpanel{display:none;background:var(--white);border:1px solid var(--border);border-radius:8px;margin-bottom:12px;box-shadow:var(--shadow);animation:sdn .24s ease}
    .cpanel.vis{display:block}
    @keyframes sdn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:none}}
    .cp-matrix{overflow-x:auto}
    .cp-matrix-head{display:grid;grid-template-columns:140px 1fr 1fr;border-bottom:2px solid var(--border);background:var(--off)}
    .cm-spec-col{padding:14px 12px;display:flex;align-items:flex-end}
    .cm-prod-col{padding:16px;border-left:1px solid var(--border)}
    .cm-prod-col.cm-winner{background:rgba(21,128,61,0.04);border-top:3px solid var(--green)}
    .cm-brand{font-size:0.6rem;letter-spacing:.12em;text-transform:uppercase;color:var(--text-3);font-weight:700;margin-bottom:3px}
    .cm-name{font-family:var(--ff);font-size:0.95rem;font-weight:700;margin-bottom:10px}
    .cm-buy{background:var(--accent);color:#fff;border:none;font-family:var(--ff);font-weight:700;font-size:0.72rem;padding:7px 14px;border-radius:var(--r);cursor:pointer;letter-spacing:.03em;transition:all var(--ease)}
    .cm-buy:hover{background:#d4421a}
    .spec-matrix{width:100%;border-collapse:collapse;font-size:0.82rem}
    .spec-matrix tr{border-bottom:1px solid var(--off)}
    .spec-matrix tr:hover{background:var(--off)}
    .sm-k{padding:9px 12px;color:var(--text-2);font-weight:500;width:140px;white-space:nowrap;border-right:1px solid var(--border)}
    .sm-v{padding:9px 16px;border-left:1px solid var(--border);vertical-align:middle}
    .sm-v.win{color:var(--green);font-weight:700}
    .sm-v.same{color:var(--text-3)}
    .cp-ai{grid-column:1/-1;padding:14px 18px;border-top:1px solid var(--border);background:var(--off);border-radius:0 0 7px 7px}
    .cp-ai-l{font-family:var(--ff);font-size:0.6rem;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--text-3);margin-bottom:6px}
    .cp-ai-t{font-size:0.86rem;line-height:1.7;color:var(--text-2)}

    /* MODAL */
    .moverlay{position:fixed;inset:0;background:rgba(24,22,15,0.72);z-index:500;display:none;align-items:center;justify-content:center;padding:16px}
    .moverlay.open{display:flex}
    .modal{background:var(--white);border-radius:10px;width:100%;max-width:500px;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow-lg);animation:min .2s ease}
    @keyframes min{from{opacity:0;transform:scale(.97) translateY(10px)}to{opacity:1;transform:none}}
    .m-img{height:220px;overflow:hidden;background:var(--light);border-radius:10px 10px 0 0}
    .m-img img{width:100%;height:100%;object-fit:cover;display:block}
    .m-img-ph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:3.5rem;background:linear-gradient(135deg,var(--light),var(--border))}
    .mh{display:flex;align-items:flex-start;justify-content:space-between;padding:18px 18px 12px;border-bottom:1px solid var(--border)}
    .m-name{font-family:var(--ff);font-size:1.3rem;font-weight:700;letter-spacing:-0.01em}
    .m-brand{font-family:var(--ff);font-size:0.62rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--text-3);margin-top:2px}
    .mc{background:var(--off);border:1px solid var(--border);color:var(--text-2);width:28px;height:28px;border-radius:5px;cursor:pointer;flex-shrink:0;margin-left:10px;font-size:.84rem;transition:all var(--ease)}
    .mc:hover{border-color:var(--accent);color:var(--accent)}
    .mb{padding:16px}
    .m-price{font-family:var(--ff);font-size:2.2rem;font-weight:700;line-height:1;margin-bottom:3px}
    .m-ret{font-size:0.72rem;color:var(--text-3);margin-bottom:10px}
    .m-rrow{display:flex;align-items:center;gap:8px;margin-bottom:14px}
    .m-stars{color:var(--amber);font-size:.88rem}
    .m-rnum{font-family:var(--ff);font-size:1.2rem;font-weight:700}

    .m-spec{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--off);font-size:0.81rem}
    .m-sk{color:var(--text-2)}.m-sv{font-weight:600;text-align:right}
    .m-aspects{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:2px}
    .m-asp{font-size:0.65rem;padding:3px 9px;border:1px solid var(--border);border-radius:100px;color:var(--text-2)}
    .rev-item{padding:10px 0;border-bottom:1px solid var(--off)}
    .rev-item:last-child{border-bottom:none}
    .rev-auth{font-family:var(--ff);font-size:0.7rem;font-weight:700;color:var(--text);margin-bottom:3px}
    .rev-text{font-size:0.8rem;color:var(--text-2);line-height:1.6;font-style:italic}
    .m-buy{display:block;text-align:center;background:var(--accent);color:#fff;font-family:var(--ff);font-weight:700;font-size:0.9rem;padding:13px;text-decoration:none;border-radius:var(--r);margin-top:14px;letter-spacing:0.03em;transition:all var(--ease)}
    .m-buy:hover{background:#d4421a;transform:translateY(-1px)}

    /* DRAWER */
    .drw-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:290}

    .drw.open{transform:none}
    .drw-hd{padding:0 12px 12px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border);margin-bottom:12px}
    .drw-hd span{font-family:var(--ff);font-size:0.88rem;font-weight:700}
    .drw-hd button{background:var(--off);border:1px solid var(--border);color:var(--text-2);padding:4px 12px;border-radius:5px;cursor:pointer;font-size:0.76rem;font-family:var(--fb)}

    @media(max-width:860px){

      .cp-vs{display:none}
      .cp-col:first-child{border-bottom:1px solid var(--border)}
    }

    }

let openDrill=null;

function toggleDrill(group){
  if(openDrill===group){closeDrill();return;}
  if(openDrill) closeDrill();
  openDrill=group;
  document.getElementById('dg-'+group).classList.add('open');
  // Close on outside click
  setTimeout(()=>document.addEventListener('click',closeDrillOutside),10);
}

function closeDrill(){
  if(openDrill){
    document.getElementById('dg-'+openDrill).classList.remove('open');
    openDrill=null;
  }
  document.removeEventListener('click',closeDrillOutside);
}

function closeDrillOutside(e){
  if(!e.target.closest('.drill-group')) closeDrill();
}

function drillSelect(catKey, e){
  e.stopPropagation();
  closeDrill();
  // Highlight active button
  document.querySelectorAll('.drill-sub button').forEach(b=>b.classList.remove('active'));

  // Show breadcrumb
  const crumb=document.getElementById('drillCrumb');

  document.getElementById('crumbText').textContent=CAT_LABELS[catKey];
  // Load category
  selectCat(catKey);
}

function clearDrill(){
  document.querySelectorAll('.drill-sub button').forEach(b=>b.classList.remove('active'));

function stars(r){const f=Math.floor(r||0),h=(r||0)%1>=.5?1:0,e=5-f-h;return'★'.repeat(f)+(h?'½':'')+'☆'.repeat(e)}

// FETCH
async function loadCat(c){
  if(retryT[c]){clearTimeout(retryT[c]);delete retryT[c]}
  if(cache[c]){cat=c;applyFilters();renderSidebar();return}
  cat=c;
  document.getElementById('grid').innerHTML=`<div class="loading-s"><div class="spinner"></div><div class="load-t">Loading ${CAT_LABELS[c]}…</div></div>`;
  document.getElementById('metaC').textContent='Loading…';
  try{
    const res=await apiFetch(`/api/products/${c}`);
    if(!res.ok){const e=await res.json().catch(()=>({}));if(e.loading){showRetry(c);return}throw new Error(e.error||`HTTP ${res.status}`)}
    const data=await res.json();
    cache[c]=data;
    if(cat===c){applyFilters();renderSidebar();if(data.refreshedAt)document.getElementById('metaR').textContent=`Updated ${new Date(data.refreshedAt).toLocaleDateString()}`}
  }catch(err){
    if(cat!==c)return;
    document.getElementById('grid').innerHTML=`<div class="empty"><span class="empty-i">—</span><p>${err.message}<br><br><button onclick="loadCat('${c}')" style="background:var(--accent);color:#fff;border:none;padding:8px 20px;border-radius:4px;cursor:pointer;font-family:var(--ff);font-weight:700;font-size:0.8rem">Retry</button></p></div>`;
  }
}
function showRetry(c){
  let r=15;
  document.getElementById('grid').innerHTML=`<div class="loading-s"><div class="spinner"></div><div class="load-t">Loading products for the first time…<br><span id="cd-${c}">Checking in ${r}s</span></div></div>`;
  const tick=setInterval(()=>{r--;const el=document.getElementById(`cd-${c}`);if(el)el.textContent=r>0?`Checking in ${r}s…`:'Checking…';if(r<=0)clearInterval(tick)},1000);
  retryT[c]=setTimeout(()=>{clearInterval(tick);delete retryT[c];if(cat===c)loadCat(c)},15000);
}

// FILTERS
function getFiltered(){
  const list=cache[cat]?.products||[];
  const qq=q.toLowerCase();
  let out=list.filter(p=>{
    if(qq&&!p.name.toLowerCase().includes(qq)&&!p.brand.toLowerCase().includes(qq)&&!(p.aspects||[]).some(a=>a.toLowerCase().includes(qq)))return false;
    if(filters.brand!=='all'&&p.brand!==filters.brand)return false;
    if(filters.minP&&p.price<Number(filters.minP))return false;
    if(filters.maxP&&p.price>Number(filters.maxP))return false;
    if(filters.minR>0&&p.rating<filters.minR)return false;
    if(filters.onSale&&!p.salePrice)return false;
    if(filters.clearance&&(!p.salePrice||p.discount<20))return false;
    return true;
  });
  if(sort==='price-asc')out.sort((a,b)=>(a.salePrice||a.price)-(b.salePrice||b.price));
  else if(sort==='price-desc')out.sort((a,b)=>(b.salePrice||b.price)-(a.salePrice||a.price));
  else if(sort==='rating')out.sort((a,b)=>b.rating-a.rating);
  else if(sort==='quality')out.sort((a,b)=>b.quality-a.quality);
  return out;
}

function renderTags(){
  const tags=[];
  if(filters.brand!=='all')tags.push({l:filters.brand,c:()=>setBrand('all')});
  if(filters.onSale)tags.push({l:'On Sale',c:()=>{filters.onSale=false;renderSidebar();renderGrid();renderTags()}});
  if(filters.clearance)tags.push({l:'Clearance',c:()=>{filters.clearance=false;renderSidebar();renderGrid();renderTags()}});
  if(filters.minP)tags.push({l:`$${filters.minP}+`,c:()=>{filters.minP='';renderSidebar();renderGrid();renderTags()}});
  if(filters.maxP)tags.push({l:`Up to $${filters.maxP}`,c:()=>{filters.maxP='';renderSidebar();renderGrid();renderTags()}});
  if(filters.minR>0)tags.push({l:`${filters.minR}★+`,c:()=>{filters.minR=0;renderSidebar();renderGrid();renderTags()}});
  if(q)tags.push({l:`"${q}"`,c:()=>{q='';document.getElementById('searchInput').value='';renderGrid();renderTags()}});
  window._tc=tags.map(t=>t.c);
  document.getElementById('atags').innerHTML=tags.map((t,i)=>`<div class="atag">${t.l}<button onclick="window._tc[${i}]()">✕</button></div>`).join('');
}

function renderGrid(){
  const grid=document.getElementById('grid');
  if(!cat)return;
  const list=getFiltered(),total=cache[cat]?.products?.length||0;
  document.getElementById('metaC').innerHTML=`Showing <strong>${list.length}</strong> of ${total} products`;
  if(!list.length){grid.innerHTML=`<div class="empty"><span class="empty-i">—</span><p>No products match your filters.</p></div>`;return}
  let html='';
  list.forEach((p,i)=>{
    if(i>0&&i%6===0)html+=`<div class="grid-ad"><div class="ad-l">Ad</div><div class="ad-p">300×250</div></div>`;
    const isSel=selIds.includes(p.id);
    const img=getProdImg(p.id);
    const emoji=p.emoji||'💪';
    html+=`<div class="card ${isSel?'sel':''}" id="card-${p.id}" onclick="toggleSel('${p.id}')" style="animation-delay:${Math.min(i*.04,.3)}s">
      <div class="sel-b">Selected</div>
      <div class="c-img">
        <div class="c-emoji">${emoji}</div>
        ${p.bestChoice?'<div class="best-badge">Best Choice</div>':''}
        ${p.discount?`<div class="disc-badge">-${p.discount}% OFF</div>`:''}
        ${p.sponsored?'<div class="spon-b">Sponsored</div>':''}
      </div>
      <div class="c-body">
        <div class="c-brand">${p.brand}</div>
        <div class="c-name">${p.name}</div>
        ${p.salePrice
          ? `<div class="c-price-wrap"><span class="c-price-sale">$${Number(p.salePrice).toLocaleString()}</span><span class="c-price-orig">$${Number(p.price).toLocaleString()}</span></div>`
          : `<div class="c-price">$${Number(p.price).toLocaleString()}</div>`}
        <div class="c-ret">via ${p.retailer}</div>
        <div class="q-row"><div class="q-bar"><div class="q-fill" style="width:${(p.quality||0)*10}%"></div></div><div class="q-n">${p.quality||'—'}/10</div></div>
        <div class="s-row"><span class="stars">${stars(p.rating)}</span><span class="r-n">${p.rating||'—'}</span><span class="r-c">(${(p.reviewCount||0).toLocaleString()})</span></div>
        <div class="verdict">"${p.expertVerdict||''}" — ${p.expertSource||''}</div>
        <div class="c-tags">${(p.aspects||[]).map(a=>`<span class="ctag-p">${a}</span>`).join('')}</div>
        <div class="c-acts">
          <button class="btn-d" onclick="event.stopPropagation();openModal('${p.id}')">Details</button>
          <button class="btn-b" onclick="event.stopPropagation();window.open('${(p.affiliateUrl||p.url||'').replace(/'/g,"\\'")}','_blank','noopener,noreferrer')">Buy →</button>
        </div>
      </div>
    </div>`;
  });
  grid.innerHTML=html;
}

// SELECTION
function toggleSel(id){
  if(selIds.includes(id))selIds=selIds.filter(x=>x!==id);
  else{if(selIds.length>=2)selIds.shift();selIds.push(id)}
  document.querySelectorAll('.card').forEach(c=>c.classList.remove('sel'));
  selIds.forEach(id=>document.getElementById('card-'+id)?.classList.add('sel'));
  updateCbar();
}
function clearAll(){selIds=[];document.querySelectorAll('.card').forEach(c=>c.classList.remove('sel'));updateCbar();closeComp()}

// COMPARE BAR
function updateCbar(){
  const bar=document.getElementById('cbar'),btn=document.getElementById('bcomp');
  const s0=document.getElementById('slot0'),s1=document.getElementById('slot1');
  if(!selIds.length){bar.classList.remove('vis');s0.classList.remove('fill');s0.innerHTML='<span class="sname">Select a product…</span>';s1.classList.remove('fill');s1.innerHTML='<span class="sname">Select another…</span>';btn.disabled=true;return}
  bar.classList.add('vis');
  const p0=getP(selIds[0]);
  s0.classList.add('fill');s0.innerHTML=`<span class="sname">${p0?.name||'…'}</span><button class="sx" onclick="rmSlot(0)">✕</button>`;
  if(selIds.length>1){const p1=getP(selIds[1]);s1.classList.add('fill');s1.innerHTML=`<span class="sname">${p1?.name||'…'}</span><button class="sx" onclick="rmSlot(1)">✕</button>`;btn.disabled=false}
  else{s1.classList.remove('fill');s1.innerHTML='<span class="sname">Select another…</span>';btn.disabled=true}
}
function rmSlot(i){const id=selIds[i];selIds.splice(i,1);document.getElementById('card-'+id)?.classList.remove('sel');updateCbar();closeComp()}

// COMPARISON
async function showComparison(){
  if(selIds.length<2)return;
  const p1=getP(selIds[0]),p2=getP(selIds[1]);

  // Unified spec matrix — every key from both products, show '—' if missing
  const allKeys=[...new Set([...Object.keys(p1.specs||{}),...Object.keys(p2.specs||{})])];
  const specRows=allKeys.map(k=>{
    const v1=p1.specs?.[k]??'—'; const v2=p2.specs?.[k]??'—';
    return`<tr><td class="sm-k">${k}</td><td class="sm-v">${v1}</td><td class="sm-v">${v2}</td></tr>`;
  }).join('');

  const win=p1.quality>=p2.quality?'p1':'p2';
  const p1price=p1.salePrice?`<span style="color:#dc2626;font-weight:700">$${p1.salePrice}</span> <s style="color:var(--text-3);font-size:.8em">$${p1.price}</s>`:'$'+Number(p1.price).toLocaleString();
  const p2price=p2.salePrice?`<span style="color:#dc2626;font-weight:700">$${p2.salePrice}</span> <s style="color:var(--text-3);font-size:.8em">$${p2.price}</s>`:'$'+Number(p2.price).toLocaleString();

  document.getElementById('cpBody').innerHTML=`
    <div class="cp-matrix">
      <div class="cp-matrix-head">
        <div class="cm-spec-col"><span style="font-size:0.7rem;color:var(--text-3);text-transform:uppercase;letter-spacing:.1em">Spec</span></div>
        <div class="cm-prod-col ${win==='p1'?'cm-winner':''}">
          ${win==='p1'?'<div class="win-b">🏆 Recommended</div>':''}
          <div class="cm-brand">${p1.brand}</div>
          <div class="cm-name">${p1.name}</div>
          <button onclick="window.open('${(p1.affiliateUrl||p1.url||'').replace(/'/g,"\\'")}','_blank')" class="cm-buy">Buy from ${p1.retailer} →</button>
        </div>
        <div class="cm-prod-col ${win==='p2'?'cm-winner':''}">
          ${win==='p2'?'<div class="win-b">🏆 Recommended</div>':''}
          <div class="cm-brand">${p2.brand}</div>
          <div class="cm-name">${p2.name}</div>
          <button onclick="window.open('${(p2.affiliateUrl||p2.url||'').replace(/'/g,"\\'")}','_blank')" class="cm-buy">Buy from ${p2.retailer} →</button>
        </div>
      </div>
      <table class="spec-matrix">
        <tr><td class="sm-k">Price</td><td class="sm-v">${p1price}</td><td class="sm-v">${p2price}</td></tr>
        <tr><td class="sm-k">Quality Score</td><td class="sm-v ${p1.quality>p2.quality?'win':''}">${p1.quality}/10</td><td class="sm-v ${p2.quality>p1.quality?'win':''}">${p2.quality}/10</td></tr>
        <tr><td class="sm-k">Rating</td><td class="sm-v ${p1.rating>p2.rating?'win':''}">${p1.rating}★ (${(p1.reviewCount||0).toLocaleString()})</td><td class="sm-v ${p2.rating>p1.rating?'win':''}">${p2.rating}★ (${(p2.reviewCount||0).toLocaleString()})</td></tr>
        ${specRows}
      </table>
    </div>
    <div class="cp-ai">
      <div class="cp-ai-l">AI Verdict</div>
      <div class="cp-ai-t" id="aiVerdictText">Analyzing…</div>
    </div>`;

  const panel=document.getElementById('cpanel');
  panel.classList.add('vis');
  panel.scrollIntoView({behavior:'smooth',block:'start'});

  try{
    const r=await apiFetch(`/api/compare`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({p1,p2})});
    if(r.ok){const d=await r.json();if(d.summary)document.getElementById('aiVerdictText').innerHTML=d.summary;}
  }catch{document.getElementById('aiVerdictText').innerHTML=localSum(p1,p2);}
}
function localSum(p1,p2){
  const d=Math.abs(p1.price-p2.price),qw=p1.quality>=p2.quality?p1:p2,cheap=p1.price<=p2.price?p1:p2,pricey=cheap.id===p1.id?p2:p1,vw=(p1.quality/p1.price)>=(p2.quality/p2.price)?p1:p2;
  if(d===0)return`Same price. <strong>${qw.name}</strong> wins on quality (${qw.quality}/10).`;
  if(d<40)return`Only $${d} apart — go with <strong>${qw.name}</strong> (${qw.quality}/10 vs ${(qw.id===p1.id?p2:p1).quality}/10).`;
  if(vw.id===cheap.id)return`<strong>${cheap.name}</strong> is $${d} cheaper and better value per dollar. Save the money.`;
  return`<strong>${pricey.name}</strong> costs $${d} more but earns it — ${pricey.quality}/10 vs ${cheap.quality}/10. Worth the upgrade if budget allows.`;
}
function closeComp(){document.getElementById('cpanel').classList.remove('vis')}

// MODAL
async function openModal(id){
  const p=getP(id);if(!p)return;
  const emoji=p.emoji||'💪';
  document.getElementById('modal').innerHTML=`
    <div class="m-img" style="display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,var(--light),var(--border));font-size:6rem;height:180px;">${emoji}</div>
    <div class="mh">
      <div><div class="m-name">${p.name}</div><div class="m-brand">${p.brand}</div></div>
      <button class="mc" onclick="closeModal()">✕</button>
    </div>
    <div class="mb">
      ${p.bestChoice?'<div style="background:#15803d;color:#fff;font-family:var(--ff);font-size:0.62rem;font-weight:700;padding:5px 12px;letter-spacing:0.08em;text-transform:uppercase;text-align:center;border-radius:4px;margin-bottom:12px">★ Best Choice in Category</div>':''}
      ${p.salePrice
        ? `<div style="display:flex;align-items:baseline;gap:10px;margin-bottom:3px"><span class="m-price" style="color:#dc2626">$${Number(p.salePrice).toLocaleString()}</span><span style="font-size:1rem;color:var(--text-3);text-decoration:line-through">$${Number(p.price).toLocaleString()}</span><span style="background:#dc2626;color:#fff;font-size:0.65rem;font-weight:700;padding:3px 9px;border-radius:3px;font-family:var(--ff)">-${p.discount}% OFF</span></div>`
        : `<div class="m-price">$${Number(p.price).toLocaleString()}</div>`}
      <div class="m-ret">via ${p.retailer}</div>
      <div class="m-rrow"><span class="m-stars">${stars(p.rating||0)}</span><span class="m-rnum">${p.rating||'—'}</span><span class="m-rsrc">${(p.reviewCount||0).toLocaleString()} reviews · ${p.reviewSource||''}</span></div>
      <div class="m-slbl">Specifications</div>
      ${Object.entries(p.specs||{}).map(([k,v])=>`<div class="m-spec"><span class="m-sk">${k}</span><span class="m-sv">${v}</span></div>`).join('')}
      <div class="m-spec"><span class="m-sk">Quality Score</span><span class="m-sv">${p.quality||'—'}/10</span></div>
      <div class="m-slbl" style="margin-top:12px">Highlights</div>
      <div class="m-aspects">${(p.aspects||[]).map(a=>`<span class="m-asp">${a}</span>`).join('')}</div>
      <div class="m-slbl" style="margin-top:12px">Reviews</div>
      <div id="rev-area" style="color:var(--text-3);font-size:0.8rem;padding:8px 0">Loading…</div>
      <button onclick="window.open('${(p.affiliateUrl||p.url||'').replace(/'/g,"\\'")}','_blank','noopener,noreferrer')" class="m-buy">Shop at ${p.retailer} →</button>
    </div>`;
  document.getElementById('moverlay').classList.add('open');
  document.body.style.overflow='hidden';
  const el=document.getElementById('rev-area');
  if(revCache[id]){renderRevs(el,revCache[id]);return}
  try{const r=await apiFetch(`/api/reviews`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({productName:p.name,brand:p.brand,url:p.url})});const d=await r.json();revCache[id]=d.reviews||[];renderRevs(el,revCache[id])}catch{el.textContent='Reviews unavailable.'}
}
function renderRevs(el,revs){if(!revs||!revs.length){el.textContent='No reviews found.';return}el.innerHTML=revs.map(r=>`<div class="rev-item"><div class="rev-auth">${r.author}</div><div class="rev-text">"${r.text}"</div></div>`).join('')}
function closeModal(e){if(!e||e.target===document.getElementById('moverlay')){document.getElementById('moverlay').classList.remove('open');document.body.style.overflow=''}}

// DRAWER
function openDrawer(){document.getElementById('drw').classList.add('open');document.getElementById('drwBg').classList.add('open')}
function closeDrawer(){document.getElementById('drw').classList.remove('open');document.getElementById('drwBg').classList.remove('open')}

// URL PARAMS — if ?cat=barbells, auto-open that category
(function(){
  const p=new URLSearchParams(window.location.search),c=p.get('cat');
  if(c&&CAT_LABELS[c]){
    selectCat(c);
    // Show breadcrumb
    const crumb=document.getElementById('drillCrumb');
    crumb.style.display='flex';
    document.getElementById('crumbText').textContent=CAT_LABELS[c];
  }
})();
</script>
