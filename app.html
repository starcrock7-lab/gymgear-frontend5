<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GymGear Compare Pro</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

    :root{
      --bg:#080808;
      --surface:#101010;
      --card:#141414;
      --card-h:#1a1a1a;
      --border:#1e1e1e;
      --border-l:#2a2a2a;
      --accent:#d4ff00;
      --accent-dim:rgba(212,255,0,0.08);
      --green:#4ade80;
      --green-bg:rgba(74,222,128,0.07);
      --green-b:rgba(74,222,128,0.35);
      --amber:#f59e0b;
      --red:#ef4444;
      --text:#efefef;
      --text-2:#999;
      --text-3:#555;
      --ff-display:'Bebas Neue',sans-serif;
      --ff-body:'DM Sans',sans-serif;
      --radius:2px;
      --trans:0.18s ease;
    }

    html{scroll-behavior:smooth}
    body{background:var(--bg);color:var(--text);font-family:var(--ff-body);min-height:100vh;overflow-x:hidden}

    /* ── SCROLLBAR ── */
    ::-webkit-scrollbar{width:4px}
    ::-webkit-scrollbar-track{background:var(--bg)}
    ::-webkit-scrollbar-thumb{background:var(--border-l)}

    /* ── TOPBAR ── */
    .topbar{
      position:sticky;top:0;z-index:200;
      background:rgba(8,8,8,0.92);
      backdrop-filter:blur(16px);
      border-bottom:1px solid var(--border);
      display:flex;align-items:center;gap:12px;
      padding:0 24px;height:56px;
    }
    .logo{
      font-family:var(--ff-display);font-size:1.4rem;
      color:var(--accent);text-decoration:none;
      letter-spacing:0.05em;white-space:nowrap;margin-right:8px;
    }
    .logo span{color:var(--text-2)}

    /* search */
    .search-wrap{
      flex:1;max-width:360px;position:relative;
    }
    .search-wrap input{
      width:100%;background:var(--surface);
      border:1px solid var(--border-l);color:var(--text);
      font-family:var(--ff-body);font-size:0.85rem;
      padding:8px 12px 8px 36px;outline:none;
      transition:border-color var(--trans);
    }
    .search-wrap input:focus{border-color:var(--accent)}
    .search-wrap input::placeholder{color:var(--text-3)}
    .search-icon{
      position:absolute;left:11px;top:50%;transform:translateY(-50%);
      color:var(--text-3);font-size:0.85rem;pointer-events:none;
    }

    /* category pill tabs */
    .cat-tabs{display:flex;gap:4px;flex-shrink:0}
    .cat-tab{
      background:transparent;border:1px solid var(--border-l);
      color:var(--text-2);font-family:var(--ff-body);font-size:0.78rem;
      padding:6px 14px;cursor:pointer;white-space:nowrap;
      transition:all var(--trans);letter-spacing:0.04em;
    }
    .cat-tab:hover{border-color:var(--text-3);color:var(--text)}
    .cat-tab.active{background:var(--accent);border-color:var(--accent);color:#000;font-weight:600}

    /* sort */
    .sort-wrap{margin-left:auto;flex-shrink:0}
    .sort-select{
      background:var(--surface);border:1px solid var(--border-l);
      color:var(--text-2);font-family:var(--ff-body);font-size:0.78rem;
      padding:6px 10px;cursor:pointer;outline:none;
    }
    .sort-select:focus{border-color:var(--accent)}

    /* compare bar */
    .compare-bar{
      position:fixed;bottom:0;left:0;right:0;z-index:150;
      background:var(--surface);border-top:1px solid var(--border-l);
      display:flex;align-items:center;gap:16px;
      padding:12px 24px;
      transform:translateY(100%);
      transition:transform 0.3s cubic-bezier(0.4,0,0.2,1);
    }
    .compare-bar.visible{transform:translateY(0)}
    .compare-slots{display:flex;gap:12px;flex:1}
    .compare-slot{
      background:var(--card);border:1px solid var(--border-l);
      padding:8px 14px;font-size:0.8rem;color:var(--text-2);
      min-width:160px;display:flex;align-items:center;justify-content:space-between;gap:8px;
    }
    .compare-slot.filled{border-color:var(--green-b);color:var(--text)}
    .slot-name{font-size:0.82rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:130px}
    .slot-clear{background:none;border:none;color:var(--text-3);cursor:pointer;font-size:0.9rem;padding:0;line-height:1;transition:color var(--trans)}
    .slot-clear:hover{color:var(--red)}
    .compare-actions{display:flex;gap:10px;flex-shrink:0}
    .btn-compare{
      background:var(--green);color:#000;border:none;
      font-family:var(--ff-body);font-weight:700;font-size:0.85rem;
      padding:10px 24px;cursor:pointer;text-transform:uppercase;
      letter-spacing:0.06em;transition:all var(--trans);white-space:nowrap;
    }
    .btn-compare:hover{background:#fff;transform:translateY(-1px)}
    .btn-compare:disabled{background:var(--border-l);color:var(--text-3);cursor:not-allowed;transform:none}
    .btn-clear-all{
      background:transparent;border:1px solid var(--border-l);color:var(--text-2);
      font-family:var(--ff-body);font-size:0.78rem;padding:10px 16px;cursor:pointer;
      transition:all var(--trans);white-space:nowrap;
    }
    .btn-clear-all:hover{border-color:var(--red);color:var(--red)}

    /* ── MAIN LAYOUT ── */
    .layout{display:flex;min-height:calc(100vh - 56px)}

    /* sidebar */
    .sidebar{
      width:220px;flex-shrink:0;
      border-right:1px solid var(--border);
      padding:20px 0;
      position:sticky;top:56px;
      height:calc(100vh - 56px);overflow-y:auto;
    }
    .sidebar-section{margin-bottom:24px;padding:0 16px}
    .sidebar-label{
      font-size:0.65rem;letter-spacing:0.2em;text-transform:uppercase;
      color:var(--text-3);margin-bottom:10px;
    }
    .filter-group{display:flex;flex-direction:column;gap:4px}
    .filter-chip{
      background:transparent;border:1px solid var(--border-l);
      color:var(--text-2);font-family:var(--ff-body);font-size:0.78rem;
      padding:6px 10px;cursor:pointer;text-align:left;
      transition:all var(--trans);
    }
    .filter-chip:hover{border-color:var(--text-3);color:var(--text)}
    .filter-chip.active{background:var(--accent-dim);border-color:var(--accent);color:var(--accent)}
    .price-range{padding:0 4px}
    .price-inputs{display:flex;gap:8px;align-items:center}
    .price-input{
      width:80px;background:var(--surface);border:1px solid var(--border-l);
      color:var(--text);font-family:var(--ff-body);font-size:0.78rem;
      padding:6px 8px;outline:none;transition:border-color var(--trans);
    }
    .price-input:focus{border-color:var(--accent)}
    .price-sep{color:var(--text-3);font-size:0.75rem}
    .rating-filter{display:flex;flex-direction:column;gap:4px}
    .rating-opt{
      display:flex;align-items:center;gap:8px;cursor:pointer;
      padding:4px 0;
    }
    .rating-opt input{accent-color:var(--accent)}
    .rating-opt span{font-size:0.8rem;color:var(--text-2)}
    .rating-stars{color:var(--amber);font-size:0.75rem}

    /* ad slot sidebar */
    .ad-slot-sidebar{
      margin:0 16px;
      background:var(--surface);border:1px dashed var(--border-l);
      padding:16px;text-align:center;
    }
    .ad-label{font-size:0.6rem;letter-spacing:0.15em;text-transform:uppercase;color:var(--text-3);margin-bottom:8px}
    .ad-placeholder{width:100%;height:150px;background:var(--border);display:flex;align-items:center;justify-content:center;color:var(--text-3);font-size:0.75rem}

    /* ── CONTENT ── */
    .content{flex:1;padding:20px 24px 100px;min-width:0}

    /* top ad banner */
    .ad-banner{
      background:var(--surface);border:1px dashed var(--border-l);
      padding:14px 20px;margin-bottom:20px;
      display:flex;align-items:center;justify-content:space-between;gap:16px;
    }
    .ad-banner-label{font-size:0.6rem;letter-spacing:0.15em;text-transform:uppercase;color:var(--text-3)}
    .ad-banner-placeholder{flex:1;height:60px;background:var(--border);display:flex;align-items:center;justify-content:center;color:var(--text-3);font-size:0.8rem}

    /* results meta */
    .results-meta{
      display:flex;align-items:center;justify-content:space-between;
      margin-bottom:16px;
    }
    .results-count{font-size:0.82rem;color:var(--text-2)}
    .results-count strong{color:var(--text);font-weight:600}

    /* active filters */
    .active-filters{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px}
    .filter-tag{
      display:flex;align-items:center;gap:6px;
      background:var(--accent-dim);border:1px solid var(--accent);
      color:var(--accent);font-size:0.72rem;padding:3px 10px;
    }
    .filter-tag button{background:none;border:none;color:var(--accent);cursor:pointer;font-size:0.85rem;line-height:1;padding:0}

    /* grid */
    .products-grid{
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(270px,1fr));
      gap:10px;
    }

    /* card */
    .product-card{
      background:var(--card);border:1px solid var(--border);
      padding:20px;cursor:pointer;position:relative;overflow:hidden;
      transition:border-color var(--trans),background var(--trans),transform var(--trans);
      display:flex;flex-direction:column;
      animation:cardIn 0.3s ease both;
    }
    .product-card::before{
      content:'';position:absolute;top:0;left:0;right:0;height:2px;
      background:var(--accent);transform:scaleX(0);transform-origin:left;
      transition:transform 0.25s ease;
    }
    .product-card:hover{border-color:var(--border-l);background:var(--card-h);transform:translateY(-2px)}
    .product-card:hover::before{transform:scaleX(1)}
    .product-card.selected{border-color:var(--green-b);background:var(--green-bg)}
    .product-card.selected::before{background:var(--green);transform:scaleX(1)}

    @keyframes cardIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

    .selected-badge{
      position:absolute;top:10px;right:10px;
      background:var(--green);color:#000;
      font-size:0.6rem;font-weight:700;padding:3px 8px;
      letter-spacing:0.08em;text-transform:uppercase;
      opacity:0;transform:scale(0.8);transition:all var(--trans);
    }
    .product-card.selected .selected-badge{opacity:1;transform:scale(1)}

    .product-emoji{font-size:2rem;margin-bottom:12px;display:block}
    .product-brand{font-size:0.65rem;letter-spacing:0.18em;text-transform:uppercase;color:var(--accent);margin-bottom:4px}
    .product-name{font-family:var(--ff-display);font-size:1.25rem;letter-spacing:0.02em;line-height:1.1;margin-bottom:10px}
    .product-price{font-family:var(--ff-display);font-size:2rem;color:var(--accent);line-height:1;margin-bottom:4px}
    .product-retailer{font-size:0.72rem;color:var(--text-3);margin-bottom:14px}

    .quality-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
    .quality-bar-wrap{flex:1;height:3px;background:var(--border-l);border-radius:2px;overflow:hidden}
    .quality-bar-fill{height:100%;background:var(--accent);border-radius:2px;transition:width 0.6s ease}
    .quality-num{font-size:0.72rem;color:var(--text-2);white-space:nowrap}

    .stars-row{display:flex;align-items:center;gap:6px;margin-bottom:8px}
    .stars{color:var(--amber);font-size:0.78rem;letter-spacing:1px}
    .rating-num{font-size:0.78rem;font-weight:600}
    .review-count{font-size:0.7rem;color:var(--text-3)}

    .expert-snippet{
      font-size:0.74rem;color:var(--text-2);font-style:italic;
      border-left:2px solid var(--accent);padding-left:8px;
      line-height:1.5;margin-bottom:14px;
      display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
    }

    .card-tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:14px;margin-top:auto}
    .tag{
      font-size:0.65rem;padding:3px 8px;border:1px solid var(--border-l);
      color:var(--text-3);letter-spacing:0.05em;
    }

    .card-actions{display:flex;gap:8px;margin-top:auto}
    .btn-details{
      flex:1;background:transparent;border:1px solid var(--border-l);
      color:var(--text-2);font-family:var(--ff-body);font-size:0.75rem;
      padding:8px;cursor:pointer;transition:all var(--trans);
    }
    .btn-details:hover{border-color:var(--text);color:var(--text)}
    .btn-buy{
      flex:1;background:var(--accent);border:none;color:#000;
      font-family:var(--ff-body);font-weight:700;font-size:0.75rem;
      padding:8px;cursor:pointer;text-decoration:none;
      display:flex;align-items:center;justify-content:center;gap:4px;
      transition:background var(--trans);
    }
    .btn-buy:hover{background:#fff}

    /* ── COMPARISON PANEL ── */
    .comparison-panel{
      display:none;margin-bottom:20px;
      background:var(--surface);border:1px solid var(--border-l);
      animation:slideDown 0.3s ease;
    }
    .comparison-panel.visible{display:block}
    @keyframes slideDown{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}

    .comp-header{
      display:flex;align-items:center;justify-content:space-between;
      padding:16px 24px;border-bottom:1px solid var(--border);
    }
    .comp-title{font-family:var(--ff-display);font-size:1.3rem;letter-spacing:0.05em}
    .comp-close{
      background:none;border:1px solid var(--border-l);color:var(--text-2);
      width:30px;height:30px;cursor:pointer;font-size:0.9rem;
      transition:all var(--trans);
    }
    .comp-close:hover{border-color:var(--red);color:var(--red)}

    .comp-body{display:grid;grid-template-columns:1fr 60px 1fr}
    .comp-col{padding:24px}
    .comp-vs{
      display:flex;align-items:center;justify-content:center;
      border-left:1px solid var(--border);border-right:1px solid var(--border);
    }
    .comp-vs-text{font-family:var(--ff-display);font-size:1.8rem;color:var(--border-l)}

    .comp-product-brand{font-size:0.65rem;letter-spacing:0.15em;text-transform:uppercase;color:var(--accent);margin-bottom:4px}
    .comp-product-name{font-family:var(--ff-display);font-size:1.3rem;letter-spacing:0.02em;margin-bottom:4px}
    .comp-price{font-family:var(--ff-display);font-size:2.2rem;color:var(--accent);margin-bottom:16px}

    .comp-specs{border-top:1px solid var(--border);padding-top:16px;margin-bottom:16px}
    .comp-spec-row{
      display:flex;justify-content:space-between;align-items:center;
      padding:7px 0;border-bottom:1px solid rgba(255,255,255,0.04);font-size:0.82rem;
    }
    .comp-spec-key{color:var(--text-2)}
    .comp-spec-val{font-weight:500;text-align:right}
    .comp-spec-val.win{color:var(--green)}

    .comp-buy{
      display:inline-block;background:var(--accent);color:#000;
      font-family:var(--ff-body);font-weight:700;font-size:0.82rem;
      padding:10px 24px;text-decoration:none;text-transform:uppercase;
      letter-spacing:0.05em;transition:background var(--trans);margin-top:4px;
    }
    .comp-buy:hover{background:#fff}

    .comp-ai{
      grid-column:1/-1;padding:20px 24px;
      border-top:1px solid var(--border);
      background:rgba(212,255,0,0.03);
    }
    .comp-ai-label{
      font-size:0.65rem;letter-spacing:0.2em;text-transform:uppercase;
      color:var(--accent);margin-bottom:8px;
    }
    .comp-ai-text{font-size:0.9rem;line-height:1.7;color:var(--text)}

    /* winner badge */
    .winner-badge{
      display:inline-block;background:var(--accent);color:#000;
      font-size:0.6rem;font-weight:700;padding:2px 8px;
      letter-spacing:0.1em;text-transform:uppercase;margin-bottom:8px;
    }

    /* ── MODAL ── */
    .modal-overlay{
      position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:500;
      display:none;align-items:center;justify-content:center;padding:20px;
    }
    .modal-overlay.open{display:flex}
    .modal{
      background:var(--surface);border:1px solid var(--border-l);
      width:100%;max-width:540px;max-height:90vh;overflow-y:auto;
      animation:modalIn 0.22s ease;
    }
    @keyframes modalIn{from{opacity:0;transform:scale(0.97) translateY(12px)}to{opacity:1;transform:none}}

    .modal-header{
      display:flex;align-items:flex-start;justify-content:space-between;
      padding:20px 20px 14px;border-bottom:1px solid var(--border);
      position:sticky;top:0;background:var(--surface);z-index:1;
    }
    .modal-emoji{font-size:2rem;margin-bottom:8px}
    .modal-name{font-family:var(--ff-display);font-size:1.5rem;letter-spacing:0.02em}
    .modal-brand{font-size:0.7rem;color:var(--accent);letter-spacing:0.12em;text-transform:uppercase;margin-top:2px}
    .modal-close{
      background:none;border:1px solid var(--border-l);color:var(--text-2);
      width:30px;height:30px;cursor:pointer;flex-shrink:0;margin-left:12px;
      font-size:0.9rem;transition:all var(--trans);
    }
    .modal-close:hover{border-color:var(--red);color:var(--red)}

    .modal-body{padding:20px}
    .modal-price{font-family:var(--ff-display);font-size:2.8rem;color:var(--accent);line-height:1;margin-bottom:4px}
    .modal-retailer{font-size:0.8rem;color:var(--text-3);margin-bottom:12px}

    .modal-rating-row{display:flex;align-items:center;gap:10px;margin-bottom:18px}
    .modal-stars{color:var(--amber);font-size:1rem}
    .modal-rating-num{font-family:var(--ff-display);font-size:1.5rem}
    .modal-rating-source{font-size:0.72rem;color:var(--text-3)}

    .modal-section-label{font-size:0.62rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--accent);margin-bottom:10px;margin-top:18px}

    .modal-specs{}
    .modal-spec-row{
      display:flex;justify-content:space-between;align-items:center;
      padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.05);font-size:0.85rem;
    }
    .modal-spec-key{color:var(--text-2)}
    .modal-spec-val{font-weight:500;text-align:right}

    .modal-aspects{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:4px}
    .aspect-tag{font-size:0.68rem;padding:3px 10px;border:1px solid var(--border-l);color:var(--text-3)}

    .review-item{padding:12px 0;border-bottom:1px solid rgba(255,255,255,0.05)}
    .review-item:last-child{border-bottom:none}
    .review-author{font-size:0.72rem;font-weight:600;color:var(--text);margin-bottom:4px}
    .review-text{font-size:0.82rem;color:var(--text-2);line-height:1.6;font-style:italic}

    .modal-buy{
      display:block;text-align:center;background:var(--accent);color:#000;
      font-family:var(--ff-body);font-weight:700;font-size:0.9rem;
      padding:14px;text-decoration:none;text-transform:uppercase;
      letter-spacing:0.05em;margin-top:18px;transition:background var(--trans);
    }
    .modal-buy:hover{background:#fff}

    /* ── AD SLOT IN GRID ── */
    .ad-card{
      background:var(--surface);border:1px dashed var(--border-l);
      padding:20px;display:flex;flex-direction:column;
      align-items:center;justify-content:center;
      min-height:200px;text-align:center;
    }
    .ad-card .ad-label{font-size:0.6rem;letter-spacing:0.15em;text-transform:uppercase;color:var(--text-3);margin-bottom:10px}
    .ad-card .ad-placeholder{width:100%;height:120px;background:var(--border);display:flex;align-items:center;justify-content:center;color:var(--text-3);font-size:0.75rem}

    /* ── EMPTY STATE ── */
    .empty-state{
      grid-column:1/-1;text-align:center;padding:80px 20px;color:var(--text-3);
    }
    .empty-state .empty-icon{font-size:3rem;margin-bottom:16px;display:block}
    .empty-state p{font-size:0.9rem;line-height:1.6}

    /* ── MOBILE ── */
    @media(max-width:900px){
      .sidebar{display:none}
      .topbar{padding:0 14px;gap:8px}
      .content{padding:14px 14px 120px}
      .logo{font-size:1.2rem}
      .sort-wrap{display:none}
    }
    @media(max-width:600px){
      .cat-tabs .cat-tab{padding:5px 10px;font-size:0.72rem}
      .products-grid{grid-template-columns:1fr}
      .compare-bar{padding:10px 14px}
      .compare-slots{flex-direction:column;gap:6px}
      .compare-slot{min-width:unset}
      .comp-body{grid-template-columns:1fr}
      .comp-vs{display:none}
      .comp-col{border-bottom:1px solid var(--border)}
      .ad-banner{display:none}
    }

    /* ── MOBILE FILTER DRAWER ── */
    .filter-btn{
      display:none;background:var(--surface);border:1px solid var(--border-l);
      color:var(--text-2);font-family:var(--ff-body);font-size:0.78rem;
      padding:6px 12px;cursor:pointer;gap:6px;align-items:center;
    }
    @media(max-width:900px){.filter-btn{display:flex}}
    .filter-drawer{
      position:fixed;top:0;left:0;bottom:0;width:260px;z-index:300;
      background:var(--surface);border-right:1px solid var(--border-l);
      transform:translateX(-100%);transition:transform 0.3s ease;
      overflow-y:auto;padding:20px 0;
    }
    .filter-drawer.open{transform:translateX(0)}
    .drawer-overlay{

// ── STATE ────────────────────────────────────────────────────
let currentCategory = null;
let selectedIds = [];
let filters = { brand: 'all', minPrice: '', maxPrice: '', minRating: 0 };
let sortMode = 'default';
let searchQuery = '';

// ── HELPERS ──────────────────────────────────────────────────
function starsHTML(r) {
  const f = Math.floor(r), h = r % 1 >= 0.5 ? 1 : 0, e = 5 - f - h;
  return '★'.repeat(f) + (h ? '½' : '') + '☆'.repeat(e);
}

function getProductById(id) {
  if (!currentCategory) return null;
  return allProducts[currentCategory].find(p => p.id === id);
}

function getAllBrands() {
  if (!currentCategory) return [];
  return [...new Set(allProducts[currentCategory].map(p => p.brand))].sort();
}

// ── FILTER / SORT ────────────────────────────────────────────
function getFilteredProducts() {
  let list = allProducts[currentCategory] || [];
  const q = searchQuery.toLowerCase();

  if (q) list = list.filter(p =>
    p.name.toLowerCase().includes(q) ||
    p.brand.toLowerCase().includes(q) ||
    p.aspects.some(a => a.toLowerCase().includes(q))
  );
  if (filters.brand !== 'all') list = list.filter(p => p.brand === filters.brand);
  if (filters.minPrice) list = list.filter(p => p.price >= Number(filters.minPrice));
  if (filters.maxPrice) list = list.filter(p => p.price <= Number(filters.maxPrice));
  if (filters.minRating > 0) list = list.filter(p => p.rating >= filters.minRating);

  switch(sortMode) {
    case 'price-asc': list = [...list].sort((a,b) => a.price - b.price); break;
    case 'price-desc': list = [...list].sort((a,b) => b.price - a.price); break;
    case 'rating': list = [...list].sort((a,b) => b.rating - a.rating); break;
    case 'quality': list = [...list].sort((a,b) => b.quality - a.quality); break;
  }
  return list;
}

function applyFilters() {
  searchQuery = document.getElementById('searchInput').value;
  sortMode = document.getElementById('sortSelect').value;
  renderProducts();
  renderActiveFilters();
}

// ── CATEGORY ─────────────────────────────────────────────────
function selectCategory(cat, el) {
  currentCategory = cat;
  selectedIds = [];
  filters = { brand:'all', minPrice:'', maxPrice:'', minRating:0 };
  searchQuery = '';
  sortMode = 'default';
  document.getElementById('searchInput').value = '';
  document.getElementById('sortSelect').value = 'default';

  document.querySelectorAll('.cat-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');

  closeComparison();
  updateCompareBar();
  renderSidebar();
  renderProducts();
  renderActiveFilters();
}

// ── SIDEBAR ───────────────────────────────────────────────────
function buildSidebarHTML() {
  const brands = getAllBrands();
  return `
    <div class="sidebar-section">
      <div class="sidebar-label">Brand</div>
      <div class="filter-group">
        <button class="filter-chip ${filters.brand === 'all' ? 'active' : ''}" onclick="setBrand('all')">All Brands</button>
        ${brands.map(b => `<button class="filter-chip ${filters.brand === b ? 'active' : ''}" onclick="setBrand('${b}')">${b}</button>`).join('')}
      </div>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-label">Price Range</div>
      <div class="price-range">
        <div class="price-inputs">
          <input class="price-input" type="number" placeholder="Min $" id="minPrice" value="${filters.minPrice}" oninput="setPrice()"/>
          <span class="price-sep">–</span>
          <input class="price-input" type="number" placeholder="Max $" id="maxPrice" value="${filters.maxPrice}" oninput="setPrice()"/>
        </div>

          </label>
        `).join('')}

      <div class="ad-label">Advertisement</div>
      <div class="ad-placeholder">160×600<br>Skyscraper Ad</div>
    </div>
  `;
}

function renderSidebar() {
  const html = buildSidebarHTML();
  document.getElementById('sidebarContent').innerHTML = html;
  document.getElementById('drawerContent').innerHTML = html;
}

function setBrand(b) {
  filters.brand = b;
  renderSidebar();
  renderProducts();
  renderActiveFilters();
}
function setPrice() {
  filters.minPrice = document.getElementById('minPrice')?.value || '';
  filters.maxPrice = document.getElementById('maxPrice')?.value || '';
  renderProducts();
  renderActiveFilters();
}
function setRating(r) {
  filters.minRating = r;
  renderProducts();
  renderActiveFilters();
}

function renderActiveFilters() {
  const tags = [];
  if (filters.brand !== 'all') tags.push({label: filters.brand, clear: () => setBrand('all')});
  if (filters.minPrice) tags.push({label: `$${filters.minPrice}+`, clear: () => { filters.minPrice = ''; renderSidebar(); renderProducts(); renderActiveFilters(); }});
  if (filters.maxPrice) tags.push({label: `Up to $${filters.maxPrice}`, clear: () => { filters.maxPrice = ''; renderSidebar(); renderProducts(); renderActiveFilters(); }});
  if (filters.minRating > 0) tags.push({label: `${filters.minRating}★+`, clear: () => { filters.minRating = 0; renderSidebar(); renderProducts(); renderActiveFilters(); }});
  if (searchQuery) tags.push({label: `"${searchQuery}"`, clear: () => { searchQuery = ''; document.getElementById('searchInput').value = ''; renderProducts(); renderActiveFilters(); }});

  const el = document.getElementById('activeFilters');
  el.innerHTML = tags.map((t, i) => `
    <div class="filter-tag">${t.label}<button onclick="clearFilterTag(${i})">✕</button></div>
  `).join('');
  window._filterTagClears = tags.map(t => t.clear);
}

window.clearFilterTag = function(i) {
  window._filterTagClears[i]();
};

// ── RENDER PRODUCTS ───────────────────────────────────────────
function renderProducts() {
  const grid = document.getElementById('productsGrid');
  if (!currentCategory) return;

  const list = getFilteredProducts();
  const countEl = document.getElementById('resultsCount');
  countEl.innerHTML = `Showing <strong>${list.length}</strong> of ${allProducts[currentCategory].length} products`;

  if (list.length === 0) {
    grid.innerHTML = `<div class="empty-state"><span class="empty-icon">🔍</span><p>No products match your filters.<br>Try adjusting your search or clearing filters.</p></div>`;
    return;
  }

  // Insert an ad card every 6 products
  let html = '';
  list.forEach((p, i) => {
    if (i > 0 && i % 6 === 0) {
      html += `<div class="ad-card"><div class="ad-label">Advertisement</div><div class="ad-placeholder">300×250 Ad Slot</div></div>`;
    }
    const isSel = selectedIds.includes(p.id);
    html += `
      <div class="product-card ${isSel ? 'selected' : ''}" id="card-${p.id}" onclick="toggleSelect('${p.id}')" style="animation-delay:${Math.min(i*0.04,0.3)}s">
        <div class="selected-badge">✓ Selected</div>
        <span class="product-emoji">${p.emoji}</span>
        <div class="product-brand">${p.brand}</div>
        <div class="product-name">${p.name}</div>
        <div class="product-price">$${p.price.toLocaleString()}</div>
        <div class="product-retailer">via ${p.retailer}</div>
        <div class="quality-row">
          <div class="quality-bar-wrap"><div class="quality-bar-fill" style="width:${p.quality*10}%"></div></div>
          <div class="quality-num">${p.quality}/10</div>
        </div>
        <div class="stars-row">
          <span class="stars">${starsHTML(p.rating)}</span>
          <span class="rating-num">${p.rating}</span>
          <span class="review-count">(${p.reviewCount.toLocaleString()})</span>
        </div>
        <div class="expert-snippet">"${p.expertVerdict}" — ${p.expertSource}</div>
        <div class="card-tags">${p.aspects.map(a => `<span class="tag">${a}</span>`).join('')}</div>
        <div class="card-actions">
          <button class="btn-details" onclick="event.stopPropagation();openModal('${p.id}')">Details & Reviews</button>
          <a class="btn-buy" href="${p.url}" target="_blank" rel="noopener" onclick="event.stopPropagation()">Buy →</a>
        </div>
      </div>
    `;
  });
  grid.innerHTML = html;
}

// ── SELECTION ─────────────────────────────────────────────────
function toggleSelect(id) {
  if (selectedIds.includes(id)) {
    selectedIds = selectedIds.filter(x => x !== id);
  } else {
    if (selectedIds.length >= 2) selectedIds.shift();
    selectedIds.push(id);
  }
  // Update card classes without full re-render
  document.querySelectorAll('.product-card').forEach(c => c.classList.remove('selected'));
  selectedIds.forEach(id => document.getElementById('card-'+id)?.classList.add('selected'));
  updateCompareBar();
}

function clearAll() {
  selectedIds = [];
  document.querySelectorAll('.product-card').forEach(c => c.classList.remove('selected'));
  updateCompareBar();
  closeComparison();
}

// ── COMPARE BAR ───────────────────────────────────────────────
function updateCompareBar() {
  const bar = document.getElementById('compareBar');
  const btn = document.getElementById('compareBtn');
  const s0 = document.getElementById('slot0');
  const s1 = document.getElementById('slot1');

  if (selectedIds.length > 0) {
    bar.classList.add('visible');
    const p0 = getProductById(selectedIds[0]);
    s0.classList.add('filled');
    s0.innerHTML = `<span class="slot-name">${p0 ? p0.name : '…'}</span><button class="slot-clear" onclick="removeFromSlot(0)">✕</button>`;
  } else {
    bar.classList.remove('visible');
    s0.classList.remove('filled');
    s0.innerHTML = `<span class="slot-name">Select a product…</span>`;
  }

  if (selectedIds.length > 1) {
    const p1 = getProductById(selectedIds[1]);
    s1.classList.add('filled');
    s1.innerHTML = `<span class="slot-name">${p1 ? p1.name : '…'}</span><button class="slot-clear" onclick="removeFromSlot(1)">✕</button>`;
    btn.disabled = false;
  } else {
    s1.classList.remove('filled');
    s1.innerHTML = `<span class="slot-name">Select another…</span>`;
    btn.disabled = true;
  }
}

function removeFromSlot(i) {
  const id = selectedIds[i];
  selectedIds.splice(i, 1);
  document.getElementById('card-'+id)?.classList.remove('selected');
  updateCompareBar();
  closeComparison();
}

// ── COMPARISON PANEL ──────────────────────────────────────────
function showComparison() {
  if (selectedIds.length < 2) return;
  const p1 = getProductById(selectedIds[0]);
  const p2 = getProductById(selectedIds[1]);

  // Determine winner per spec
  const wins = getWinners(p1, p2);
  const summary = generateSummary(p1, p2);

  document.getElementById('compBody').innerHTML = `
    <div class="comp-col">
      ${wins.overall === 'p1' ? '<div class="winner-badge">🏆 Recommended</div>' : ''}
      <div class="comp-product-brand">${p1.brand}</div>
      <div class="comp-product-name">${p1.name}</div>
      <div class="comp-price">$${p1.price.toLocaleString()}</div>
      <div class="stars-row"><span class="stars">${starsHTML(p1.rating)}</span><span class="rating-num">${p1.rating}</span></div>
      <div class="comp-specs">
        ${Object.entries(p1.specs).map(([k,v],i) => {
          const vals2 = Object.values(p2.specs);
          return `<div class="comp-spec-row"><span class="comp-spec-key">${k}</span><span class="comp-spec-val">${v}</span></div>`;
        }).join('')}
        <div class="comp-spec-row"><span class="comp-spec-key">Quality Score</span><span class="comp-spec-val ${p1.quality > p2.quality ? 'win' : ''}">${p1.quality}/10</span></div>
        <div class="comp-spec-row"><span class="comp-spec-key">Rating</span><span class="comp-spec-val ${p1.rating > p2.rating ? 'win' : ''}">${p1.rating} ★</span></div>
        <div class="comp-spec-row"><span class="comp-spec-key">Reviews</span><span class="comp-spec-val">${p1.reviewCount.toLocaleString()}</span></div>
      </div>
      <a href="${p1.url}" target="_blank" rel="noopener" class="comp-buy">Buy from ${p1.retailer} →</a>
    </div>
    <div class="comp-vs"><div class="comp-vs-text">VS</div></div>
    <div class="comp-col">
      ${wins.overall === 'p2' ? '<div class="winner-badge">🏆 Recommended</div>' : ''}
      <div class="comp-product-brand">${p2.brand}</div>
      <div class="comp-product-name">${p2.name}</div>
      <div class="comp-price">$${p2.price.toLocaleString()}</div>
      <div class="stars-row"><span class="stars">${starsHTML(p2.rating)}</span><span class="rating-num">${p2.rating}</span></div>
      <div class="comp-specs">
        ${Object.entries(p2.specs).map(([k,v]) => `<div class="comp-spec-row"><span class="comp-spec-key">${k}</span><span class="comp-spec-val">${v}</span></div>`).join('')}
        <div class="comp-spec-row"><span class="comp-spec-key">Quality Score</span><span class="comp-spec-val ${p2.quality > p1.quality ? 'win' : ''}">${p2.quality}/10</span></div>
        <div class="comp-spec-row"><span class="comp-spec-key">Rating</span><span class="comp-spec-val ${p2.rating > p1.rating ? 'win' : ''}">${p2.rating} ★</span></div>
        <div class="comp-spec-row"><span class="comp-spec-key">Reviews</span><span class="comp-spec-val">${p2.reviewCount.toLocaleString()}</span></div>
      </div>
      <a href="${p2.url}" target="_blank" rel="noopener" class="comp-buy">Buy from ${p2.retailer} →</a>
    </div>
    <div class="comp-ai">
      <div class="comp-ai-label">🤖 AI Verdict</div>
      <div class="comp-ai-text">${summary}</div>
    </div>
  `;

  const panel = document.getElementById('compPanel');
  panel.classList.add('visible');
  panel.scrollIntoView({ behavior:'smooth', block:'start' });
}

function getWinners(p1, p2) {
  const val1 = p1.quality / p1.price;
  const val2 = p2.quality / p2.price;
  const score1 = p1.quality * 0.4 + p1.rating * 0.3 + val1 * 100 * 0.3;
  const score2 = p2.quality * 0.4 + p2.rating * 0.3 + val2 * 100 * 0.3;
  return { overall: score1 > score2 ? 'p1' : 'p2' };
}

function generateSummary(p1, p2) {
  const cheaper = p1.price < p2.price ? p1 : p2;
  const pricier = p1.price < p2.price ? p2 : p1;
  const diff = Math.abs(p1.price - p2.price);
  const qualWinner = p1.quality >= p2.quality ? p1 : p2;
  const val1 = p1.quality / p1.price, val2 = p2.quality / p2.price;
  const valWinner = val1 >= val2 ? p1 : p2;

  if (diff === 0) {
    return `Both products are identically priced at $${p1.price}. The <strong>${qualWinner.name}</strong> edges ahead with a higher quality score of ${qualWinner.quality}/10 — go with that one.`;
  }
  if (diff < 40) {
    return `At only $${diff} apart, this comes down to quality. The <strong>${qualWinner.name}</strong> scores ${qualWinner.quality}/10 vs ${(qualWinner === p1 ? p2 : p1).quality}/10 — for $${diff} more you're getting a noticeably better product. The <strong>${qualWinner.name}</strong> is the clear choice.`;
  }
  if (valWinner === cheaper) {
    return `The <strong>${cheaper.name}</strong> is $${diff} cheaper AND delivers better value per dollar (${(val1 > val2 ? val1 : val2).toFixed(4)} quality/$ vs ${(val1 < val2 ? val1 : val2).toFixed(4)}). Unless you specifically need something the <strong>${pricier.name}</strong> offers, the <strong>${cheaper.name}</strong> is the smarter buy.`;
  } else {
    return `The <strong>${pricier.name}</strong> costs $${diff} more but earns it with a quality score of ${pricier.quality}/10 vs ${cheaper.quality}/10, and better value per dollar overall. If budget allows, invest in the <strong>${pricier.name}</strong> — it will last longer and perform better.`;
  }
}

function closeComparison() {
  document.getElementById('compPanel').classList.remove('visible');
}

        ${Object.entries(p.specs).map(([k,v]) => `<div class="modal-spec-row"><span class="modal-spec-key">${k}</span><span class="modal-spec-val">${v}</span></div>`).join('')}
        <div class="modal-spec-row"><span class="modal-spec-key">Quality Score</span><span class="modal-spec-val">${p.quality}/10</span></div>
      </div>
      <div class="modal-section-label">Highlights</div>
      <div class="modal-aspects">${p.aspects.map(a => `<span class="aspect-tag">${a}</span>`).join('')}</div>
      <div class="modal-section-label">💬 What People Are Saying</div>
      ${p.reviews.map(r => `<div class="review-item"><div class="review-author">${r.author}</div><div class="review-text">"${r.text}"</div></div>`).join('')}
      <a href="${p.url}" target="_blank" rel="noopener" class="modal-buy">Shop at ${p.retailer} →</a>
    </div>
  `;
  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal(e) {
  if (!e || e.target === document.getElementById('modalOverlay')) {
    document.getElementById('modalOverlay').classList.remove('open');
    document.body.style.overflow = '';
  }
}

// ── MOBILE DRAWER ─────────────────────────────────────────────
function openDrawer() {
  document.getElementById('filterDrawer').classList.add('open');
  document.getElementById('drawerOverlay').classList.add('open');
}
function closeDrawer() {
  document.getElementById('filterDrawer').classList.remove('open');
  document.getElementById('drawerOverlay').classList.remove('open');
}
</script>
</body>
</html>
