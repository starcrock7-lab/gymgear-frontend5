<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GymGear Compare Pro</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#080808;--surface:#101010;--card:#141414;--card-h:#1b1b1b;
      --border:#1e1e1e;--border-l:#2a2a2a;
      --accent:#d4ff00;--accent-dim:rgba(212,255,0,0.07);
      --green:#4ade80;--green-bg:rgba(74,222,128,0.07);--green-b:rgba(74,222,128,0.35);
      --amber:#f59e0b;--red:#ef4444;--blue:#3b82f6;
      --text:#f0f0f0;--text-2:#888;--text-3:#444;
      --ff:'Bebas Neue',sans-serif;--fb:'DM Sans',sans-serif;
      --ease:0.18s ease;
    }
    html{scroll-behavior:smooth}
    body{background:var(--bg);color:var(--text);font-family:var(--fb);overflow-x:hidden;min-height:100vh}
    ::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--border-l)}

    /* ─ TOPBAR ─ */
    .topbar{
      position:sticky;top:0;z-index:200;height:52px;
      background:rgba(8,8,8,0.94);backdrop-filter:blur(18px);
      border-bottom:1px solid var(--border);
      display:flex;align-items:center;gap:10px;padding:0 20px;
    }
    .logo{font-family:var(--ff);font-size:1.35rem;color:var(--accent);text-decoration:none;letter-spacing:.06em;white-space:nowrap;flex-shrink:0}
    .logo span{color:var(--text-2)}
    .search-wrap{flex:1;max-width:320px;position:relative}
    .search-wrap input{
      width:100%;background:var(--surface);border:1px solid var(--border-l);
      color:var(--text);font-family:var(--fb);font-size:.82rem;
      padding:7px 10px 7px 32px;outline:none;transition:border-color var(--ease);
    }
    .search-wrap input:focus{border-color:var(--accent)}
    .search-wrap input::placeholder{color:var(--text-3)}
    .s-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text-3);font-size:.8rem;pointer-events:none}
    .sort-sel{
      background:var(--surface);border:1px solid var(--border-l);color:var(--text-2);
      font-family:var(--fb);font-size:.75rem;padding:6px 8px;cursor:pointer;outline:none;margin-left:auto;flex-shrink:0;
    }
    .sort-sel:focus{border-color:var(--accent)}
    .topbar-home{color:var(--text-3);font-size:.75rem;text-decoration:none;flex-shrink:0;transition:color var(--ease)}
    .topbar-home:hover{color:var(--text)}

    /* ─ GROUP NAV ─ */
    .group-nav{
      display:flex;border-bottom:1px solid var(--border);
      background:var(--surface);overflow-x:auto;scrollbar-width:none;
    }
    .group-nav::-webkit-scrollbar{display:none}
    .group-btn{
      flex-shrink:0;background:transparent;border:none;border-bottom:2px solid transparent;
      color:var(--text-2);font-family:var(--fb);font-size:.8rem;font-weight:500;
      padding:10px 20px;cursor:pointer;letter-spacing:.04em;transition:all var(--ease);white-space:nowrap;
    }
    .group-btn:hover{color:var(--text)}
    .group-btn.active{color:var(--accent);border-bottom-color:var(--accent)}

    /* ─ CAT TABS ─ */
    .cat-strip{
      display:flex;gap:6px;padding:12px 20px;
      background:var(--bg);border-bottom:1px solid var(--border);
      overflow-x:auto;scrollbar-width:none;
    }
    .cat-strip::-webkit-scrollbar{display:none}
    .cat-tab{
      flex-shrink:0;background:var(--surface);border:1px solid var(--border-l);
      color:var(--text-2);font-family:var(--fb);font-size:.75rem;
      padding:5px 14px;cursor:pointer;transition:all var(--ease);white-space:nowrap;letter-spacing:.03em;
    }
    .cat-tab:hover{border-color:var(--text-3);color:var(--text)}
    .cat-tab.active{background:var(--accent);border-color:var(--accent);color:#000;font-weight:600}

    /* ─ LAYOUT ─ */
    .layout{display:flex;min-height:calc(100vh - 108px)}

    /* sidebar */
    .sidebar{
      width:210px;flex-shrink:0;border-right:1px solid var(--border);
      position:sticky;top:108px;height:calc(100vh - 108px);overflow-y:auto;padding:16px 0;
    }
    .sb-section{padding:0 14px;margin-bottom:20px}
    .sb-label{font-size:.62rem;letter-spacing:.2em;text-transform:uppercase;color:var(--text-3);margin-bottom:8px}
    .filter-chips{display:flex;flex-direction:column;gap:3px}
    .fchip{
      background:transparent;border:1px solid var(--border-l);color:var(--text-2);
      font-family:var(--fb);font-size:.75rem;padding:5px 10px;cursor:pointer;text-align:left;transition:all var(--ease);
    }
    .fchip:hover{border-color:var(--text-3);color:var(--text)}
    .fchip.on{background:var(--accent-dim);border-color:var(--accent);color:var(--accent)}
    .p-inputs{display:flex;gap:6px;align-items:center}
    .p-inp{
      width:74px;background:var(--surface);border:1px solid var(--border-l);
      color:var(--text);font-family:var(--fb);font-size:.75rem;padding:5px 7px;outline:none;transition:border-color var(--ease);
    }
    .p-inp:focus{border-color:var(--accent)}
    .p-sep{color:var(--text-3);font-size:.7rem}
    .r-opts{display:flex;flex-direction:column;gap:4px}
    .r-opt{display:flex;align-items:center;gap:7px;cursor:pointer;padding:3px 0}
    .r-opt input{accent-color:var(--accent)}
    .r-opt span{font-size:.76rem;color:var(--text-2)}
    .r-stars{color:var(--amber);font-size:.72rem}

    /* ad sidebar */
    .sb-ad{margin:0 14px;background:var(--surface);border:1px dashed var(--border-l);padding:12px;text-align:center}
    .ad-lbl{font-size:.58rem;letter-spacing:.15em;text-transform:uppercase;color:var(--text-3);margin-bottom:6px}
    .ad-ph{width:100%;background:var(--border);display:flex;align-items:center;justify-content:center;color:var(--text-3);font-size:.72rem;height:140px}

    /* ─ CONTENT ─ */
    .content{flex:1;padding:16px 20px 120px;min-width:0}

    /* top ad */
    .top-ad{
      background:var(--surface);border:1px dashed var(--border-l);
      display:flex;align-items:center;gap:12px;padding:10px 16px;margin-bottom:16px;
    }
    .top-ad .ad-lbl{white-space:nowrap}
    .top-ad .ad-ph{flex:1;height:52px}

    /* meta row */
    .meta-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;flex-wrap:wrap;gap:8px}
    .meta-count{font-size:.8rem;color:var(--text-2)}
    .meta-count strong{color:var(--text);font-weight:600}
    .meta-refresh{font-size:.68rem;color:var(--text-3)}
    .active-tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px}
    .atag{
      display:flex;align-items:center;gap:5px;
      background:var(--accent-dim);border:1px solid var(--accent);color:var(--accent);font-size:.68rem;padding:2px 8px;
    }
    .atag button{background:none;border:none;color:inherit;cursor:pointer;font-size:.8rem;line-height:1;padding:0}

    /* loading */
    .loading-state{grid-column:1/-1;text-align:center;padding:60px 20px;color:var(--text-3)}
    .spinner{display:inline-block;width:32px;height:32px;border:2px solid var(--border-l);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;margin-bottom:14px}
    @keyframes spin{to{transform:rotate(360deg)}}
    .loading-text{font-size:.85rem;line-height:1.6}

    /* grid */
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(265px,1fr));gap:10px}

    /* card */
    .card{
      background:var(--card);border:1px solid var(--border);
      padding:18px;cursor:pointer;position:relative;overflow:hidden;
      display:flex;flex-direction:column;
      transition:border-color var(--ease),background var(--ease),transform var(--ease);
      animation:cin .28s ease both;
    }
    .card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--accent);transform:scaleX(0);transform-origin:left;transition:transform .24s ease}
    .card:hover{border-color:var(--border-l);background:var(--card-h);transform:translateY(-2px)}
    .card:hover::before{transform:scaleX(1)}
    .card.sel{border-color:var(--green-b);background:var(--green-bg)}
    .card.sel::before{background:var(--green);transform:scaleX(1)}
    @keyframes cin{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

    .sel-badge{
      position:absolute;top:10px;right:10px;background:var(--green);color:#000;
      font-size:.58rem;font-weight:700;padding:2px 7px;letter-spacing:.08em;text-transform:uppercase;
      opacity:0;transform:scale(.85);transition:all var(--ease);
    }
    .card.sel .sel-badge{opacity:1;transform:scale(1)}

    .c-emoji{font-size:1.9rem;margin-bottom:10px;display:block}
    .c-brand{font-size:.62rem;letter-spacing:.18em;text-transform:uppercase;color:var(--accent);margin-bottom:3px}
    .c-name{font-family:var(--ff);font-size:1.2rem;letter-spacing:.02em;line-height:1.1;margin-bottom:8px}
    .c-price{font-family:var(--ff);font-size:1.9rem;color:var(--accent);line-height:1;margin-bottom:3px}
    .c-retailer{font-size:.68rem;color:var(--text-3);margin-bottom:10px}

    .q-row{display:flex;align-items:center;gap:7px;margin-bottom:5px}
    .q-bar{flex:1;height:2px;background:var(--border-l);border-radius:1px;overflow:hidden}
    .q-fill{height:100%;background:var(--accent);border-radius:1px}
    .q-num{font-size:.68rem;color:var(--text-2);white-space:nowrap}

    .s-row{display:flex;align-items:center;gap:5px;margin-bottom:7px}
    .stars{color:var(--amber);font-size:.74rem;letter-spacing:.5px}
    .r-num{font-size:.74rem;font-weight:600}
    .r-cnt{font-size:.66rem;color:var(--text-3)}

    .verdict{
      font-size:.72rem;color:var(--text-2);font-style:italic;
      border-left:2px solid var(--accent);padding-left:7px;line-height:1.5;margin-bottom:10px;
      display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
    }
    .c-tags{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:10px;margin-top:auto}
    .ctag{font-size:.62rem;padding:2px 7px;border:1px solid var(--border-l);color:var(--text-3)}

    .c-actions{display:flex;gap:7px;margin-top:auto}
    .btn-d{flex:1;background:transparent;border:1px solid var(--border-l);color:var(--text-2);font-family:var(--fb);font-size:.72rem;padding:7px;cursor:pointer;transition:all var(--ease)}
    .btn-d:hover{border-color:var(--text);color:var(--text)}
    .btn-b{flex:1;background:var(--accent);border:none;color:#000;font-family:var(--fb);font-weight:700;font-size:.72rem;padding:7px;cursor:pointer;text-decoration:none;display:flex;align-items:center;justify-content:center;transition:background var(--ease)}
    .btn-b:hover{background:#fff}

    /* ad in grid */
    .grid-ad{background:var(--surface);border:1px dashed var(--border-l);padding:16px;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:180px;text-align:center}
    .grid-ad .ad-ph{width:100%;height:100px}

    /* empty */
    .empty{grid-column:1/-1;text-align:center;padding:70px 20px;color:var(--text-3)}
    .empty-icon{font-size:2.5rem;margin-bottom:12px;display:block}
    .empty p{font-size:.85rem;line-height:1.6}

    /* ─ COMPARE BAR ─ */
    .cbar{
      position:fixed;bottom:0;left:0;right:0;z-index:150;
      background:rgba(16,16,16,0.97);backdrop-filter:blur(12px);border-top:1px solid var(--border-l);
      display:flex;align-items:center;gap:12px;padding:10px 20px;
      transform:translateY(100%);transition:transform .28s cubic-bezier(.4,0,.2,1);
    }
    .cbar.vis{transform:none}
    .cslots{display:flex;gap:10px;flex:1}
    .cslot{
      background:var(--card);border:1px solid var(--border-l);padding:7px 12px;
      font-size:.76rem;color:var(--text-2);min-width:150px;
      display:flex;align-items:center;justify-content:space-between;gap:8px;transition:border-color var(--ease);
    }
    .cslot.filled{border-color:var(--green-b);color:var(--text)}
    .sname{font-size:.78rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:120px}
    .sx{background:none;border:none;color:var(--text-3);cursor:pointer;font-size:.85rem;padding:0;line-height:1;transition:color var(--ease)}
    .sx:hover{color:var(--red)}
    .cbar-btns{display:flex;gap:8px;flex-shrink:0}
    .bclear{background:transparent;border:1px solid var(--border-l);color:var(--text-2);font-family:var(--fb);font-size:.75rem;padding:8px 14px;cursor:pointer;transition:all var(--ease);white-space:nowrap}
    .bclear:hover{border-color:var(--red);color:var(--red)}
    .bcomp{background:var(--green);color:#000;border:none;font-family:var(--fb);font-weight:700;font-size:.82rem;padding:8px 22px;cursor:pointer;text-transform:uppercase;letter-spacing:.06em;transition:all var(--ease);white-space:nowrap}
    .bcomp:hover{background:#fff;transform:translateY(-1px)}
    .bcomp:disabled{background:var(--border-l);color:var(--text-3);cursor:not-allowed;transform:none}

    /* ─ COMPARISON PANEL ─ */
    .comp-panel{display:none;background:var(--surface);border:1px solid var(--border-l);margin-bottom:16px;animation:sdown .28s ease}
    .comp-panel.vis{display:block}
    @keyframes sdown{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:none}}
    .cp-head{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid var(--border)}
    .cp-title{font-family:var(--ff);font-size:1.2rem;letter-spacing:.05em}
    .cp-close{background:none;border:1px solid var(--border-l);color:var(--text-2);width:28px;height:28px;cursor:pointer;font-size:.85rem;transition:all var(--ease)}
    .cp-close:hover{border-color:var(--red);color:var(--red)}
    .cp-body{display:grid;grid-template-columns:1fr 54px 1fr}
    .cp-col{padding:20px}
    .cp-vs{display:flex;align-items:center;justify-content:center;border-left:1px solid var(--border);border-right:1px solid var(--border)}
    .cp-vs-t{font-family:var(--ff);font-size:1.6rem;color:var(--border-l)}
    .win-badge{display:inline-block;background:var(--accent);color:#000;font-size:.58rem;font-weight:700;padding:2px 8px;letter-spacing:.1em;text-transform:uppercase;margin-bottom:7px}
    .cp-brand{font-size:.62rem;letter-spacing:.15em;text-transform:uppercase;color:var(--accent);margin-bottom:3px}
    .cp-name{font-family:var(--ff);font-size:1.2rem;letter-spacing:.02em;margin-bottom:4px}
    .cp-price{font-family:var(--ff);font-size:2rem;color:var(--accent);margin-bottom:10px}
    .cp-specs{border-top:1px solid var(--border);padding-top:12px;margin-bottom:12px}
    .cp-spec{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.04);font-size:.8rem}
    .cp-sk{color:var(--text-2)}
    .cp-sv{font-weight:500;text-align:right}
    .cp-sv.win{color:var(--green)}
    .cp-buy{display:inline-block;background:var(--accent);color:#000;font-family:var(--fb);font-weight:700;font-size:.78rem;padding:9px 20px;text-decoration:none;text-transform:uppercase;letter-spacing:.05em;transition:background var(--ease);margin-top:4px}
    .cp-buy:hover{background:#fff}
    .cp-ai{grid-column:1/-1;padding:16px 20px;border-top:1px solid var(--border);background:rgba(212,255,0,.025)}
    .cp-ai-lbl{font-size:.62rem;letter-spacing:.2em;text-transform:uppercase;color:var(--accent);margin-bottom:7px}
    .cp-ai-text{font-size:.88rem;line-height:1.7}

    /* ─ MODAL ─ */
    .moverlay{position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:500;display:none;align-items:center;justify-content:center;padding:18px}
    .moverlay.open{display:flex}
    .modal{background:var(--surface);border:1px solid var(--border-l);width:100%;max-width:520px;max-height:90vh;overflow-y:auto;animation:min .22s ease}
    @keyframes min{from{opacity:0;transform:scale(.97) translateY(10px)}to{opacity:1;transform:none}}
    .mh{display:flex;align-items:flex-start;justify-content:space-between;padding:18px 18px 12px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--surface);z-index:1}
    .m-emoji{font-size:1.8rem;margin-bottom:6px}
    .m-name{font-family:var(--ff);font-size:1.4rem;letter-spacing:.02em}
    .m-brand{font-size:.65rem;color:var(--accent);letter-spacing:.12em;text-transform:uppercase;margin-top:2px}
    .mclose{background:none;border:1px solid var(--border-l);color:var(--text-2);width:28px;height:28px;cursor:pointer;flex-shrink:0;margin-left:10px;font-size:.85rem;transition:all var(--ease)}
    .mclose:hover{border-color:var(--red);color:var(--red)}
    .mb{padding:18px}
    .m-price{font-family:var(--ff);font-size:2.6rem;color:var(--accent);line-height:1;margin-bottom:3px}
    .m-ret{font-size:.75rem;color:var(--text-3);margin-bottom:10px}
    .m-rrow{display:flex;align-items:center;gap:8px;margin-bottom:14px}
    .m-stars{color:var(--amber);font-size:.95rem}
    .m-rnum{font-family:var(--ff);font-size:1.4rem}
    .m-rsrc{font-size:.68rem;color:var(--text-3)}
    .m-slbl{font-size:.6rem;letter-spacing:.2em;text-transform:uppercase;color:var(--accent);margin-bottom:8px;margin-top:14px}
    .m-spec{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid rgba(255,255,255,.05);font-size:.82rem}
    .m-sk{color:var(--text-2)}.m-sv{font-weight:500;text-align:right}
    .m-aspects{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:4px}
    .m-asp{font-size:.65rem;padding:3px 9px;border:1px solid var(--border-l);color:var(--text-3)}
    .rev-item{padding:10px 0;border-bottom:1px solid rgba(255,255,255,.05)}
    .rev-item:last-child{border-bottom:none}
    .rev-auth{font-size:.7rem;font-weight:600;color:var(--text);margin-bottom:3px}
    .rev-text{font-size:.8rem;color:var(--text-2);line-height:1.6;font-style:italic}
    .m-buy{display:block;text-align:center;background:var(--accent);color:#000;font-family:var(--fb);font-weight:700;font-size:.88rem;padding:13px;text-decoration:none;text-transform:uppercase;letter-spacing:.05em;margin-top:16px;transition:background var(--ease)}
    .m-buy:hover{background:#fff}

    /* ─ MOBILE ─ */
    @media(max-width:860px){
      .sidebar{display:none}
      .topbar{padding:0 12px;gap:7px}
      .content{padding:12px 12px 120px}
      .sort-sel{display:none}
    }
    @media(max-width:540px){
      .cat-strip{padding:10px 12px}
      .grid{grid-template-columns:1fr}
      .cbar{padding:8px 12px}
      .cslots{flex-direction:column;gap:5px}
      .cslot{min-width:unset}
      .cp-body{grid-template-columns:1fr}
      .cp-vs{display:none}
      .cp-col{border-bottom:1px solid var(--border)}
      .top-ad{display:none}
      .group-btn{padding:8px 14px;font-size:.75rem}
    }

    /* mobile filter drawer */
    .flt-btn{display:none;background:var(--surface);border:1px solid var(--border-l);color:var(--text-2);font-family:var(--fb);font-size:.75rem;padding:5px 11px;cursor:pointer;flex-shrink:0}
    @media(max-width:860px){.flt-btn{display:block}}
    .drawer-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:290}
    .drawer-bg.open{display:block}
    .drawer{position:fixed;top:0;left:0;bottom:0;width:245px;z-index:300;background:var(--surface);border-right:1px solid var(--border-l);transform:translateX(-100%);transition:transform .28s ease;overflow-y:auto;padding:16px 0}
    .drawer.open{transform:none}
    .drawer-close{padding:0 14px 12px;display:flex;justify-content:flex-end}
    .drawer-close button{background:none;border:1px solid var(--border-l);color:var(--text-2);padding:4px 10px;cursor:pointer;font-size:.75rem}
  </style>
</head>
<body>

<!-- TOP BAR -->
<header class="topbar">
  <a href="index.html" class="logo">GymGear<span> Pro</span></a>
  <div class="search-wrap">
    <span class="s-icon">🔍</span>
    <input type="text" id="searchInput" placeholder="Search products, brands…" oninput="applyFilters()"/>
  </div>
  <button class="flt-btn" onclick="openDrawer()">⚙ Filters</button>
  <select class="sort-sel" id="sortSel" onchange="applyFilters()">
    <option value="">Featured</option>
    <option value="price-asc">Price ↑</option>
    <option value="price-desc">Price ↓</option>
    <option value="rating">Top Rated</option>
    <option value="quality">Best Quality</option>
  </select>
  <a href="index.html" class="topbar-home">← Home</a>
</header>

<!-- GROUP NAV -->
<nav class="group-nav" id="groupNav">
  <button class="group-btn active" onclick="switchGroup('equipment',this)">🏋️ Equipment</button>
  <button class="group-btn" onclick="switchGroup('clothing',this)">👕 Clothing</button>
  <button class="group-btn" onclick="switchGroup('supplements',this)">💊 Supplements</button>
</nav>

<!-- CATEGORY STRIP -->
<div class="cat-strip" id="catStrip"></div>

<!-- MOBILE DRAWER -->
<div class="drawer-bg" id="drawerBg" onclick="closeDrawer()"></div>
<div class="drawer" id="drawer">
  <div class="drawer-close"><button onclick="closeDrawer()">✕ Close</button></div>
  <div id="drawerContent"></div>
</div>

<!-- COMPARE BAR -->
<div class="cbar" id="cbar">
  <div class="cslots">
    <div class="cslot" id="slot0"><span class="sname">Select a product…</span></div>
    <div class="cslot" id="slot1"><span class="sname">Select another…</span></div>
  </div>
  <div class="cbar-btns">
    <button class="bclear" onclick="clearAll()">Clear</button>
    <button class="bcomp" id="bcomp" onclick="showComparison()" disabled>⚖ Compare</button>
  </div>
</div>

<div class="layout">
  <!-- SIDEBAR -->
  <aside class="sidebar"><div id="sidebarInner"></div></aside>

  <!-- CONTENT -->
  <main class="content">

    <!-- TOP AD -->
    <div class="top-ad">
      <div class="ad-lbl">Ad</div>
      <div class="ad-ph">📢 728×60 — Paste your Google AdSense or affiliate banner code here</div>
    </div>

    <!-- COMPARISON PANEL -->
    <div class="comp-panel" id="compPanel">
      <div class="cp-head">
        <div class="cp-title">⚖ COMPARISON</div>
        <button class="cp-close" onclick="closeComparison()">✕</button>
      </div>
      <div class="cp-body" id="cpBody"></div>
    </div>

    <!-- META -->
    <div class="meta-row">
      <div class="meta-count" id="metaCount">Choose a group and category above</div>
      <div class="meta-refresh" id="metaRefresh"></div>
    </div>
    <div class="active-tags" id="activeTags"></div>

    <!-- GRID -->
    <div class="grid" id="grid">
      <div class="empty">
        <span class="empty-icon">🏋️</span>
        <p>Select a group above — Equipment, Clothing, or Supplements —<br>then pick a category to start comparing.</p>
      </div>
    </div>

  </main>
</div>

<!-- MODAL -->
<div class="moverlay" id="moverlay" onclick="closeModal(event)">
  <div class="modal" id="modal"></div>
</div>

<script>
// ── CONFIG ──────────────────────────────────────────────────
// No secret key here — backend uses Origin header to verify requests come from this domain.
const BACKEND = 'https://gymgear-backend5.onrender.com';

// ── CATEGORY MAP ────────────────────────────────────────────
const GROUPS = {
  equipment:   { label:'🏋️ Equipment',   cats:['benches','barbells','dumbbells','plates','racks','cardio'] },
  clothing:    { label:'👕 Clothing',     cats:['shorts','compression','hoodies','footwear'] },
  supplements: { label:'💊 Supplements',  cats:['preworkout','protein','creatine','recovery'] },
};

const CAT_LABELS = {
  benches:'Benches', barbells:'Barbells', dumbbells:'Dumbbells',
  plates:'Weight Plates', racks:'Racks & Rigs', cardio:'Cardio',
  shorts:'Gym Shorts', compression:'Compression', hoodies:'Hoodies', footwear:'Footwear',
  preworkout:'Pre-Workout', protein:'Protein', creatine:'Creatine', recovery:'Recovery',
};

const CAT_EMOJIS = {
  benches:'🏋️', barbells:'🥇', dumbbells:'💪', plates:'⚙️', racks:'🏗️', cardio:'🚴',
  shorts:'🩳', compression:'🩱', hoodies:'🧥', footwear:'👟',
  preworkout:'⚡', protein:'🥛', creatine:'🔬', recovery:'💤',
};

// ── STATE ────────────────────────────────────────────────────
let currentGroup = 'equipment';
let currentCat   = null;
let productCache = {};       // {catKey: {products, refreshedAt}}
let selectedIds  = [];
let filters      = { brand:'all', minPrice:'', maxPrice:'', minRating:0 };
let sortMode     = '';
let searchQuery  = '';

// ── HELPERS ──────────────────────────────────────────────────
function starsHTML(r) {
  const f=Math.floor(r),h=r%1>=.5?1:0,e=5-f-h;
  return '★'.repeat(f)+(h?'½':'')+'☆'.repeat(e);
}
function getProduct(id) {
  const data = productCache[currentCat];
  return data?.products?.find(p => p.id === id);
}
function getBrands() {
  return [...new Set((productCache[currentCat]?.products||[]).map(p=>p.brand))].sort();
}

// ── FETCH PRODUCTS ───────────────────────────────────────────
let retryTimers = {};  // track retry timers per category so we can cancel them

async function loadCategory(cat) {
  // Cancel any pending retry for this cat
  if (retryTimers[cat]) { clearTimeout(retryTimers[cat]); delete retryTimers[cat]; }

  // Serve from local cache if we have it
  if (productCache[cat]) {
    currentCat = cat;
    applyFilters();
    renderSidebar();
    return;
  }

  currentCat = cat;
  showLoadingSpinner(cat, 'Loading products…', false);
  document.getElementById('metaCount').textContent = 'Loading…';

  try {
    const res = await fetch(`${BACKEND}/api/products/${cat}`, {
      method: 'GET',
      headers: { 'Content-Type': 'application/json' },
    });

    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      if (err.loading) {
        // Server is still doing its initial search — auto-retry every 15s
        showLoadingSpinner(cat, 'Products are being fetched for the first time.<br>This only happens once and takes about 3–5 minutes.', true);
        scheduleRetry(cat, 15000);
        return;
      }
      throw new Error(err.error || `HTTP ${res.status}`);
    }

    const data = await res.json();
    productCache[cat] = data;

    // Only render if this is still the active category
    if (currentCat === cat) {
      applyFilters();
      renderSidebar();
      const age = data.refreshedAt ? `Updated: ${new Date(data.refreshedAt).toLocaleDateString()} · Next: ${new Date(data.nextRefresh).toLocaleDateString()}` : '';
      document.getElementById('metaRefresh').textContent = age;
    }

  } catch (err) {
    console.error('Load error:', err);
    if (currentCat !== cat) return; // user switched away, ignore
    document.getElementById('grid').innerHTML = `
      <div class="empty">
        <span class="empty-icon">⚠️</span>
        <p>Couldn't load products right now.<br><small style="color:var(--text-3)">${err.message}</small><br><br>
        <button onclick="loadCategory('${cat}')" style="background:var(--accent);color:#000;border:none;padding:8px 20px;cursor:pointer;font-family:var(--fb);font-weight:600">Retry</button></p>
      </div>`;
  }
}

function showLoadingSpinner(cat, msg, showCountdown) {
  if (currentCat !== cat) return;
  const countdownId = `cd-${cat}`;
  document.getElementById('grid').innerHTML = `
    <div class="loading-state">
      <div class="spinner"></div>
      <div class="loading-text">${msg}</div>
      ${showCountdown ? `<div id="${countdownId}" style="margin-top:10px;font-size:.78rem;color:var(--text-3)">Checking again in 15s…</div>` : ''}
    </div>`;
}

function scheduleRetry(cat, delay) {
  let remaining = Math.round(delay / 1000);
  const countdownId = `cd-${cat}`;

  // Tick the countdown every second
  const tick = setInterval(() => {
    remaining--;
    const el = document.getElementById(countdownId);
    if (el) el.textContent = remaining > 0 ? `Checking again in ${remaining}s…` : 'Checking…';
    if (remaining <= 0) clearInterval(tick);
  }, 1000);

  retryTimers[cat] = setTimeout(() => {
    clearInterval(tick);
    delete retryTimers[cat];
    if (currentCat === cat) loadCategory(cat);
  }, delay);
}

// ── GROUP / CATEGORY NAV ─────────────────────────────────────
function switchGroup(group, el) {
  currentGroup = group;
  selectedIds = [];
  updateCbar();
  closeComparison();

  document.querySelectorAll('.group-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');

  renderCatStrip();
  // Auto-select first cat in group
  const firstCat = GROUPS[group].cats[0];
  selectCat(firstCat);
}

function renderCatStrip() {
  const cats = GROUPS[currentGroup].cats;
  document.getElementById('catStrip').innerHTML = cats.map(c => `
    <button class="cat-tab ${c === currentCat ? 'active' : ''}" onclick="selectCat('${c}',this)">
      ${CAT_EMOJIS[c]} ${CAT_LABELS[c]}
    </button>
  `).join('');
}

function selectCat(cat, el) {
  selectedIds = [];
  filters = { brand:'all', minPrice:'', maxPrice:'', minRating:0 };
  searchQuery = '';
  sortMode = '';
  document.getElementById('searchInput').value = '';
  document.getElementById('sortSel').value = '';
  closeComparison();
  updateCbar();

  document.querySelectorAll('.cat-tab').forEach(t => t.classList.remove('active'));
  if (el) el.classList.add('active');
  else {
    // find and activate
    const tabs = document.querySelectorAll('.cat-tab');
    tabs.forEach(t => { if (t.textContent.includes(CAT_LABELS[cat])) t.classList.add('active'); });
  }

  loadCategory(cat);
}

// ── FILTER / SORT ────────────────────────────────────────────
function getFiltered() {
  const list = productCache[currentCat]?.products || [];
  const q = searchQuery.toLowerCase();
  let out = list.filter(p => {
    if (q && !p.name.toLowerCase().includes(q) && !p.brand.toLowerCase().includes(q) && !(p.aspects||[]).some(a=>a.toLowerCase().includes(q))) return false;
    if (filters.brand !== 'all' && p.brand !== filters.brand) return false;
    if (filters.minPrice && p.price < Number(filters.minPrice)) return false;
    if (filters.maxPrice && p.price > Number(filters.maxPrice)) return false;
    if (filters.minRating > 0 && p.rating < filters.minRating) return false;
    return true;
  });
  if (sortMode === 'price-asc') out.sort((a,b)=>a.price-b.price);
  else if (sortMode === 'price-desc') out.sort((a,b)=>b.price-a.price);
  else if (sortMode === 'rating') out.sort((a,b)=>b.rating-a.rating);
  else if (sortMode === 'quality') out.sort((a,b)=>b.quality-a.quality);
  return out;
}

function applyFilters() {
  searchQuery = document.getElementById('searchInput').value;
  sortMode = document.getElementById('sortSel').value;
  renderGrid();
  renderActiveTags();
}

// ── SIDEBAR ──────────────────────────────────────────────────
function sidebarHTML() {
  const brands = getBrands();
  return `
    <div class="sb-section">
      <div class="sb-label">Brand</div>
      <div class="filter-chips">
        <button class="fchip ${filters.brand==='all'?'on':''}" onclick="setBrand('all')">All Brands</button>
        ${brands.map(b=>`<button class="fchip ${filters.brand===b?'on':''}" onclick="setBrand('${b.replace(/'/g,"\\'")}')">${b}</button>`).join('')}
      </div>
    </div>
    <div class="sb-section">
      <div class="sb-label">Price Range</div>
      <div class="p-inputs">
        <input class="p-inp" type="number" placeholder="Min $" id="pMin" value="${filters.minPrice}" oninput="setPriceFilter()"/>
        <span class="p-sep">–</span>
        <input class="p-inp" type="number" placeholder="Max $" id="pMax" value="${filters.maxPrice}" oninput="setPriceFilter()"/>
      </div>
    </div>
    <div class="sb-section">
      <div class="sb-label">Min Rating</div>
      <div class="r-opts">
        ${[0,4,4.5,4.8].map(r=>`
          <label class="r-opt">
            <input type="radio" name="minR" value="${r}" ${filters.minRating===r?'checked':''} onchange="setRating(${r})"/>
            <span>${r===0?'Any':'<span class="r-stars">'+'★'.repeat(Math.floor(r))+(r%1?'½':'')+'</span> '+r+'+ stars'}</span>
          </label>`).join('')}
      </div>
    </div>
    <div class="sb-ad">
      <div class="ad-lbl">Advertisement</div>
      <div class="ad-ph">160×600<br>Skyscraper</div>
    </div>
  `;
}
function renderSidebar() {
  const h = sidebarHTML();
  document.getElementById('sidebarInner').innerHTML = h;
  document.getElementById('drawerContent').innerHTML = h;
}
function setBrand(b) { filters.brand=b; renderSidebar(); renderGrid(); renderActiveTags(); }
function setPriceFilter() {
  filters.minPrice=document.getElementById('pMin')?.value||'';
  filters.maxPrice=document.getElementById('pMax')?.value||'';
  renderGrid(); renderActiveTags();
}
function setRating(r) { filters.minRating=r; renderGrid(); renderActiveTags(); }

// ── ACTIVE FILTER TAGS ───────────────────────────────────────
function renderActiveTags() {
  const tags=[];
  if(filters.brand!=='all') tags.push({l:filters.brand,c:()=>setBrand('all')});
  if(filters.minPrice) tags.push({l:`$${filters.minPrice}+`,c:()=>{filters.minPrice='';renderSidebar();renderGrid();renderActiveTags();}});
  if(filters.maxPrice) tags.push({l:`Up to $${filters.maxPrice}`,c:()=>{filters.maxPrice='';renderSidebar();renderGrid();renderActiveTags();}});
  if(filters.minRating>0) tags.push({l:`${filters.minRating}★+`,c:()=>{filters.minRating=0;renderSidebar();renderGrid();renderActiveTags();}});
  if(searchQuery) tags.push({l:`"${searchQuery}"`,c:()=>{searchQuery='';document.getElementById('searchInput').value='';renderGrid();renderActiveTags();}});
  window._tagClears = tags.map(t=>t.c);
  document.getElementById('activeTags').innerHTML = tags.map((t,i)=>`<div class="atag">${t.l}<button onclick="window._tagClears[${i}]()">✕</button></div>`).join('');
}

// ── RENDER GRID ──────────────────────────────────────────────
function renderGrid() {
  const grid = document.getElementById('grid');
  if (!currentCat) return;
  const list = getFiltered();
  const total = productCache[currentCat]?.products?.length || 0;
  document.getElementById('metaCount').innerHTML = `Showing <strong>${list.length}</strong> of ${total} products`;

  if (!list.length) {
    grid.innerHTML=`<div class="empty"><span class="empty-icon">🔍</span><p>No products match your filters.<br>Try adjusting or clearing them.</p></div>`;
    return;
  }

  let html='';
  list.forEach((p,i)=>{
    if(i>0&&i%6===0) html+=`<div class="grid-ad"><div class="ad-lbl">Advertisement</div><div class="ad-ph">300×250 Ad Slot</div></div>`;
    const isSel=selectedIds.includes(p.id);
    const buyUrl = p.affiliateUrl || p.url || '#';
    html+=`
      <div class="card ${isSel?'sel':''}" id="card-${p.id}" onclick="toggleSelect('${p.id}')" style="animation-delay:${Math.min(i*.04,.3)}s">
        <div class="sel-badge">✓ Selected</div>
        <span class="c-emoji">${p.emoji||'💪'}</span>
        <div class="c-brand">${p.brand}</div>
        <div class="c-name">${p.name}</div>
        <div class="c-price">$${Number(p.price).toLocaleString()}</div>
        <div class="c-retailer">via ${p.retailer}</div>
        <div class="q-row">
          <div class="q-bar"><div class="q-fill" style="width:${(p.quality||0)*10}%"></div></div>
          <div class="q-num">${p.quality||'—'}/10</div>
        </div>
        <div class="s-row">
          <span class="stars">${starsHTML(p.rating||0)}</span>
          <span class="r-num">${p.rating||'—'}</span>
          <span class="r-cnt">(${(p.reviewCount||0).toLocaleString()})</span>
        </div>
        <div class="verdict">"${p.expertVerdict||''}" — ${p.expertSource||''}</div>
        <div class="c-tags">${(p.aspects||[]).map(a=>`<span class="ctag">${a}</span>`).join('')}</div>
        <div class="c-actions">
          <button class="btn-d" onclick="event.stopPropagation();openModal('${p.id}')">Details & Reviews</button>
          <a class="btn-b" href="${buyUrl}" target="_blank" rel="noopener" onclick="event.stopPropagation()">Buy →</a>
        </div>
      </div>`;
  });
  grid.innerHTML=html;
}

// ── SELECTION ────────────────────────────────────────────────
function toggleSelect(id) {
  if(selectedIds.includes(id)) selectedIds=selectedIds.filter(x=>x!==id);
  else { if(selectedIds.length>=2) selectedIds.shift(); selectedIds.push(id); }
  document.querySelectorAll('.card').forEach(c=>c.classList.remove('sel'));
  selectedIds.forEach(id=>document.getElementById('card-'+id)?.classList.add('sel'));
  updateCbar();
}
function clearAll() {
  selectedIds=[];
  document.querySelectorAll('.card').forEach(c=>c.classList.remove('sel'));
  updateCbar(); closeComparison();
}

// ── COMPARE BAR ──────────────────────────────────────────────
function updateCbar() {
  const bar=document.getElementById('cbar');
  const btn=document.getElementById('bcomp');
  const s0=document.getElementById('slot0');
  const s1=document.getElementById('slot1');
  if(!selectedIds.length){bar.classList.remove('vis');s0.classList.remove('filled');s0.innerHTML='<span class="sname">Select a product…</span>';s1.classList.remove('filled');s1.innerHTML='<span class="sname">Select another…</span>';btn.disabled=true;return;}
  bar.classList.add('vis');
  const p0=getProduct(selectedIds[0]);
  s0.classList.add('filled');
  s0.innerHTML=`<span class="sname">${p0?.name||'…'}</span><button class="sx" onclick="removeSlot(0)">✕</button>`;
  if(selectedIds.length>1){
    const p1=getProduct(selectedIds[1]);
    s1.classList.add('filled');
    s1.innerHTML=`<span class="sname">${p1?.name||'…'}</span><button class="sx" onclick="removeSlot(1)">✕</button>`;
    btn.disabled=false;
  } else {s1.classList.remove('filled');s1.innerHTML='<span class="sname">Select another…</span>';btn.disabled=true;}
}
function removeSlot(i){const id=selectedIds[i];selectedIds.splice(i,1);document.getElementById('card-'+id)?.classList.remove('sel');updateCbar();closeComparison();}

// ── COMPARISON ───────────────────────────────────────────────
async function showComparison() {
  if(selectedIds.length<2) return;
  const p1=getProduct(selectedIds[0]), p2=getProduct(selectedIds[1]);

  // Get AI summary from backend (zero web-search tokens)
  let summary = generateLocalSummary(p1,p2);
  try {
    const r = await fetch(`${BACKEND}/api/compare`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({p1,p2})});
    if(r.ok){const d=await r.json();if(d.summary) summary=d.summary;}
  } catch{}

  const wins=getWins(p1,p2);
  document.getElementById('cpBody').innerHTML=`
    <div class="cp-col">
      ${wins==='p1'?'<div class="win-badge">🏆 Recommended</div>':''}
      <div class="cp-brand">${p1.brand}</div>
      <div class="cp-name">${p1.name}</div>
      <div class="cp-price">$${Number(p1.price).toLocaleString()}</div>
      <div class="s-row"><span class="stars">${starsHTML(p1.rating)}</span><span class="r-num">${p1.rating}</span></div>
      <div class="cp-specs">
        ${Object.entries(p1.specs||{}).map(([k,v])=>`<div class="cp-spec"><span class="cp-sk">${k}</span><span class="cp-sv">${v}</span></div>`).join('')}
        <div class="cp-spec"><span class="cp-sk">Quality</span><span class="cp-sv ${p1.quality>p2.quality?'win':''}">${p1.quality}/10</span></div>
        <div class="cp-spec"><span class="cp-sk">Rating</span><span class="cp-sv ${p1.rating>p2.rating?'win':''}">${p1.rating}★</span></div>
      </div>
      <a href="${p1.affiliateUrl||p1.url}" target="_blank" rel="noopener" class="cp-buy">Buy from ${p1.retailer} →</a>
    </div>
    <div class="cp-vs"><div class="cp-vs-t">VS</div></div>
    <div class="cp-col">
      ${wins==='p2'?'<div class="win-badge">🏆 Recommended</div>':''}
      <div class="cp-brand">${p2.brand}</div>
      <div class="cp-name">${p2.name}</div>
      <div class="cp-price">$${Number(p2.price).toLocaleString()}</div>
      <div class="s-row"><span class="stars">${starsHTML(p2.rating)}</span><span class="r-num">${p2.rating}</span></div>
      <div class="cp-specs">
        ${Object.entries(p2.specs||{}).map(([k,v])=>`<div class="cp-spec"><span class="cp-sk">${k}</span><span class="cp-sv">${v}</span></div>`).join('')}
        <div class="cp-spec"><span class="cp-sk">Quality</span><span class="cp-sv ${p2.quality>p1.quality?'win':''}">${p2.quality}/10</span></div>
        <div class="cp-spec"><span class="cp-sk">Rating</span><span class="cp-sv ${p2.rating>p1.rating?'win':''}">${p2.rating}★</span></div>
      </div>
      <a href="${p2.affiliateUrl||p2.url}" target="_blank" rel="noopener" class="cp-buy">Buy from ${p2.retailer} →</a>
    </div>
    <div class="cp-ai">
      <div class="cp-ai-lbl">🤖 AI Verdict</div>
      <div class="cp-ai-text">${summary}</div>
    </div>`;

  const panel=document.getElementById('compPanel');
  panel.classList.add('vis');
  panel.scrollIntoView({behavior:'smooth',block:'start'});
}

function getWins(p1,p2){
  const v1=p1.quality/p1.price, v2=p2.quality/p2.price;
  const s1=p1.quality*.4+p1.rating*.3+v1*100*.3;
  const s2=p2.quality*.4+p2.rating*.3+v2*100*.3;
  return s1>=s2?'p1':'p2';
}
function generateLocalSummary(p1,p2){
  const diff=Math.abs(p1.price-p2.price);
  const qw=p1.quality>=p2.quality?p1:p2;
  const cheap=p1.price<=p2.price?p1:p2;
  const pricey=cheap===p1?p2:p1;
  const v1=p1.quality/p1.price,v2=p2.quality/p2.price;
  const vw=v1>=v2?p1:p2;
  if(diff===0) return `Same price. <strong>${qw.name}</strong> wins on quality (${qw.quality}/10) — go with that one.`;
  if(diff<40) return `Only $${diff} apart — the quality difference matters more. <strong>${qw.name}</strong> scores ${qw.quality}/10 vs ${(qw===p1?p2:p1).quality}/10. Easy pick.`;
  if(vw===cheap) return `<strong>${cheap.name}</strong> is $${diff} cheaper AND gives better value per dollar. Unless you need something specific from the <strong>${pricey.name}</strong>, save the money.`;
  return `<strong>${pricey.name}</strong> costs $${diff} more but earns it — ${pricey.quality}/10 quality vs ${cheap.quality}/10. If budget allows, the <strong>${pricey.name}</strong> is worth the upgrade.`;
}
function closeComparison(){document.getElementById('compPanel').classList.remove('vis');}

// ── MODAL — lazy-loads reviews only when opened ───────────────
// Reviews are NOT fetched during the daily search (saves ~30% tokens).
// They're fetched here on demand: ~500 tokens per click, cached in memory.
const reviewCache = {};

async function openModal(id){
  const p=getProduct(id); if(!p) return;
  const buyUrl=p.affiliateUrl||p.url||'#';

  // Render modal immediately with specs — no waiting
  document.getElementById('modal').innerHTML=`
    <div class="mh">
      <div>
        <div class="m-emoji">${p.emoji||'💪'}</div>
        <div class="m-name">${p.name}</div>
        <div class="m-brand">${p.brand}</div>
      </div>
      <button class="mclose" onclick="closeModal()">✕</button>
    </div>
    <div class="mb">
      <div class="m-price">$${Number(p.price).toLocaleString()}</div>
      <div class="m-ret">via ${p.retailer}</div>
      <div class="m-rrow">
        <span class="m-stars">${starsHTML(p.rating||0)}</span>
        <span class="m-rnum">${p.rating||'—'}</span>
        <span class="m-rsrc">${(p.reviewCount||0).toLocaleString()} reviews · ${p.reviewSource||''}</span>
      </div>
      <div class="m-slbl">Specifications</div>
      ${Object.entries(p.specs||{}).map(([k,v])=>`<div class="m-spec"><span class="m-sk">${k}</span><span class="m-sv">${v}</span></div>`).join('')}
      <div class="m-spec"><span class="m-sk">Quality Score</span><span class="m-sv">${p.quality||'—'}/10</span></div>
      <div class="m-slbl" style="margin-top:12px">Highlights</div>
      <div class="m-aspects">${(p.aspects||[]).map(a=>`<span class="m-asp">${a}</span>`).join('')}</div>
      <div class="m-slbl" style="margin-top:12px">💬 Reviews</div>
      <div id="rev-body" style="color:var(--text-3);font-size:.8rem;padding:10px 0">Loading reviews…</div>
      <a href="${buyUrl}" target="_blank" rel="noopener" class="m-buy">Shop at ${p.retailer} →</a>
    </div>`;

  document.getElementById('moverlay').classList.add('open');
  document.body.style.overflow='hidden';

  // Load reviews async — from memory cache if already fetched
  const revEl = document.getElementById('rev-body');
  if (!revEl) return;

  if (reviewCache[id]) {
    renderReviews(revEl, reviewCache[id]); return;
  }

  try {
    const r = await fetch(`${BACKEND}/api/reviews`, {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ productName:p.name, brand:p.brand, url:p.url }),
    });
    if (!r.ok) throw new Error('fetch failed');
    const data = await r.json();
    reviewCache[id] = data.reviews || [];
    renderReviews(revEl, reviewCache[id]);
  } catch {
    revEl.textContent = 'Reviews unavailable.';
  }
}

function renderReviews(el, reviews){
  if (!reviews || !reviews.length){ el.textContent='No reviews found.'; return; }
  el.innerHTML = reviews.map(r=>`
    <div class="rev-item">
      <div class="rev-auth">${r.author}</div>
      <div class="rev-text">"${r.text}"</div>
    </div>`).join('');
}
function closeModal(e){
  if(!e||e.target===document.getElementById('moverlay')){
    document.getElementById('moverlay').classList.remove('open');
    document.body.style.overflow='';
  }
}

// ── MOBILE DRAWER ────────────────────────────────────────────
function openDrawer(){document.getElementById('drawer').classList.add('open');document.getElementById('drawerBg').classList.add('open');}
function closeDrawer(){document.getElementById('drawer').classList.remove('open');document.getElementById('drawerBg').classList.remove('open');}

// ── INIT ─────────────────────────────────────────────────────
(function init(){
  renderCatStrip();
  selectCat(GROUPS[currentGroup].cats[0]);
})();
</script>
</body>
</html>
